version: '3.8'

# ============================================================
# KSC AIBox - Docker Compose 完整部署配置
# 版本: 2.0 (Docker原生部署)
# 创建时间: 2026-04-09
# ============================================================

# 环境变量文件
x-env-files: &default-env-files
  - ../secrets/.env.config
  - ../secrets/.env.secrets

# 通用重启策略
x-restart-policy: &restart-policy
  restart: unless-stopped

# 通用日志配置
x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "3"

# 通用健康检查
x-healthcheck-postgres: &healthcheck-postgres
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

x-healthcheck-mysql: &healthcheck-mysql
  healthcheck:
    test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

x-healthcheck-redis: &healthcheck-redis
  healthcheck:
    test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s

x-healthcheck-nacos: &healthcheck-nacos
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/cs/configs || exit 1"]
    interval: 15s
    timeout: 10s
    retries: 10
    start_period: 60s

# ============================================================
# 网络定义
# ============================================================
networks:
  aibox-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

  aibox-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

  aibox-middleware:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

  aibox-ai:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16

  aibox-wps:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/16

# ============================================================
# 卷定义（本地存储）
# ============================================================
volumes:
  # 中间件数据卷
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/postgres/data

  mysql-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/mysql/data

  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/redis/data

  nacos-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/nacos/data

  elasticsearch-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/elasticsearch/data

  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/minio/data

  neo4j-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/neo4j/data

  rabbitmq-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/rabbitmq/data

  etcd-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/etcd/data

  slc-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /ksc_aibox/data/slc/data

# ============================================================
# 服务定义
# ============================================================
services:

  # ============================================================
  # 第一层：中间件服务（首先启动）
  # ============================================================

  # PostgreSQL数据库
  postgres:
    <<: [*restart-policy, *default-logging, *healthcheck-postgres]
    image: postgres:15.3.0
    container_name: postgres
    env_file: *default-env-files
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: plss
      POSTGRES_USER: postgres
      POSTGRES_MAX_CONNECTIONS: "500"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/bitnami/postgresql
      - /ksc_aibox/data/postgres/logs:/bitnami/postgresql/logs
      - /ksc_aibox/source/postgres/templates:/docker-entrypoint-initdb.d:ro
    networks:
      - aibox-middleware
      - aibox-backend
    cpus: 4.0
    mem_limit: 16g
    mem_reservation: 8g
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 8G

  # MySQL数据库
  mysql:
    <<: [*restart-policy, *default-logging, *healthcheck-mysql]
    image: mysql:8.3.0
    container_name: mysql
    env_file: *default-env-files
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wps
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - /ksc_aibox/data/mysql/logs:/var/log/mysql
      - /ksc_aibox/source/mysql/templates/create_table.sql:/docker-entrypoint-initdb.d/create_table.sql:ro
    networks:
      - aibox-middleware
      - aibox-backend
      - aibox-wps
    cpus: 2.0
    mem_limit: 16g
    mem_reservation: 8g
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G

  # Redis缓存
  redis:
    <<: [*restart-policy, *default-logging, *healthcheck-redis]
    image: redis:7.4.0
    container_name: redis
    env_file: *default-env-files
    command: >
      redis-server --requirepass ${REDIS_PASSWORD}
      --maxmemory 8gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - /ksc_aibox/data/redis/logs:/var/log/redis
    networks:
      - aibox-middleware
      - aibox-backend
      - aibox-wps
    cpus: 2.0
    mem_limit: 8g
    mem_reservation: 4g
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # Nacos配置中心
  nacos:
    <<: [*restart-policy, *default-logging, *healthcheck-nacos]
    image: nacos/nacos-server:v2.3.2-slim
    container_name: nacos
    env_file: *default-env-files
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_PASSWORD}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      SPRING_DATASOURCE_PLATFORM: embedded
      JVM_XMS: 256m
      JVM_XMX: 1g
    ports:
      - "38848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-data:/home/nacos/data
      - /ksc_aibox/data/nacos/logs:/home/nacos/logs
    networks:
      - aibox-middleware
      - aibox-backend
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 2g
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # Elasticsearch搜索引擎
  elasticsearch:
    <<: [*restart-policy, *default-logging]
    image: elasticsearch:8.18.2
    container_name: elasticsearch
    env_file: *default-env-files
    environment:
      - node.name=es01
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms16g -Xmx16g"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - /ksc_aibox/data/elasticsearch/logs:/usr/share/elasticsearch/logs
    networks:
      - aibox-middleware
      - aibox-backend
    cpus: 4.0
    mem_limit: 32g
    mem_reservation: 16g
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 32G
        reservations:
          cpus: '4'
          memory: 16G

  # MinIO对象存储
  minio:
    <<: [*restart-policy, *default-logging]
    image: minio/minio:latest
    container_name: minio
    env_file: *default-env-files
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - minio-data:/data
      - /ksc_aibox/data/minio/config:/root/.minio
    networks:
      - aibox-middleware
      - aibox-backend
      - aibox-wps
    cpus: 2.0
    mem_limit: 8g
    mem_reservation: 4g
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # Neo4j图数据库
  neo4j:
    <<: [*restart-policy, *default-logging]
    image: neo4j:5.7
    container_name: neo4j
    env_file: *default-env-files
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_dbms_default__database: plss-v1
      NEO4J_dbms_security_auth__enabled: "false"
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_directories_data: /data
      NEO4J_dbms_directories_logs: /logs
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - /ksc_aibox/data/neo4j/logs:/logs
    networks:
      - aibox-middleware
      - aibox-backend
    cpus: 2.0
    mem_limit: 8g
    mem_reservation: 4g
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # RabbitMQ消息队列
  rabbitmq:
    <<: [*restart-policy, *default-logging]
    image: rabbitmq:3.12.14-management
    container_name: rabbitmq
    env_file: *default-env-files
    environment:
      RABBITMQ_DEFAULT_USER: suwell
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
      - "1883:1883"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - /ksc_aibox/data/rabbitmq/logs:/var/log/rabbitmq
    networks:
      - aibox-middleware
      - aibox-backend
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 2g
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # etcd分布式KV
  etcd:
    <<: [*restart-policy, *default-logging]
    image: bitnami/etcd:latest
    container_name: etcd
    env_file: *default-env-files
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
      - /ksc_aibox/data/etcd/logs:/opt/bitnami/etcd/logs
    networks:
      - aibox-middleware
      - aibox-backend
      - aibox-wps
    cpus: 1.0
    mem_limit: 2g
    mem_reservation: 1g
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # SLC授权服务
  slc:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/middleware/swslc-arm64:3007.1.1.24.0701.16.05
    container_name: slc
    env_file: *default-env-files
    environment:
      SLC_ENABLE: "false"
      SLC_SERVICE_PORT: "9521"
      SLC_URL: http://slc:9521
      SLC_CHECK_ON_BOOT: "false"
      SLC_CHECK_PERIOD: 24h
    ports:
      - "39521:9521"
    volumes:
      - slc-data:/slc/data
      - /dev/mem:/dev/mem
    networks:
      - aibox-middleware
      - aibox-backend
    cpus: 1.0
    mem_limit: 2g
    mem_reservation: 1g
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    privileged: true

  # ============================================================
  # 第二层：WPS Office服务
  # ============================================================

  # WPS Nginx反向代理
  weboffice-nginx:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/weboffice-nginx-arm64:latest
    container_name: weboffice-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /ksc_aibox/weboffice/log:/var/log/nginx
      - /ksc_aibox/weboffice/html:/usr/share/nginx/html:ro
    networks:
      - aibox-frontend
      - aibox-wps
    depends_on:
      - webword
      - webet
      - webwpp
      - webpdf
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 2g

  # WPS Word在线编辑
  webword:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/webword-arm64:latest
    container_name: webword
    environment:
      - ETCD_HOST=etcd
      - ETCD_PORT=2379
    volumes:
      - /ksc_aibox/weboffice/log:/var/log/webword
    networks:
      - aibox-wps
      - aibox-middleware
    depends_on:
      - etcd
      - mysql
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 2g

  # WPS Excel在线编辑
  webet:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/webet-arm64:latest
    container_name: webet
    environment:
      - ETCD_HOST=etcd
      - ETCD_PORT=2379
    volumes:
      - /ksc_aibox/weboffice/log:/var/log/webet
    networks:
      - aibox-wps
      - aibox-middleware
    depends_on:
      - etcd
      - mysql
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 2g

  # WPS PPT在线编辑
  webwpp:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/webwpp-arm64:latest
    container_name: webwpp
    environment:
      - ETCD_HOST=etcd
      - ETCD_PORT=2379
    volumes:
      - /ksc_aibox/weboffice/log:/var/log/webwpp
    networks:
      - aibox-wps
      - aibox-middleware
    depends_on:
      - etcd
      - mysql
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 2g

  # WPS PDF查看器
  webpdf:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/webpdf-arm64:latest
    container_name: webpdf
    environment:
      - ETCD_HOST=etcd
      - ETCD_PORT=2379
    volumes:
      - /ksc_aibox/weboffice/log:/var/log/webpdf
    networks:
      - aibox-wps
      - aibox-middleware
    depends_on:
      - etcd
    cpus: 1.0
    mem_limit: 2g
    mem_reservation: 1g

  # ============================================================
  # 第三层：应用微服务
  # ============================================================

  # API网关
  plss-gateway:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/plss-gateway-arm64:20251017-644-WPS
    container_name: plss-gateway
    env_file: *default-env-files
    environment:
      nacos_server: "nacos:8848"
      nacos_username: nacos
      nacos_password: ${NACOS_PASSWORD}
      configkey: ${CONFIG_KEY}
      secretkey: ${SECRET_KEY}
    ports:
      - "8064:8064"
    volumes:
      - /ksc_aibox/apps/logs:/data/app/logs
    networks:
      - aibox-backend
      - aibox-frontend
      - aibox-middleware
    depends_on:
      - nacos
      - postgres
      - mysql
      - redis
    cpus: 4.0
    mem_limit: 8g
    mem_reservation: 4g

  # 系统管理服务
  plss-system-server:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/plss-system-server-arm64:20251225-1067-WPS
    container_name: plss-system-server
    env_file: *default-env-files
    environment:
      nacos_server: "nacos:8848"
      nacos_username: nacos
      nacos_password: ${NACOS_PASSWORD}
      configkey: ${CONFIG_KEY}
      secretkey: ${SECRET_KEY}
    ports:
      - "8061:8061"
    volumes:
      - /ksc_aibox/apps/logs:/data/app/logs
    networks:
      - aibox-backend
      - aibox-middleware
    depends_on:
      - nacos
      - postgres
      - mysql
    cpus: 4.0
    mem_limit: 8g
    mem_reservation: 4g

  # 前端UI
  plss-web:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/plss-web-arm64:latest
    container_name: plss-web
    ports:
      - "30080:30080"
    volumes:
      - /ksc_aibox/apps/html/aiPlatform:/data/app/html/aiPlatform:ro
      - /ksc_aibox/apps/logs:/data/app/logs
    networks:
      - aibox-frontend
      - aibox-backend
    depends_on:
      - plss-gateway
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 2g

  # 文档处理服务
  plss-document-process-server:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/plss-document-process-server-arm64:latest
    container_name: plss-document-process-server
    env_file: *default-env-files
    environment:
      nacos_server: "nacos:8848"
      nacos_username: nacos
      nacos_password: ${NACOS_PASSWORD}
    volumes:
      - /ksc_aibox/apps/logs:/data/app/logs
      - /ksc_aibox/apps/import:/data/app/import
    networks:
      - aibox-backend
      - aibox-middleware
    depends_on:
      - nacos
      - postgres
      - minio
    cpus: 4.0
    mem_limit: 8g
    mem_reservation: 4g

  # 搜索服务
  plss-search-server:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/plss-search-server-arm64:latest
    container_name: plss-search-server
    env_file: *default-env-files
    environment:
      nacos_server: "nacos:8848"
      nacos_username: nacos
      nacos_password: ${NACOS_PASSWORD}
    volumes:
      - /ksc_aibox/apps/logs:/data/app/logs
      - /ksc_aibox/apps/ofd2json:/data/app/ofd2json
    networks:
      - aibox-backend
      - aibox-middleware
    depends_on:
      - nacos
      - elasticsearch
      - postgres
    cpus: 4.0
    mem_limit: 8g
    mem_reservation: 4g

  # NLP集成服务
  nlp-capacity-integration:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/nlp-capacity-integration-arm64:latest
    container_name: nlp-capacity-integration
    env_file: *default-env-files
    environment:
      nacos_server: "nacos:8848"
      nacos_username: nacos
      nacos_password: ${NACOS_PASSWORD}
    ports:
      - "8086:8086"
    volumes:
      - /ksc_aibox/apps/nlp-capacity-integration:/data/app/nlp-capacity-integration
      - /ksc_aibox/apps/logs:/data/app/logs
    networks:
      - aibox-backend
      - aibox-middleware
    depends_on:
      - nacos
      - postgres
    cpus: 4.0
    mem_limit: 8g
    mem_reservation: 4g

  # AI API网关
  ai-qingqiu-13b-api:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss/ai-qingqiu-13b-api:v1-arm64
    container_name: ai-qingqiu-13b-api
    env_file: *default-env-files
    environment:
      CATALOG_RECOG_HOST: http://nlp-capacity-integration:8086
      PARA_RECOG_HOST: http://nlp-capacity-integration:8086
      SERVER_PORT: "8000"
      workers: "4"
      apollo-config: ${APOLLO_CONFIG}
      athena-config: ${ATHENA_CONFIG}
    ports:
      - "8000:8000"
    volumes:
      - /ksc_aibox/apps/logs:/data/app/logs
    networks:
      - aibox-backend
      - aibox-ai
      - aibox-middleware
    depends_on:
      - nlp-capacity-integration
      - qingqiu-qwen3
    cpus: 4.0
    mem_limit: 8g
    mem_reservation: 4g

  # ============================================================
  # 第四层：AI推理服务（NPU直通）
  # ============================================================

  # Qwen3-13B模型 (NPU 0)
  qingqiu-qwen3:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss-ai/ascend-qwen3-arm:2.1.RC1-800I-A2-py311-openeuler24.03-lts
    container_name: qingqiu-qwen3
    env_file: *default-env-files
    environment:
      ASCEND_RT_VISIBLE_DEVICES: "1"
      ASCEND_VISIBLE_DEVICES: "1"
      MODEL_DIR: qingqiu-Qwen3-13b-base
      RESERVED_MEMORY_GB: "10"
    ports:
      - "1025:1025"
    volumes:
      - /ksc_aibox/models/llm/qingqiu-Qwen3-13b-base:/home/models/qingqiu-Qwen3-13b-base:ro
      - /usr/local/Ascend/driver:/usr/local/Ascend/driver:ro
      - /dev/davinci1:/dev/davinci1
      - /dev/davinci_manager:/dev/davinci_manager
      - /dev/devmm_svm:/dev/devmm_svm
      - /dev/hisi_hdc:/dev/hisi_hdc
    networks:
      - aibox-ai
    cpus: 8.0
    mem_limit: 32g
    mem_reservation: 16g
    shm_size: 8g
    deploy:
      resources:
        limits:
          cpus: '16'
          memory: 32G
        reservations:
          cpus: '8'
          memory: 16G
    privileged: true

  # Qwen4B模型 (NPU 1)
  qwen4b:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss-ai/ascend-qwen4b-arm:latest
    container_name: qwen4b
    env_file: *default-env-files
    environment:
      ASCEND_RT_VISIBLE_DEVICES: "2"
      ASCEND_VISIBLE_DEVICES: "2"
      MODEL_DIR: qwen4b
      RESERVED_MEMORY_GB: "8"
    volumes:
      - /ksc_aibox/models/llm/qwen4b:/home/models/qwen4b:ro
      - /usr/local/Ascend/driver:/usr/local/Ascend/driver:ro
      - /dev/davinci2:/dev/davinci2
      - /dev/davinci_manager:/dev/davinci_manager
      - /dev/devmm_svm:/dev/devmm_svm
      - /dev/hisi_hdc:/dev/hisi_hdc
    networks:
      - aibox-ai
    cpus: 4.0
    mem_limit: 16g
    mem_reservation: 8g
    shm_size: 4g
    privileged: true

  # Embedding模型 (NPU 2)
  emb:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss-ai/ascend-emb-arm:latest
    container_name: emb
    env_file: *default-env-files
    environment:
      ASCEND_RT_VISIBLE_DEVICES: "3"
      ASCEND_VISIBLE_DEVICES: "3"
    volumes:
      - /ksc_aibox/models/embedding:/home/models/embedding:ro
      - /usr/local/Ascend/driver:/usr/local/Ascend/driver:ro
      - /dev/davinci3:/dev/davinci3
      - /dev/davinci_manager:/dev/davinci_manager
      - /dev/devmm_svm:/dev/devmm_svm
      - /dev/hisi_hdc:/dev/hisi_hdc
    networks:
      - aibox-ai
    cpus: 2.0
    mem_limit: 8g
    mem_reservation: 4g
    privileged: true

  # 重排序模型 (NPU 3)
  reranker:
    <<: [*restart-policy, *default-logging]
    image: hub.ai.aio.cloud/plss-ai/ascend-reranker-arm:latest
    container_name: reranker
    env_file: *default-env-files
    environment:
      ASCEND_RT_VISIBLE_DEVICES: "4"
      ASCEND_VISIBLE_DEVICES: "4"
    volumes:
      - /ksc_aibox/models/rerank:/home/models/reranker:ro
      - /usr/local/Ascend/driver:/usr/local/Ascend/driver:ro
      - /dev/davinci4:/dev/davinci4
      - /dev/davinci_manager:/dev/davinci_manager
      - /dev/devmm_svm:/dev/devmm_svm
      - /dev/hisi_hdc:/dev/hisi_hdc
    networks:
      - aibox-ai
    cpus: 2.0
    mem_limit: 8g
    mem_reservation: 4g
    privileged: true

  # ============================================================
  # 第五层：Nginx总网关（可选）
  # ============================================================

  # 总反向代理（统一入口）
  nginx:
    <<: [*restart-policy, *default-logging]
    image: nginx:latest
    container_name: nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /ksc_aibox/logs/nginx:/var/log/nginx
    networks:
      - aibox-frontend
    depends_on:
      - plss-web
      - weboffice-nginx
    cpus: 2.0
    mem_limit: 2g
    mem_reservation: 1g
