spring:
  ## redis config 注意: redis的连接地址，集群和单机方式二选一进行配置；
  ## 1.【单机】配置单机连接地址，则注释掉“cluster”集群连接配置,程序启动会显示自动寻址主从节点进行连接信息
  ## 2.【集群】配置集群连接地址，则注释掉单机连接配置，程序启动会显示单机连接信息
  data:
    redis:
      #cluster:
      #  max-redirects: 3000
      #  nodes: redis-cluster-ss-0.redis-cluster-ss-headless:6379,redis-cluster-ss-1.redis-cluster-ss-headless:6379,redis-cluster-ss-2.redis-cluster-ss-headless:6379,redis-cluster-ss-3.redis-cluster-ss-headless:6379,redis-cluster-ss-4.redis-cluster-ss-headless:6379,redis-cluster-ss-5.redis-cluster-ss-headless:6379
      host: redis
      port: 6379
      timeout: 3s
      connect-timeout: 3s
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 500 #连接池最大连接数（使用负数表示没有限制）默认8
          max-wait: -1  #连接池最大阻塞等待时间（使用负数表示没有限制）默认-1
          max-idle: 10 #连接池中的最大空闲连接 默认8
          min-idle: 0 #连接池中的最小空闲连接 默认0
          time-between-eviction-runs: 100
        cluster:
          refresh:
            adaptive: true
            period: 20 # 20秒自动刷新一次     
  cache:
    type: redis #SpringBoot集成缓存替换默认使用Redis缓存
    redis:
      time-to-live: 3600000  # 毫秒为单位，设置1个小时
      #key-prefix: SUWELL_CACHE_ #如果指定了前缀就用我们指定的前缀，如果没有就默认使用缓存的分区名字作为前缀【推荐没设置缓存前缀时则默认就是缓存分区名作为前缀】
      use-key-prefix: true
      #是否缓存空值，防止缓存穿透
      cache-null-values: true
  session: ##spring session共享存储redis
    store-type: redis  #spring session共享存储redis

custom-redisson:
  connect-timeout: 3000
  timeout: 3000
  retry-attempts: 3000
  retry-interval: 3000
  idle-connection-timeout: 10000
  ping-connection-interval: 10000
## jetcache 缓存配置 层级配置在最顶级，即与spring配置节点平级
jetcache: ## 靠左对齐最顶级配置
  statIntervalMinutes: 15
  areaInCacheName: false
  local:
    default:
      type: linkedhashmap
      keyConvertor: fastjson2
  remote:
    default:
      type: redisson
      redissonClient: redisson
      broadcastChannel: plss
      keyConvertor: fastjson2
      defaultExpireInMillis: 10000
      keyPrefix: PlSS_
