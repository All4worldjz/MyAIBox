smart.ministryBureau: '{"departments":[{"type":"生态环境部","description":"（一）负责建立健全生态环境基本制度。会同有关部门拟订国家生态环境政策、规划并组织实施，起草法律法规草案，制定部门规章。会同有关部门编制并监督实施重点区域、流域、海域、饮用水水源地生态环境规划和水功能区划，组织拟订生态环境标准，制定生态环境基准和技术规范。（二）负责重大生态环境问题的统筹协调和监督管理。牵头协调重特大环境污染事故和生态破坏事件的调查处理，指导协调地方政府对重特大突发生态环境事件的应急、预警工作，牵头指导实施生态环境损害赔偿制度，协调解决有关跨区域环境污染纠纷，统筹协调国家重点区域、流域、海域生态环境保护工作。（三）负责监督管理国家减排目标的落实。组织制定陆地和海洋各类污染物排放总量控制、排污许可证制度并监督实施，确定大气、水、海洋等纳污能力，提出实施总量控制的污染物名称和控制指标，监督检查各地污染物减排任务完成情况，实施生态环境保护目标责任制。（四）负责提出生态环境领域固定资产投资规模和方向、国家财政性资金安排的意见，按国务院规定权限审批、核准国家规划内和年度计划规模内固定资产投资项目，配合有关部门做好组织实施和监督工作。参与指导推动循环经济和生态环保产业发展。（五）负责环境污染防治的监督管理。制定大气、水、海洋、土壤、噪声、光、恶臭、固体废物、化学品、机动车等的污染防治管理制度并监督实施。会同有关部门监督管理饮用水水源地生态环境保护工作，组织指导城乡生态环境综合整治工作，监督指导农业面源污染治理工作。监督指导区域大气环境保护工作，组织实施区域大气污染联防联控协作机制。（六）指导协调和监督生态保护修复工作。组织编制生态保护规划，监督对生态环境有影响的自然资源开发利用活动、重要生态环境建设和生态破坏恢复工作。组织制定各类自然保护地生态环境监管制度并监督执法。监督野生动植物保护、湿地生态环境保护、荒漠化防治等工作。指导协调和监督农村生态环境保护，监督生物技术环境安全，牵头生物物种（含遗传资源）工作，组织协调生物多样性保护工作，参与生态保护补偿工作。（七）负责核与辐射安全的监督管理。拟订有关政策、规划、标准，牵头负责核安全工作协调机制有关工作，参与核事故应急处理，负责辐射环境事故应急处理工作。监督管理核设施和放射源安全，监督管理核设施、核技术应用、电磁辐射、伴有放射性矿产资源开发利用中的污染防治。对核材料管制和民用核安全设备设计、制造、安装及无损检验活动实施监督管理。（八）负责生态环境准入的监督管理。受国务院委托对重大经济和技术政策、发展规划以及重大经济开发计划进行环境影响评价。按国家规定审批或审查重大开发建设区域、规划、项目环境影响评价文件。拟订并组织实施生态环境准入清单。（九）负责生态环境监测工作。制定生态环境监测制度和规范、拟订相关标准并监督实施。会同有关部门统一规划生态环境质量监测站点设置，组织实施生态环境质量监测、污染源监督性监测、温室气体减排监测、应急监测。组织对生态环境质量状况进行调查评价、预警预测，组织建设和管理国家生态环境监测网和全国生态环境信息网。建立和实行生态环境质量公告制度，统一发布国家生态环境综合性报告和重大生态环境信息。（十）负责应对气候变化工作。组织拟订应对气候变化及温室气体减排重大战略、规划和政策。与有关部门共同牵头组织参加气候变化国际谈判。负责国家履行联合国气候变化框架公约相关工作。（十一）组织开展中央生态环境保护督察。建立健全生态环境保护督察制度，组织协调中央生态环境保护督察工作，根据授权对各地区各有关部门贯彻落实中央生态环境保护决策部署情况进行督察问责。指导地方开展生态环境保护督察工作。（十二）统一负责生态环境监督执法。组织开展全国生态环境保护执法检查活动。查处重大生态环境违法问题。指导全国生态环境保护综合执法队伍建设和业务工作。（十三）组织指导和协调生态环境宣传教育工作，制定并组织实施生态环境保护宣传教育纲要，推动社会组织和公众参与生态环境保护。开展生态环境科技工作，组织生态环境重大科学研究和技术工程示范，推动生态环境技术管理体系建设。（十四）开展生态环境国际合作交流，研究提出国际生态环境合作中有关问题的建议，组织协调有关生态环境国际条约的履约工作，参与处理涉外生态环境事务，参与全球陆地和海洋生态环境治理相关工作。（十五）完成党中央、国务院交办的其他任务。（十六）职能转变。生态环境部要统一行使生态和城乡各类污染排放监管与行政执法职责，切实履行监管责任，全面落实大气、水、土壤污染防治行动计划，大幅减少进口固体废物种类和数量直至全面禁止洋垃圾入境。构建政府为主导、企业为主体、社会组织和公众共同参与的生态环境治理体系，实行最严格的生态环境保护制度，严守生态保护红线和环境质量底线，坚决打好污染防治攻坚战，保障国家生态安全，建设美丽中国。"},{"type":"国家中医药管理局","description":"(一)拟订中医药和民族医药事业发展的战略、规划、政策和相关标准，起草有关法律法规和部门规章草案，参与国家重大中医药项目的规划和组织实施。(二)承担中医医疗、预防、保健、康复及临床用药等的监督管理责任。规划、指导和协调中医医疗、科研机构的结构布局及其运行机制的改革。拟订各类中医医疗、保健等机构管理规范和技术标准并监督执行。(三)负责监督和协调医疗、研究机构的中西医结合工作，拟订有关管理规范和技术标准。(四)负责指导民族医药的理论、医术、药物的发掘、整理、总结和提高工作，拟订民族医医疗机构管理规范和技术标准并监督执行。(五)组织开展中药资源普查，促进中药资源的保护、开发和合理利用，参与制定中药产业发展规划、产业政策和中医药的扶持政策，参与国家基本药物制度建设。(六)组织拟订中医药人才发展规划，会同有关部门拟订中医药专业技术人员资格标准并组织实施。会同有关部门组织开展中医药师承教育、毕业后教育、继续教育和相关人才培训工作，参与指导中医药教育教学改革，参与拟订各级各类中医药教育发展规划。(七)拟订和组织实施中医药科学研究、技术开发规划，指导中医药科研条件和能力建设，管理国家重点中医药科研项目，促进中医药科技成果的转化、应用和推广。(八)承担保护濒临消亡的中医诊疗技术和中药生产加工技术的责任，组织开展对中医古籍的整理研究和中医药文化的继承发展，提出保护中医非物质文化遗产的建议，推动中医药防病治病知识普及。(九)组织开展中医药国际推广、应用和传播工作，开展中医药国际交流合作和与港澳台的中医药合作。(十)承办国务院及国家卫生健康委员会交办的其他事项。"},{"type":"国务院参事室","description":"（一）组织国务院参事围绕政府中心工作调查研究，反映真实情况，参政议政、建言献策、咨询国是、民主监督、统战联谊。（二）组织国务院参事对有关法律法规草案及重要文件提出意见和建议。（三）贯彻执行党的统一战线政策，支持、组织国务院参事、中央文史研究馆馆员参加爱国统一战线工作。（四）组织国务院参事、中央文史研究馆馆员及时学习和掌握党中央、国务院的方针政策。（五）组织国务院参事参与同国外政府咨询机构的交流与合作。（六）承办国务院参事、中央文史研究馆馆员的遴选事务。（七）指导地方参事室、文史研究馆工作。（八）负责为国务院参事、中央文史研究馆馆员履行职责提供服务。（九）承办国务院交办的其他事项。"},{"type":"中华人民共和国民政部","description":"（一）拟订民政事业发展法律法规草案、政策、规划，制定部门规章和标准并组织实施。（二）拟订社会团体、基金会、社会服务机构等社会组织登记和监督管理办法并组织实施，依法对社会组织进行登记管理和执法监督。（三）拟订社会救助政策、标准，统筹社会救助体系建设，负责城乡居民最低生活保障、特困人员救助供养、临时救助、生活无着流浪乞讨人员救助工作。（四）拟订行政区划、行政区域界线管理和地名管理政策、标准，组织研究行政区划总体规划思路建议，按照管理权限牵头负责行政区划设立、命名、变更和政府驻地迁移等审核工作。确定、公布行政区划代码，组织指导省县级行政区域界线的勘定和管理工作，负责全国地名工作的统一监督管理，负责重要自然地理实体以及各国管辖范围外区域的地理实体、天体地理实体的命名和更名审核工作。（五）拟订婚姻管理政策并组织实施，推进婚俗改革。（六）拟订殡葬管理政策、服务规范并组织实施，推进殡葬改革。（七）拟订残疾人权益保护政策，统筹推进残疾人福利制度建设和康复辅助器具产业发展。（八）承担全国老龄工作委员会的具体工作。组织拟订并协调落实积极应对人口老龄化的政策措施。指导协调老年人权益保障工作。组织拟订老年人社会参与政策并组织实施。（九）组织拟订并协调落实促进养老事业发展的政策措施。统筹推进、督促指导、监督管理养老服务工作，拟订养老服务体系建设规划、政策、标准并组织实施，承担老年人福利和特殊困难老年人救助工作。（十）拟订儿童福利、孤弃儿童保障、儿童收养、儿童救助保护政策和标准，健全农村留守儿童关爱服务体系和困境儿童保障制度。（十一）组织拟订促进慈善事业发展政策，指导社会捐助工作，负责福利彩票管理工作。（十二）代管中国老龄协会。（十三）完成党中央、国务院交办的其他任务。第六条　职能转变。民政部要推动老龄工作向主动应对和统筹协调转变，健全工作体制机制，强化综合协调、督促指导、组织推进老龄事业发展职能，协调有关部门和地方不断完善老年人社会救助、社会福利、社会优待、宜居环境、社会参与等政策，增强政策制度的针对性、协调性、系统性。推动养老服务向全面提升老年人生活质量转变，加快建设居家社区机构相协调、医养康养相结合的养老服务体系，大力发展普惠型养老服务，促进资源均衡配置，推动实现全体老年人享有基本养老服务，走出一条老有所养、老有所医、老有所为、老有所学、老有所乐的中国特色积极应对人口老龄化道路。强化基本民生保障，健全分层分类、城乡统筹的社会救助体系，聚焦困难群众、孤老孤残孤儿等特殊群体，促进资源向薄弱地区、领域和环节倾斜，兜牢民生底线。第七条　与其他部门的职责分工：（一）与国家卫生健康委员会的有关职责分工。民政部负责组织拟订并协调落实积极应对人口老龄化、促进养老事业发展的政策措施，拟订养老服务体系建设规划、法规、政策、标准并组织实施，承担老年人福利和特殊困难老年人救助等工作。国家卫生健康委员会负责拟订医养结合政策措施，承担老年疾病防治、老年人医疗照护、老年人心理健康与关怀服务等老年健康工作。（二）与自然资源部的有关职责分工。民政部会同自然资源部组织编制公布行政区划信息的中华人民共和国行政区划图。第八条　民政部根据本规定第五条所明确的主要职责，编制权责清单，逐项明确权责名称、权责类型、设定依据、履责方式、追责情形等。在此基础上，制定办事指南、运行流程图等，进一步优化行政程序，规范权力运行。第九条　民政部设下列正司局级内设机构：（一）办公厅（国际合作司）。负责机关日常运转，承担信息、安全、保密、信访、政务公开、新闻宣传、国际交流合作、与港澳台地区交流合作等工作。（二）政策法规司。负责起草有关法律法规草案和规章，承担民政行业标准化工作，承担规范性文件的合法性审查和行政复议、行政应诉等工作。（三）规划财务司。拟订民政事业发展规划和民政基础设施建设标准，指导和监督中央财政拨付的民政事业资金管理工作。拟订民政部门彩票公益金使用管理办法，管理本级彩票公益金。承担民政统计管理和机关及直属单位预决算、财务、资产管理与内部审计工作。（四）社会组织管理局（社会组织执法监督局）。拟订社会团体、基金会、社会服务机构等社会组织登记和监督管理办法，按照管理权限对社会组织进行登记管理和执法监督，指导地方对社会组织的登记管理和执法监督工作。（五）社会救助司。拟订城乡居民最低生活保障、特困人员救助供养、临时救助等社会救助政策和标准，健全城乡社会救助体系，承办中央财政困难群众救助补助资金分配和监管工作。参与拟订医疗、住房、教育、就业、司法等救助有关办法。（六）区划地名司。研究拟订行政区划总体规划思路建议，按照管理权限承担行政区划设立、命名、变更和政府驻地迁移等审核工作。承担行政区划代码管理工作，组织、指导省县级行政区域界线的勘定和管理，监督管理地名工作，承担重要自然地理实体以及各国管辖范围外区域的地理实体、天体地理实体的命名和更名审核工作，参与联合国地名标准化建设工作。（七）社会事务司。推进婚俗和殡葬改革，拟订婚姻、殡葬、残疾人权益保护、生活无着流浪乞讨人员救助管理政策，参与拟订残疾人集中就业扶持政策，指导婚姻登记机关和残疾人社会福利、殡葬服务、生活无着流浪乞讨人员救助管理机构有关工作，负责协调省际生活无着流浪乞讨人员救助事务，指导开展家庭暴力受害人临时庇护救助工作。（八）老龄工作司。承担全国老龄工作委员会办公室的具体工作。拟订并协调落实积极应对人口老龄化的政策措施，指导协调老年人权益保障工作，组织开展人口老龄化国情宣传教育，拟订老年人社会参与政策并组织实施，承担老年人口状况、老龄事业发展的统计调查工作。（九）养老服务司。拟订并协调落实促进养老事业发展的政策措施，承担老年人福利工作，拟订老年人福利补贴制度和养老服务体系建设规划、政策、标准，协调推进农村留守老年人关爱服务工作，指导养老服务机构、老年人福利机构、特困人员救助供养机构管理工作。（十）儿童福利司。拟订儿童福利、孤弃儿童保障、儿童收养、儿童救助保护政策和标准。健全农村留守儿童关爱服务体系，完善困境儿童保障制度，指导儿童福利机构、儿童收养登记机构、儿童救助保护机构管理工作。（十一）慈善事业促进司。拟订促进慈善事业发展政策和慈善信托、慈善组织及其活动管理办法。指导社会捐助工作。拟订福利彩票管理制度，监督福利彩票的开奖和销毁，管理监督福利彩票代销行为。机关党委（人事司）。负责机关及在京直属单位党的建设和纪检工作，领导机关群团组织的工作，承担内部巡视工作。承担机关及直属单位的人事管理、机构编制、教育培训、科技管理及队伍建设等工作。机关党委设立机关纪委，承担机关及在京直属单位纪检、党风廉政建设有关工作。离退休干部局。负责机关离退休干部工作，指导直属单位离退休干部工作。"},{"type":"国家粮食和物资储备局","description":"（一）起草全国粮食流通和物资储备管理的法律法规草案、部门规章。研究提出粮食流通和物资储备体制改革方案并组织实施。（二）研究提出国家战略物资储备规划、国家储备品种目录的建议。根据国家储备总体发展规划和品种目录，组织实施国家战略和应急储备物资的收储、轮换和日常管理，落实有关动用计划和指令。（三）管理国家粮食、棉花和食糖储备，负责中央储备粮棉行政管理。监测国际国内粮食和战略物资供求变化并预测预警，承担全国粮食流通宏观调控的具体工作，承担粮食安全省长责任制考核日常工作。（四）拟订粮食和物资储备仓储管理有关技术标准和规范并组织实施。负责粮食流通、加工行业安全生产工作的监督管理，承担国家物资储备承储单位安全生产的监管责任。（五）根据国家储备总体发展规划，统一负责储备基础设施建设和管理。拟订国家储备基础设施、粮食流通设施建设规划并组织实施，管理有关储备基础设施和粮食流通设施国家投资项目。（六）负责对管理的政府储备、企业储备以及储备政策落实情况进行监督检查。负责粮食流通监督检查，负责粮食收购、储存、运输环节粮食质量安全和原粮卫生的监督管理，组织实施全国粮食库存检查工作。（七）负责粮食流通行业管理，制定行业发展规划、政策，拟订粮食流通和物资储备有关标准、粮食质量标准，制定有关技术规范并监督执行。负责粮食和物资储备的对外合作与交流。（八）完成党中央、国务院交办的其他任务。（九）职能转变。1.充分发挥市场在资源配置中的决定性作用，进一步精简行政审批，减少环节、简化程序、提高效率，大幅降低制度性交易成本。2.改革完善储备体系和运营方式，加强中央储备，完善地方储备，进一步发挥政府储备引导作用，鼓励企业商业储备，推动形成中央储备与地方储备、政府储备与企业储备互为补充的协同发展格局。3.加强市场分析预测和监测预警，充分运用大数据等科技手段，强化动态监控，提高储备防风险能力，增强储备在保障国家安全、稳定社会预期、引导市场方面的作用。4.加强监督管理，创新监管方式，全面推进“双随机、一公开”和“互联网+监管”，着力加强安全生产，根据国家储备总体发展规划和品种目录及动用指令，监督储备主体做好收储、轮换，确保国家储备物资收得进、储得好、调得动、用得上。（十）有关职责分工。1.与国家发展和改革委员会、国家能源局的职责分工。国家发展和改革委员会拟订中央储备粮棉糖等战略物资储备的规划和总量计划。国家能源局拟订石油、天然气战略储备规划，提出国家石油、天然气战略储备收储、动用建议，经国家发展和改革委员会审核后，报国务院审批。国家粮食和物资储备局负责收储、轮换，按照国家发展和改革委员会的动用指令，按程序组织实施。2.与应急管理部的职责分工。应急管理部负责提出中央救灾物资的储备需求和动用决策，组织编制中央救灾物资储备规划、品种目录和标准，会同国家粮食和物资储备局等部门确定年度购置计划，根据需要下达动用指令。国家粮食和物资储备局根据中央救灾物资储备规划、品种目录和标准、年度购置计划，负责中央救灾物资的收储、轮换和日常管理，根据应急管理部的动用指令按程序组织调出。3.与中国储备粮管理集团有限公司（以下简称中储粮公司）的职责分工。中储粮公司具体负责承储的中央储备粮棉的经营管理，对其数量、质量和储存安全负责。国家粮食和物资储备局依法对中储粮公司承储的中央事权粮棉政策执行和中央储备粮棉管理情况实施监督检查和年度考核。国家发展和改革委员会、国家粮食和物资储备局下达中储粮公司的中央投资项目基本建设计划，由中储粮公司组织实施。国家粮食和物资储备局设下列内设机构（副司局级）：（一）办公室（外事司）。负责机关日常运转，承担安全、保密、信访、政务公开等工作。组织研究粮食和物资储备的重大问题，承担新闻宣传工作。开展粮食和物资储备对外交流合作，承担机关和直属单位的外事工作。（二）粮食储备司。研究提出粮食购销政策和最低收购价原则的建议并组织实施，拟订粮食收购市场准入指导标准，研究提出中央储备粮棉糖收购、销售、进出口计划并组织实施，管理轮换计划。指导协调政策性粮食购销和地方储备粮管理，拟订全国粮食市场体系建设与发展规划并组织实施。归口管理全局统计工作，承担粮棉糖市场监测预警、统计工作。（三）物资储备司。拟订战略物资储备政策和规章制度并组织实施，研究提出健全战略物资储备体系的建议，研究提出战略物资储备规划、计划的建议，组织实施战略物资储备的收储、轮换和日常管理。承担战略物资储备统计工作。（四）能源储备司。拟订原油、成品油、天然气收储、轮换和日常管理的政策和规章制度并组织实施，落实有关动用计划和指令。承担相关储备统计工作。（五）法规体改司。承担粮食流通和物资储备体制改革工作，组织起草粮食流通和物资储备管理的法律法规草案和规章，承担规范性文件合法性审查工作，承担行政复议、行政应诉等工作。（六）规划建设司。研究提出国家储备总体发展规划和品种目录的建议，组织编制粮食流通、加工和物资储备基础设施建设规划，提出粮食流通和物资储备中央投资和财政性资金投资方向、规模以及安排的建议。按照规定权限组织有关项目的资金申请、项目审核并指导实施，承担粮食和物资储备信息化建设工作。（七）财务审计司。拟订有关财务管理、资产管理、审计监督等制度、办法并组织实施，编制部门预决算，负责管理相关资金，承担内部审计工作，负责所属单位国有资产监督管理。（八）安全仓储与科技司。承担所属物资储备单位安全储存和安全生产的监管，承担粮食流通、加工行业安全生产工作的监督管理。制定粮食和物资储备的仓储管理政策和制度并组织实施。制定中央救灾物资储备政策和制度，组织实施中央救灾物资的收储、轮换和日常管理。组织拟订粮食流通和物资储备有关标准、粮食质量标准，制定有关技术规范并监督执行，指导粮食流通和物资储备的科技创新、技术改造。（九）执法督查局。拟订粮食和物资储备监督检查制度并组织实施，监督检查粮食和物资储备数量、质量和储存安全，以及有关法律法规、规章等制度和政策执行情况。对中央事权粮棉政策执行和中央储备粮棉管理情况实施依法监管和年度考核。建立健全储备责任追究机制，依法组织对重大案件查处和督查督办，组织指导粮食购销活动的监督检查。承担粮食安全省长责任制考核的具体工作。机关党委（人事司）。负责机关和在京直属单位的党群工作，指导物资储备系统的党群工作。承担机关、系统和直属单位的干部人事、机构编制、劳动工资工作，指导行业人才队伍建设和教育培训工作。离退休干部办公室。负责机关离退休干部工作，指导系统和直属单位的离退休干部工作。"},{"type":"科学技术部","description":"（一）拟订国家创新驱动发展战略方针以及科技发展、引进国外智力规划和政策并组织实施。（二）统筹推进国家创新体系建设和科技体制改革，会同有关部门健全技术创新激励机制。优化科研体系建设，指导科研机构改革发展，推动企业科技创新能力建设，承担推进科技军民融合发展相关工作，推进国家重大科技决策咨询制度建设。（三）牵头建立统一的国家科技管理平台和科研项目资金协调、评估、监管机制。会同有关部门提出优化配置科技资源的政策措施建议，推动多元化科技投入体系建设，协调管理中央财政科技计划（专项、基金等）并监督实施。（四）拟订国家基础研究规划、政策和标准并组织实施，组织协调国家重大基础研究和应用基础研究。拟订重大科技创新基地建设规划并监督实施，参与编制重大科技基础设施建设规划和监督实施，牵头组织国家实验室建设，推动科研条件保障建设和科技资源开放共享。（五）编制国家重大科技项目规划并监督实施，统筹关键共性技术、前沿引领技术、现代工程技术、颠覆性技术研发和创新，牵头组织重大技术攻关和成果应用示范。组织协调国际大科学计划和大科学工程。（六）组织拟订高新技术发展及产业化、科技促进农业农村和社会发展的规划、政策和措施。组织开展重点领域技术发展需求分析，提出重大任务并监督实施。（七）牵头国家技术转移体系建设，拟订科技成果转移转化和促进产学研结合的相关政策措施并监督实施。指导科技服务业、技术市场和科技中介组织发展。（八）统筹区域科技创新体系建设，指导区域创新发展、科技资源合理布局和协同创新能力建设，推动科技园区建设。（九）负责科技监督评价体系建设和相关科技评估管理，指导科技评价机制改革，统筹科研诚信建设。组织实施国家创新调查和科技报告制度，指导全国科技保密工作。（十）拟订科技对外交往与创新能力开放合作的规划、政策和措施，组织开展国际科技合作与科技人才交流。指导相关部门和地方对外科技合作与科技人才交流工作。（十一）负责引进国外智力工作。拟订国家重点引进外国专家总体规划、计划并组织实施，建立外国顶尖科学家、团队吸引集聚机制和重点外国专家联系服务机制。拟订出国（境）培训总体规划、政策和年度计划并监督实施。（十二）会同有关部门拟订科技人才队伍建设规划和政策，建立健全科技人才评价和激励机制，组织实施科技人才计划，推动高端科技创新人才队伍建设。拟订科学普及和科学传播规划、政策。（十三）负责国家科学技术奖、中国政府友谊奖的评审组织工作。（十四）负责管理国家自然科学基金委员会（简称自然科学基金委），依法对国家自然科学基金工作进行宏观管理、统筹协调和监督评估。自然科学基金委依法管理国家自然科学基金，相对独立运行，负责资助计划、项目设置和评审、立项、监督等组织实施工作。（十五）代管科技日报社。（十六）完成党中央、国务院交办的其他任务。（十七）职能转变。围绕贯彻实施科教兴国战略、人才强国战略、创新驱动发展战略，加强、优化、转变政府科技管理和服务职能，完善科技创新制度和组织体系，加强宏观管理和统筹协调，减少微观管理和具体审批事项，加强事中事后监管和科研诚信建设。从研发管理向创新服务转变，深入推进科技计划管理改革，建立公开统一的国家科技管理平台，减少科技计划项目重复、分散、封闭、低效和资源配置“碎片化”的现象。政府部门不直接管理具体科研项目，委托项目管理专业机构开展项目受理、评审、立项、过程管理、验收等具体工作。对一般性出国（境）培训项目和其他培训项目不再进行审批审核，由各部门结合本行业本领域实际安排。对科研机构组建和调整事项不再进行审核，重在加强规划布局和绩效评价。进一步改进科技人才评价机制，建立健全以创新能力、质量、贡献、绩效为导向的科技人才评价体系和激励政策，统筹国内科技人才队伍建设和引进国外智力工作。第四条　科学技术部设下列内设机构：（一）办公厅。负责机关日常运转，承担信息、安全、保密、信访、政务公开、信息化、新闻宣传等工作。（二）战略规划司。拟订科技创新发展战略、规划并协调实施，组织开展技术预测，承担国家重大科技决策咨询制度运行相关工作。实施国家创新调查制度，承担科技统计相关工作。（三）政策法规与创新体系建设司。承担推进国家创新体系建设和科技体制改革工作，拟订科技创新政策措施，组织起草相关法律法规草案和规章并开展普法宣传，提出激励企业技术创新的政策建议。拟订科研机构改革发展与布局的规划和政策并监督实施，组织开展科研机构创新绩效管理。承担科技军民融合发展、科技安全和科技保密相关工作。（四）资源配置与管理司。承担建立国家科技管理平台和科研项目资金协调、评估、监管机制相关工作，协调提出科技资源合理配置的政策措施建议。承担中央财政科技计划（专项、基金等）协调管理工作，建设管理国家科技管理信息系统，指导项目管理专业机构建设，实施国家科技报告制度。负责本部门预算相关工作。（五）科技监督与诚信建设司。承担科技监督评价体系建设和科技评估管理相关工作，提出科技评价机制改革的政策措施建议并监督实施，开展科技评估评价和监督检查工作。承担科研诚信建设工作。（六）重大专项司。会同有关方面研究提出国家科技重大专项布局规划建议，拟订科技重大专项实施办法，审核实施计划，提出综合平衡、方案调整和相关配套政策建议，跟踪和监督实施，协调解决重大问题，组织评估和验收。（七）基础研究司。拟订国家基础研究规划、政策和标准并组织实施，协调国家重大基础研究和应用基础研究，研究提出重大任务并监督实施。提出国家实验室等重大科技创新基地和科研条件保障规划建议并监督实施。推进科技资源和科学数据开放共享。（八）高新技术司。拟订相关领域高新技术发展的规划和政策，组织开展相关领域技术发展需求分析，提出重大任务并监督实施，推动重大关键技术攻关。提出相关领域平台、基地规划布局并组织实施。（九）农村科技司。拟订科技促进农业农村发展的规划和政策，提出重大任务并监督实施，推动重大关键技术攻关。指导农村科技进步和县域创新驱动发展工作，推动科技扶贫工作和农村科技社会化服务体系建设。提出相关领域平台、基地规划布局并组织实施。（十）社会发展科技司。拟订社会发展领域科技创新的规划和政策，提出重大任务并监督实施，推动重大关键技术攻关。促进生物技术发展及产业化，推动绿色技术创新，开展科技应对气候变化工作。提出相关领域平台、基地规划布局并组织实施。（十一）成果转化与区域创新司。承担国家技术转移体系工作，提出科技成果转移转化及产业化、促进产学研深度融合、科技知识产权创造的相关政策措施建议，推动科技服务业、技术市场和科技中介组织发展。承担区域科技创新体系建设工作，指导国家自主创新示范区、国家高新技术产业开发区等建设。（十二）外国专家服务司。拟订外国专家管理办法，推动建立外国顶尖科学家、团队吸引集聚机制和重点外国专家联系服务机制，承担重点外国专家服务工作。（十三）引进国外智力管理司。拟订引进国外智力规划和政策，拟订出国（境）培训总体规划、政策和年度计划并监督实施，组织实施重点出国（境）培训项目。提出科技人才队伍建设规划和政策建议，承担相关科技人才计划实施工作，推动高端科技创新人才队伍建设。拟订全国科学普及和科学传播的规划、政策。（十四）国际合作司（港澳台办公室）。拟订科技对外交往、科技交流及创新能力开放合作的规划、政策和措施并推动落实，实施“一带一路”科技创新合作行动计划，协调推进国际大科学计划和大科学工程。会同有关方面指导驻外机构相关业务工作。承担涉港澳台科技合作与交流事宜。（十五）人事司。承担机关和直属单位的干部人事、机构编制、劳动工资和教育工作。承担有关驻外人员的选派与相关管理工作。机关党委。负责机关和在京直属单位的党群工作。离退休干部局。负责离退休干部工作。第五条　科学技术部机关行政编制364名（含两委人员编制4名、援派机动编制4名、离退休干部工作人员编制28名）。设部长1名，副部长4名，司局级领导职数67名（含正副秘书长2名、机关党委专职副书记1名、离退休干部局领导职数3名）。第六条　科学技术部所属事业单位的设置、职责和编制事项另行规定。第七条　本规定由中央机构编制委员会办公室负责解释，其调整由中央机构编制委员会办公室按规定程序办理。第八条　本规定自2018年7月30日起施行。2021年1月，经中央编办批准，科技部“引进国外智力管理司”更名为“科技人才与科学普及司”，主要职责不变。"},{"type":"国务院港澳事务办公室","description":"（一）贯彻执行“一国两制”、“港人治港”、“澳人治澳”、高度自治方针，坚持依法治港治澳，执行宪法和香港特别行政区基本法、澳门特别行政区基本法，落实“爱国者治港”、“爱国者治澳”原则，维护国家主权、安全、发展利益，促进港澳长期繁荣稳定。（二）加强港澳工作的统筹协调、督促落实，组织开展对重大问题的调查研究，提出政策建议。（三）组织研究起草涉港澳有关法律法规草案并提出立法建议，就基本法等涉港澳重要法律实施涉及的相关法律问题研究提出意见。（四）支持特别行政区行政长官和特别行政区政府依法施政，推动建立完善特别行政区同宪法、基本法实施相关的制度和机制。（五）研究提出健全特别行政区行政长官对中央政府负责的制度、完善中央对特别行政区行政长官和主要官员的任免制度和机制的措施建议。（六）协调有关部门研究拟订支持港澳发展经济、保障民生福祉等方面的政策建议并推动落实。（七）组织落实特别行政区维护国家安全的法律制度和执行机制工作。（八）协调涉港澳宣传工作，依法管理港澳新闻机构驻内地记者站和记者。（九）协助特别行政区加强宪法和基本法以及国家安全法教育、国情教育、中国历史和中华文化教育，增强港澳社会的国家意识和爱国精神。（十）负责内地与特别行政区政府和特别行政区行政长官的官方交往和工作联系，协调推动有关部门和地方加强与港澳交流合作，指导和管理内地与港澳因公往来有关事务。对中央驻港澳机构提出的有关事宜提供意见、建议和工作协助。（十一）完成党中央交办的其他任务。"},{"type":"国家医疗保障局","description":"（一）拟订医疗保险、生育保险、医疗救助等医疗保障制度的法律法规草案、政策、规划和标准，制定部门规章并组织实施。（二）组织制定并实施医疗保障基金监督管理办法，建立健全医疗保障基金安全防控机制，推进医疗保障基金支付方式改革。（三）组织制定医疗保障筹资和待遇政策，完善动态调整和区域调剂平衡机制，统筹城乡医疗保障待遇标准，建立健全与筹资水平相适应的待遇调整机制。组织拟订并实施长期护理保险制度改革方案。（四）组织制定城乡统一的药品、医用耗材、医疗服务项目、医疗服务设施等医保目录和支付标准，建立动态调整机制，制定医保目录准入谈判规则并组织实施。（五）组织制定药品、医用耗材价格和医疗服务项目医疗服务设施收费等政策，建立医保支付医药服务价格合理确定和动态调整机制，推动建立市场主导的社会医药服务价格形成机制，建立价格信息监测和信息发布制度。（六）制定药品、医用耗材的招标采购政策并监督实施，指导药品、医用耗材招标采购平台建设。（七）制定定点医药机构协议和支付管理办法并组织实施，建立健全医疗保障信用评价体系和信息披露制度，监督管理纳入医保范围内的医疗服务行为和医疗费用，依法查处医疗保障领域违法违规行为。（八）负责医疗保障经办管理、公共服务体系和信息化建设。组织制定和完善异地就医管理和费用结算政策。建立健全医疗保障关系转移接续制度。开展医疗保障领域国际合作交流。（九）完成党中央、国务院交办的其他任务。（十）职能转变。国家医疗保障局应完善统一的城乡居民基本医疗保险制度和大病保险制度，建立健全覆盖全民城乡统筹的多层次医疗保障体系，不断提高医疗保障水平，确保医保资金合理使用、安全可控，推进医疗、医保、医药“三医联动”改革，更好保障人民群众就医需求、减轻医药费用负担。（十一）与国家卫生健康委员会的有关职责分工。国家卫生健康委员会、国家医疗保障局等部门在医疗、医保、医药等方面加强制度、政策衔接，建立沟通协商机制，协同推进改革，提高医疗资源使用效率和医疗保障水平。"},{"type":"国家能源局","description":"（一）负责起草能源发展和有关监督管理的法律法规送审稿和规章，拟订并组织实施能源发展战略、规划和政策，推进能源体制改革，拟订有关改革方案，协调能源发展和改革中的重大问题。（二）组织制定煤炭、石油、天然气、电力、新能源和可再生能源等能源，以及炼油、煤制燃料和燃料乙醇的产业政策及相关标准。按国务院规定权限，审批、核准、审核能源固定资产投资项目。指导协调农村能源发展工作。（三）组织推进能源重大设备研发及其相关重大科研项目，指导能源科技进步、成套设备的引进消化创新，组织协调相关重大示范工程和推广应用新产品、新技术、新设备。（四）负责核电管理，拟订核电发展规划、准入条件、技术标准并组织实施，提出核电布局和重大项目审核意见，组织协调和指导核电科研工作，组织核电厂的核事故应急管理工作。（五）负责能源行业节能和资源综合利用，参与研究能源消费总量控制目标建议，指导、监督能源消费总量控制有关工作，衔接能源生产建设和供需平衡。（六）负责能源预测预警，发布能源信息，参与能源运行调节和应急保障，拟订国家石油、天然气储备规划、政策并实施管理，监测国内外市场供求变化，提出国家石油、天然气储备订货、轮换和动用建议并组织实施，按规定权限审批或审核石油、天然气储备设施项目，监督管理商业石油、天然气储备。（七）监管电力市场运行，规范电力市场秩序，监督检查有关电价，拟订各项电力辅助服务价格，研究提出电力普遍服务政策的建议并监督实施，负责电力行政执法。监管油气管网设施的公平开放。（八）负责电力安全生产监督管理、可靠性管理和电力应急工作，制定除核安全外的电力运行安全、电力建设工程施工安全、工程质量安全监督管理办法并组织监督实施，组织实施依法设定的行政许可。依法组织或参与电力生产安全事故调查处理。（九）组织推进能源国际合作，按分工同外国能源主管部门和国际能源组织谈判并签订协议，协调境外能源开发利用工作。按规定权限核准或审核能源（煤炭、石油、天然气、电力等）境外重大投资项目。（十）参与制定与能源相关的资源、财税、环保及应对气候变化等政策，提出能源价格调整和进出口总量建议。（十一）承担国家能源委员会具体工作。负责国家能源发展战略决策的综合协调和服务保障，推动建立健全协调联动机制。（十二）承办国务院、国家能源委员会以及国家发展和改革委员会交办的其他事项。二、内设机构根据上述职责，国家能源局设12个内设机构：（一）综合司负责文电、会务、机要、档案、督查、财务、资产管理等机关日常运转工作，承担政务公开、安全保密、信访，以及能源行业统计、预测预警等工作，承担国家能源委员会办公室的综合协调工作。（二）法制和体制改革司研究能源重大问题，组织起草能源发展和有关监督管理的法律法规、规章送审稿，承担有关规范性文件的合法性审核工作，承担行政执法监督、行政复议、行政应诉等工作，承担能源体制改革有关工作。（三）发展规划司研究提出能源发展战略建议，组织拟订能源发展规划、年度计划和产业政策，参与研究全国能源消费总量控制工作方案，指导、监督能源消费总量控制有关工作，承担能源综合业务。（四）能源节约和科技装备司指导能源行业节能和资源综合利用工作，承担科技进步和装备相关工作，组织拟订能源行业标准（煤炭除外）。（五）电力司拟订火电和电网有关发展规划、计划和政策并组织实施，承担电力体制改革有关工作，衔接电力供需平衡。（六）核电司拟订核电发展规划、计划和政策并组织实施，组织核电厂的核事故应急管理工作。（七）煤炭司拟订煤炭开发、煤层气、煤炭加工转化为清洁能源产品的发展规划、计划和政策并组织实施，承担煤炭体制改革有关工作，协调有关方面开展煤层气开发、淘汰煤炭落后产能、煤矿瓦斯治理和利用工作。（八）石油天然气司（国家石油储备办公室）拟订油气开发、炼油发展规划、计划和政策并组织实施，承担石油天然气体制改革有关工作，承担国家石油、天然气储备管理工作，监督管理商业石油、天然气储备。（九）新能源和可再生能源司。指导协调新能源、可再生能源和农村能源发展，组织拟订新能源、水能、生物质能和其他可再生能源发展规划、计划和政策并组织实施。（十）市场监管司组织拟订电力市场发展规划和区域电力市场设置方案，监管电力市场运行，监管输电、供电和非竞争性发电业务，处理电力市场纠纷，研究提出调整电价建议，监督检查有关电价和各项辅助服务收费标准，研究提出电力普遍服务政策的建议并监督实施，监管油气管网设施的公平开放。（十一）电力安全监管司组织拟订除核安全外的电力运行安全、电力建设工程施工安全、工程质量安全监督管理办法的政策措施并监督实施，承担电力安全生产监督管理、可靠性管理和电力应急工作，负责水电站大坝的安全监督管理，依法组织或参与电力生产安全事故调查处理。（十二）国际合作司组织推进能源国际交流与合作，按分工承担同外国能源主管部门和国际能源组织谈判并签订协议有关工作，拟订能源对外开放战略、规划及政策，协调境外能源开发利用。机关党委（人事司）承担机关和区域能源监管机构等直属单位的人事管理、机构编制、队伍建设、纪检监察等工作，负责机关和在京直属单位的党群工作。三、人员编制国家能源局机关行政编制240名。其中：局长1名、副局长4名，党组纪检组组长1名，司局领导职数42名（含监管总监1名、总工程师1名、总经济师1名、机关党委专职副书记1名）。"},{"type":"中华人民共和国交通运输部","description":"（一）承担涉及综合运输体系的规划协调工作，会同有关部门组织编制综合运输体系规划，指导交通运输枢纽规划和管理。（二）组织拟订并监督实施公路、水路、民航等行业规划、政策和标准。组织起草法律法规草案，制定部门规章。参与拟订物流业发展战略和规划，拟订有关政策和标准并监督实施。指导公路、水路行业有关体制改革工作。（三）承担道路、水路运输市场监管责任。组织制定道路、水路运输有关政策、准入制度、技术标准和运营规范并监督实施。指导城乡客运及有关设施规划和管理工作，指导出租汽车行业管理工作。负责汽车出入境运输、国际和国境河流运输及航道有关管理工作。（四）承担水上交通安全监管责任。负责水上交通管制、船舶及相关水上设施检验、登记和防止污染、航海保障、救助打捞、通信导航、船舶与港口设施保安及危险品运输监督管理等工作。负责船员管理有关工作。负责中央管理水域水上交通安全事故、船舶及相关水上设施污染事故的应急处置，依法组织或参与事故调查处理工作，指导地方水上交通安全监管工作。（五）负责提出公路、水路固定资产投资规模和方向、国家财政性资金安排意见，按国务院规定权限审批、核准国家规划内和年度计划规模内固定资产投资项目。拟订公路、水路有关规费政策并监督实施，提出有关财政、土地、价格等政策建议。（六）承担公路、水路建设市场监管责任。拟订公路、水路工程建设相关政策、制度和技术标准并监督实施。组织协调公路、水路有关重点工程建设和工程质量、安全生产监督管理工作,指导交通运输基础设施管理和维护，承担有关重要设施的管理和维护。按规定负责港口规划和岸线使用管理工作。（七）指导公路、水路行业安全生产和应急管理工作。按规定组织协调国家重点物资和紧急客货运输，负责国家高速公路及重点干线路网运行监测和协调，承担国防动员有关工作。（八）指导交通运输信息化建设，监测分析运行情况，开展相关统计工作，发布有关信息。指导公路、水路行业环境保护和节能减排工作。（九）负责公路、水路国际合作与外事工作,开展与港澳台地区的交流与合作。（十）承办国务院交办的其他事项。2013年11月25日（一）负责推进综合交通运输体系建设，统筹规划铁路、公路、水路、民航以及邮政行业发展，建立与综合交通运输体系相适应的制度体制机制，优化交通运输主要通道和重要枢纽节点布局，促进各种交通运输方式融合。（二）负责组织拟订综合交通运输发展战略和政策，组织编制综合交通运输体系规划，拟订铁路、公路、水路发展战略、政策和规划，统筹衔接平衡铁路、公路、水路、民航等规划，指导综合交通运输枢纽规划和管理。（三）负责组织起草综合交通运输法律法规草案，统筹铁路、公路、水路、民航、邮政相关法律法规草案的起草工作。（四）负责拟订综合交通运输标准，协调衔接各种交通运输方式标准。（五）负责提出铁路、公路、水路固定资产投资规模和方向、国家财政性资金安排意见，按国务院规定权限审批、核准国家规划内和年度计划规模内固定资产投资项目，参与铁路投融资体制改革和有关政策拟订工作。（六）牵头组织编制国家重大海上溢油应急处置预案并组织实施，承担组织、协调、指挥重大海上溢油应急处置等有关工作。负责船员管理和防抗海盗有关工作。（七）负责国家公路网运行监测和应急处置协调工作，承担综合交通运输统计工作，监测分析交通运输运行情况，发布有关信息。（八）拟订经营性机动车营运安全标准，指导营运车辆综合性能检测管理，参与机动车报废政策、标准制定工作。（九）承担公路、水路国家重点基本建设项目的绩效监督和管理工作。统筹协调交通运输国际合作与交流有关事项。（十）管理国家铁路局、中国民用航空局、国家邮政局，并按有关规定管理国家铁路局、中国民用航空局、国家邮政局机关党的工作。2018年9月13日（一）负责渔船检验和监督管理工作。（二）负责指导交通运输综合执法和队伍建设有关工作。"},{"type":"国家国际发展合作署","description":"拟订对外援助战略方针、规划、政策，统筹协调援外重大问题并提出建议，推进援外方式改革，编制对外援助方案和计划，确定对外援助项目并监督评估实施情况等。援外的具体执行工作仍由相关部门按分工承担。"},{"type":"国家统计局","description":"（一）承担组织领导和协调全国统计工作，确保统计数据真实、准确、及时的责任。制定统计政策、规划、全国基本统计制度和国家统计标准，起草统计法律法规草案，制定部门规章，指导全国统计工作。（二）建立健全国民经济核算体系，拟订国民经济核算制度，组织实施全国及省、自治区、直辖市国民经济核算制度和全国投入产出调查，核算全国及省、自治区、直辖市国内生产总值，汇编提供国民经济核算资料，监督管理各地区国民经济核算工作。（三）会同有关部门拟订重大国情国力普查计划、方案，组织实施全国人口、经济、农业等重大国情国力普查，汇总、整理和提供有关国情国力方面的统计数据。（四）组织实施农林牧渔业、工业、建筑业、批发和零售业、住宿和餐饮业、房地产业、租赁和商务服务业、居民服务和其他服务业、文化体育和娱乐业以及装卸搬运和其他运输服务业、仓储业、计算机服务业、软件业、科技交流和推广服务业、社会福利业等统计调查，收集、汇总、整理和提供有关调查的统计数据，综合整理和提供地质勘查、旅游、交通运输、邮政、教育、卫生、社会保障、公用事业等全国性基本统计数据。（五）组织实施能源、投资、消费、价格、收入、科技、人口、劳动力、社会发展基本情况、环境基本状况等统计调查，收集、汇总、整理和提供有关调查的统计数据，综合整理和提供资源、房屋、对外贸易、对外经济等全国性基本统计数据。（六）组织各地区、各部门的经济、社会、科技和资源环境统计调查，统一核定、管理、公布全国性基本统计资料，定期发布全国国民经济和社会发展情况的统计信息，组织建立服务业统计信息共享制度和发布制度。（七）对国民经济、社会发展、科技进步和资源环境等情况进行统计分析、统计预测和统计监督，向党中央、国务院及有关部门提供统计信息和咨询建议。（八）审批部门统计标准，依法审批或者备案各部门统计调查项目、地方统计调查项目，指导专业统计基础工作、统计基层业务基础建设，组织建立服务业统计信息管理制度，建立健全统计数据质量审核、监控和评估制度，开展对重要统计数据的审核、监控和评估，依法监督管理涉外调查活动。（九）协助地方管理省、自治区、直辖市统计局局长和副局长，指导全国统计专业技术队伍建设，会同有关部门组织管理全国统计专业资格考试、职务评聘，监督管理地方政府统计部门由中央财政提供的统计经费和专项基本建设投资。（十）组织管理全国统计工作的监督检查，查处重大统计违法行为。（十一）建立并管理国家统计信息自动化系统和统计数据库系统，组织制定各地区、各部门统计数据库和网络的基本标准和运行规则，指导地方统计信息化系统建设。（十二）收集、整理国际统计数据，组织实施统计工作方面的国际交流合作项目，组织实施国际间统计资料交换和统计交流合作项目。（十三）承办国务院交办的其他事项。"},{"type":"国家体育总局","description":"一、研究体育发展战略，协调区域性体育发展，负责推动多元化体育服务体系建设，推进体育公共服务和体育体制改革。二、拟订体育事业发展规划和政策，起草有关法律法规草案并督促实施。三、统筹规划群众体育发展，负责推行全民健身计划，监督实施国家体育锻炼标准，推动国民体质监测和社会体育指导工作队伍制度建设，指导公共体育设施的建设，负责对公共体育设施的监督管理。四、统筹规划竞技体育发展，设置体育运动项目，指导协调体育训练和体育竞赛，指导运动队伍建设，协调运动员社会保障工作。五、统筹规划青少年体育发展，指导和推进青少年体育工作。六、拟订体育产业发展规划、政策，规范体育服务管理，推动体育标准化建设，负责体育彩票发行管理。七、指导、管理体育外事有关工作，组织开展国际间和与港澳台的体育交流与合作。八、组织开展体育领域重大科技研究、技术攻关和成果推广。九、负责组织、协调、监督体育运动中的反兴奋剂工作。十、承办国务院交办的其他事项。"},{"type":"工业和信息化部","description":"中央编办关于工业和信息化部有关职责和机构调整的通知中央机构编制委员会办公室文件中央编办发﹝2015﹞17号工业和信息化部：你部《关于报送职责和机构编制调整意见的函》（工信部人〔2015〕10号）及相关补充意见（工人函〔2015〕50号）收悉。经研究并报国务院和中央编委领导同志批准，现就你部有关职责和机构调整事项通知如下：一、有关职责调整（一）将信息化推进、网络信息安全协调等职责划给中央网络安全和信息化领导小组办公室（国家互联网信息办公室）。调整后，工业和信息化部负责网络强国建设相关工作，推动实施宽带发展；负责互联网行业管理（含移动互联网）；协调电信网、互联网、专用通信网的建设，促进网络资源共建共享；组织开展新技术新业务安全评估，加强信息通信业准入管理，拟订相关政策并组织实施；指导电信和互联网相关行业自律和相关行业组织发展。负责电信网、互联网网络与信息安全技术平台的建设和使用管理；负责信息通信领域网络与信息安全保障体系建设；拟定电信网、互联网及工业控制系统网络与信息安全规划、政策、标准并组织实施，加强电信网、互联网及工业控制系统网络安全审查；拟订电信网、互联网数据安全管理政策、规范、标准并组织实施；负责网络安全防护、应急管理和处置。（二）加强和改善工业和通信业行业管理，充分发挥市场机制配置资源的决定性作用，强化工业和通信业发展战略规划、政策标准的引导和约束作用。根据职责分工拟订推动传统产业技术改造相关政策并组织实施。加强对促进中小企业发展的宏观指导和综合协调。加快推进信息化和工业化融合发展，大力促进电信、广播电视和计算机网络融合，着力推动军民融合深度发展，寓军于民，促进工业由大变强。二、有关职责分工（一）与国家发展和改革委员会在固定资产投资项目管理方面的职责分工。1、国家发展和改革委员会承担投资综合管理职责，负责拟订全社会固定资产投资总规模和投资结构的调控目标、政策及措施，会同相关部门拟订政府投资项目审批目录和政府核准的投资项目目录，明确投资审批、标准、审核的范围、标准和程序。2、国家发展改革委员会审批、核准、审核跨地区、跨行业、跨领域和涉及综合平衡、重大布局的项目，行业管理部门审批、核准需由中央层面管理的其他项目。国家发展和改革委员会审批、核准、审核项目须征求行业管理部门意见。3、涉及中央财政性建设资金的项目，由行业管理部门提出规模、方向和资金安排的意见，国家发展和改革委员会负责统筹平衡，其中需要行业管理部门组织实施的项目，投资计划由国家发展和改革委员会会同行业管理部门制定并联合下达。（二）与国家发展和改革委员会在固定资产投资项目节能评估和审查方面的职责分工。1、国家发展和改革委员会会同行业管理部门拟订固定资产投资项目节能评估和审查的法律法规草案及政策，制定统一的制度、规范和程序，建立健全第三方评估机制，推动发展和规范第三方评估机构。2、对国家发展和改革委员会审批、核准、审核的固定资产投资项目，由国家发展和改革委员会征求行业管理部门意见后，出具节能审查意见。对行业管理部门审批、核准的固定资产投资项目，由行业管理部门进行节能评审，提出评审意见；国家发展和改革委员会根据评审意见，在与能源消费总量、节能目标完成情况等进行衔接平衡后，出具节能审查意见。3、地方政府审批、核准的固定资产投资项目，由地方政府在本地区能源消费总量以内按照有关规定进行节能审查。三、有关机构调整（一）将原信息化推进司和原信息安全协调司承担的生产和制造系统信息安全和信息化职责与软件服务业司的职责进行整合，并将软件服务业司更名为信息化和软件服务业司。（二）将电信管理局更名为信息通信管理局。信息通信管理局的主要职责是：依法对电信和互联网等信息通信服务实行监管，承担互联网行业管理；拟订市场准入、监管政策、标准并组织实施；推进电信、广播电视和计算机网络融合；承担市场秩序、设备进网、服务质量、用户权益和个人信息保护等监管工作；指导电信和互联网相关行业自律和相关行业组织发展；承担通信网码号、互联网域名和IP地址、网站备案、接入服务等基础管理及国际协调；承担移动互联网及智能终端的管理；拟订网络有关数据采集、传输、存储、使用管理政策，规范信息通信服务市场；拟订网络架构与运行管理、互联互通与结算政策并监督执行；承担管理国家通信出入口局的工作；承担通信业应急体系建设及管理，组织协调国家应急通信及重要通信保障，承担国防通信信息动员和战备通信相关工作。（三）将通信保障局更名为网络安全管理局。网络安全管理局的主要职责是：组织拟订电信网、互联网及其相关网络与信息安全规划、政策和标准并组织实施；承担电信网、互联网网络与信息安全技术平台的建设和使用管理；承担电信和互联网行业网络安全审查相关工作，组织推动电信网、互联网安全自主可控工作；承担建立电信网、互联网新技术新业务安全评估制度并组织实施；指导督促电信企业和互联网企业落实网络与信息安全管理责任，组织开展网络环境和信息治理，配合处理网上有害信息，配合打击网络犯罪和防范网络失窃密；拟订电信网、互联网网络安全防护政策并组织实施；承担电信网、互联网网络与信息安全监测预警、威胁治理、信息通报和应急管理与处置；承担电信网、互联网网络数据和用户信息安全保护管理工作；承担特殊通信管理，拟订特殊通信、通信管制和网络管制的政策、标准；管理党政专用通信工作。（四）将通信发展司更名为信息通信发展司。信息通信发展司的主要职责是：协调电信网、互联网、专用通信网的建设，促进网络资源共建共享；拟订电信普遍服务政策并组织实施，推动宽带网络建设和应用水平提升；承担信息通信业经济运行分析、监测和预警，拟订信息通信业发展战略、规划和政策；牵头信息通信业标准化及相关国际标准制定和推广工作，拟订移动互联网、物联网、新一代移动通信等网络技术发展政策并组织实施；拟订信息通信业开放政策；拟订电信业务资费政策并监督实施；承担重要信息通信设施建设管理；监督管理通信建设市场；承担信息通信企业“走出去”和国际信息通道建设相关工作。（五）装备工业司加挂国家重大技术装备办公室牌子，相应增加1名司局领导职数。（六）将中小企业司更名为中小企业局。（七）根据内部司局之间有关职责调整，相应将国家履行《禁止化学武器公约》工作办公室牌子由原材料工业司改挂到安全生产司。调整后，工业和信息化部内设机构为22个，机关行政编制717名（含两委人员编制13名、援派机动编制1名、离退休干部工作人员编制118名、参事人员编制1名），其中：部长1名、副部长4名，司局领导职数101名（含总工程师2名、总经济师1名、机关党委专职副书记3名、离退休干部局领导职数7名）。中央编办2015年4月20日　　相关链接：《工业和信息化部主要职责内设机构和人员编制规定》印发"},{"type":"中华人民共和国海关总署","description":"（一）负责全国海关工作。拟订海关(含出入境检验检疫,下同)工作政策，起草相关法律法规草案，制定海关规划、部门规章、相关技术规范。（二）负责组织推动口岸“大通关”建设。会同有关部门制定口岸管理规章制度，组织拟订口岸发展规划并协调实施，牵头拟订口岸安全联合防控工作制度，协调开展口岸相关情报收集、风险分析研判和处置工作。协调口岸通关中各部门的工作关系，指导和协调地方政府口岸工作。（三）负责海关监管工作。制定进出境运输工具、货物和物品的监管制度并组织实施。按规定承担技术性贸易措施相关工作。依法执行进出口贸易管理政策，负责知识产权海关保护工作，负责海关标志标识管理。组织实施海关管理环节的反恐、维稳、防扩散、出口管制等工作。制定加工贸易等保税业务的海关监管制度并组织实施，牵头审核海关特殊监管区域的设立和调整。（四）负责进出口关税及其他税费征收管理。拟订征管制度，制定进出口商品分类目录并组织实施和解释。牵头开展多双边原产地规则对外谈判，拟订进出口商品原产地规则并依法负责签证管理等组织实施工作。依法执行反倾销和反补贴措施、保障措施及其他关税措施。（五）负责出入境卫生检疫、出入境动植物及其产品检验检疫。收集分析境外疫情，组织实施口岸处置措施，承担口岸突发公共卫生等应急事件的相关工作。（六）负责进出口商品法定检验。监督管理进出口商品鉴定、验证、质量安全等。负责进口食品、化妆品检验检疫和监督管理，依据多双边协议实施出口食品相关工作。（七）负责海关风险管理。组织海关贸易调查、市场调查和风险监测，建立风险评估指标体系、风险监测预警和跟踪制度、风险管理防控机制。实施海关信用管理，负责海关稽查。（八）负责国家进出口货物贸易等海关统计。发布海关统计信息和海关统计数据，组织开展动态监测、评估，建立服务进出口企业的信息公共服务平台。（九）负责全国打击走私综合治理工作。依法查处走私、违规案件，负责所管辖走私犯罪案件的侦查、拘留、执行逮捕、预审工作，组织实施海关缉私工作。（十）负责制定并组织实施海关科技发展规划、实验室建设和技术保障规划。组织相关科研和技术引进工作。（十一）负责海关领域国际合作与交流。代表国家参加有关国际组织，签署并执行有关国际合作协定、协议和议定书。（十二）垂直管理全国海关。（十三）完成党中央、国务院交办的其他任务。"},{"type":"中华人民共和国水利部","description":"（一）负责保障水资源的合理开发利用。拟订水利战略规划和政策，起草有关法律法规草案，制定部门规章，组织编制全国水资源战略规划、国家确定的重要江河湖泊流域综合规划、防洪规划等重大水利规划。（二）负责生活、生产经营和生态环境用水的统筹和保障。组织实施最严格水资源管理制度，实施水资源的统一监督管理，拟订全国和跨区域水中长期供求规划、水量分配方案并监督实施。负责重要流域、区域以及重大调水工程的水资源调度。组织实施取水许可、水资源论证和防洪论证制度，指导开展水资源有偿使用工作。指导水利行业供水和乡镇供水工作。（三）按规定制定水利工程建设有关制度并组织实施，负责提出中央水利固定资产投资规模、方向、具体安排建议并组织指导实施，按国务院规定权限审批、核准国家规划内和年度计划规模内固定资产投资项目，提出中央水利资金安排建议并负责项目实施的监督管理。（四）指导水资源保护工作。组织编制并实施水资源保护规划。指导饮用水水源保护有关工作，指导地下水开发利用和地下水资源管理保护。组织指导地下水超采区综合治理。（五）负责节约用水工作。拟订节约用水政策，组织编制节约用水规划并监督实施，组织制定有关标准。组织实施用水总量控制等管理制度，指导和推动节水型社会建设工作。（六）指导水文工作。负责水文水资源监测、国家水文站网建设和管理。对江河湖库和地下水实施监测，发布水文水资源信息、情报预报和国家水资源公报。按规定组织开展水资源、水能资源调查评价和水资源承载能力监测预警工作。（七）指导水利设施、水域及其岸线的管理、保护与综合利用。组织指导水利基础设施网络建设。指导重要江河湖泊及河口的治理、开发和保护。指导河湖水生态保护与修复、河湖生态流量水量管理以及河湖水系连通工作。（八）指导监督水利工程建设与运行管理。组织实施具有控制性的和跨区域跨流域的重要水利工程建设与运行管理。组织提出并协调落实三峡工程运行、南水北调工程运行和后续工程建设的有关政策措施，指导监督工程安全运行，组织工程验收有关工作，督促指导地方配套工程建设。（九）负责水土保持工作。拟订水土保持规划并监督实施，组织实施水土流失的综合防治、监测预报并定期公告。负责建设项目水土保持监督管理工作，指导国家重点水土保持建设项目的实施。（十）指导农村水利工作。组织开展大中型灌排工程建设与改造。指导农村饮水安全工程建设管理工作，指导节水灌溉有关工作。协调牧区水利工作。指导农村水利改革创新和社会化服务体系建设。指导农村水能资源开发、小水电改造和水电农村电气化工作。（十一）指导水利工程移民管理工作。拟订水利工程移民有关政策并监督实施，组织实施水利工程移民安置验收、监督评估等制度。指导监督水库移民后期扶持政策的实施，协调监督三峡工程、南水北调工程移民后期扶持工作，协调推动对口支援等工作。（十二）负责重大涉水违法事件的查处，协调和仲裁跨省、自治区、直辖市水事纠纷，指导水政监察和水行政执法。依法负责水利行业安全生产工作，组织指导水库、水电站大坝、农村水电站的安全监管。指导水利建设市场的监督管理，组织实施水利工程建设的监督。（十三）开展水利科技和外事工作。组织开展水利行业质量监督工作，拟订水利行业的技术标准、规程规范并监督实施。办理国际河流有关涉外事务。（十四）负责落实综合防灾减灾规划相关要求，组织编制洪水干旱灾害防治规划和防护标准并指导实施。承担水情旱情监测预警工作。组织编制重要江河湖泊和重要水工程的防御洪水抗御旱灾调度及应急水量调度方案，按程序报批并组织实施。承担防御洪水应急抢险的技术支撑工作。承担台风防御期间重要水工程调度工作。（十五）完成党中央、国务院交办的其他任务。（十六）职能转变。水利部应切实加强水资源合理利用、优化配置和节约保护。坚持节水优先，从增加供给转向更加重视需求管理，严格控制用水总量和提高用水效率。坚持保护优先，加强水资源、水域和水利工程的管理保护，维护河湖健康美丽。坚持统筹兼顾，保障合理用水需求和水资源的可持续利用，为经济社会发展提供水安全保障。"},{"type":"国家广播电视总局","description":"（一）贯彻党的宣传方针政策，拟订广播电视、网络视听节目服务管理的政策措施，加强广播电视阵地管理，把握正确的舆论导向和创作导向。（二）负责起草广播电视、网络视听节目服务管理的法律法规草案，制定部门规章、行业标准并组织实施和监督检查，指导、推进广播电视领域的体制机制改革。（三）负责制定广播电视领域事业发展政策和规划，组织实施公共服务重大公益工程和公益活动，指导、监督广播电视重点基础设施建设，扶助老少边贫地区广播电视建设和发展。（四）指导、协调、推动广播电视领域产业发展，制定发展规划、产业政策并组织实施。（五）负责对各类广播电视机构进行业务指导和行业监管，会同有关部门对网络视听节目服务机构进行管理。实施依法设定的行政许可，组织查处重大违法违规行为。（六）指导电视剧行业发展和电视剧创作生产。监督管理、审查广播电视节目、网络视听节目的内容和质量。指导、监管广播电视广告播放。（七）指导、协调广播电视全国性重大宣传活动，指导实施广播电视节目评价工作。（八）负责推进广播电视与新媒体新技术新业态融合发展，推进广电网与电信网、互联网三网融合。（九）组织制定广播电视科技发展规划、政策和行业技术标准并组织实施和监督检查。负责对广播电视节目传输覆盖、监测和安全播出进行监管，指导、推进国家应急广播体系建设。指导、协调广播电视系统安全和保卫工作。（十）开展广播电视国际交流与合作，协调推动广播电视领域走出去工作，负责广播电视节目的进口、收录和管理。（十一）指导广播电视、网络视听行业人才队伍建设。（十二）完成党中央、国务院交办的其他任务。　　第四条　国家广播电视总局设下列内设机构：　　（一）办公厅。负责文电、会议、应急值班、机要、档案、督查等机关日常运转工作，承担政务公开、新闻发布、保密、信访、机关安全保卫、建议提案办理和机关财务等工作，指导机关后勤服务管理和政务信息化工作。　　（二）政策法规司。研究起草广播电视、网络视听节目服务管理的重大政策、法律法规草案和规章，承担规范性文件的合法性审查工作。承担重大行政处罚听证、行政复议、行政应诉、涉外法律事务、普法宣传等工作。组织协调行政审批工作。　　（三）宣传司。指导、协调广播电视全国性重大宣传活动及重大突发事件报道和应急播报。指导全国广播电视节目的创作生产。指导、监管全国重大理论文献片、纪录片、电视动画片的创作生产和播出。　　（四）电视剧司。承担电视剧制作的指导、监管工作，组织审查国产电视剧、引进电视剧和对外合拍电视剧（含动画片）的内容。指导、调控电视剧的播出。　　（五）传媒机构管理司。承担广播电视播出机构和业务、广播电视节目制作机构、广播电视节目传送、有线电视付费频道、移动数字电视业务的监督管理工作。拟订广播电视节目评价政策并组织实施，指导、监管广播电视广告播放。　　（六）网络视听节目管理司。指导网络视听节目服务的发展和宣传。对信息网络和公共载体传播的视听节目进行监管，审查其内容和质量，承担节目应急处置工作。指导网络视听节目监管体系建设,组织查处非法开展网络视听节目服务行为。　　（七）媒体融合发展司。拟订广播电视重大改革措施，推进体制机制改革。协调推进三网融合，推进广播电视与新媒体新技术新业态创新融合发展。管理发放信息网络传播视听节目许可证，承担广播电视视频点播业务的审批工作。　　（八）科技司。拟订广播电视和网络视听科技发展政策、规划、行业标准并组织实施。协调推进广播电视科技创新和重大科技工程项目攻关。负责广播电视技术质量监督，指导广播电视技术计量检测和技术成果应用转化工作。　　（九）安全传输保障司。拟订广播电视传输覆盖网和监测监管网的规划，推进广播电视有线、无线、卫星等传输覆盖体系建设。负责广播电视安全播出的监督管理和技术保障工作，指导、监管广播电视节目传输覆盖工作。指导、推进国家应急广播体系建设，拟订广播电视有关安全制度和处置重大突发事件预案并组织实施。指导全国广播电视有线、无线传输设施和电台、电视台等重点单位安全保护工作。　　（十）规划财务司。研究拟订广播电视事业、产业发展规划并组织实施。承担行政单位和直属单位财务管理工作，负责预决算、国有资产管理、基本建设项目、政府采购及内部审计工作。承担广播电视统计工作。　　（十一）公共服务司。指导、推进广播电视公共服务标准化、均等化并实施监督。协调推进广播电视“户户通”、边疆和少数民族等地区广播电视基础设施建设、少数民族语言文字节目译制制作等重大工程。承担总局扶贫工作。　　（十二）国际合作司（港澳台办公室）。组织开展广播电视对外及对港澳台的交流与合作，协调推动广播电视领域走出去工作。承担广播电视节目的进口、收录和管理工作。监管卫星电视接收设施和境外卫星电视节目的落地与接收。　　（十三）人事司。承担机关和直属单位的干部人事管理工作。承担全国广播电视编辑记者、播音员主持人职业资格和网络视听从业人员管理工作。　　机关党委。负责机关和在京直属单位的党群纪检工作，承担总局内部巡视工作。　　离退休干部局。负责机关离退休干部工作，指导直属单位的离退休干部工作。　　第五条　国家广播电视总局机关行政编制263名。设局长1名，副局长4名；司局级领导职数46名（含总工程师1名、机关党委专职副书记1名、机关纪委领导职数1名、离退休干部局领导职数3名）。　　第六条　国家广播电视总局所属事业单位的设置、职责和编制事项另行规定。　　第七条　本规定由中央机构编制委员会办公室负责解释，其调整由中央机构编制委员会办公室按规定程序办理。　　第八条　本规定自2018年7月30日起施行。"},{"type":"中华人民共和国农业农村部","description":"（一）统筹研究和组织实施以乡村振兴为重心的“三农”工作发展战略、中长期规划、重大政策。组织起草农业农村和乡村振兴有关法律法规草案，制定部门规章，指导农业综合执法。参与涉农的财税、价格、收储、金融保险、进出口等政策制定。（二）统筹推动发展农村社会事业、农村公共服务、农村文化、农村基础设施和乡村治理。牵头组织改善农村人居环境。指导农村精神文明和优秀农耕文化建设。指导农业行业安全生产工作。（三）负责农民承包地、农村宅基地、农村集体产权制度改革和管理有关工作。拟订深化农村经济体制改革和巩固完善农村基本经营制度的政策。指导农村集体经济组织发展和集体资产管理工作。指导农民合作经济组织、农业社会化服务体系、新型农业经营主体建设与发展。（四）负责巩固拓展脱贫攻坚成果有关工作。牵头开展防止返贫监测和帮扶，组织拟订乡村振兴重点帮扶县和重点地区帮扶政策，组织开展东西部协作、定点帮扶、社会帮扶，会同有关部门组织实施过渡期内巩固拓展脱贫攻坚成果相关考核评估工作，研究提出中央财政衔接推进乡村振兴相关资金分配建议方案并指导、监督资金使用，推动乡村帮扶产业发展。承担农村低收入人口和欠发达地区常态化帮扶有关工作，构建长效帮扶机制。（五）负责指导乡村特色产业、农产品加工业、休闲农业和乡镇企业发展工作，推动延长农产品产业链。提出促进大宗农产品流通的建议，培育、保护农业品牌。发布农业农村经济信息，监测分析农业农村经济运行。承担农业统计和农业农村信息化有关工作。（六）负责种植业、畜牧业、渔业、农垦、农业机械化等农业各产业的监督管理。指导粮食等农产品生产，推进构建多元化食物供给体系。组织构建现代农业产业体系、生产体系、经营体系，指导农业标准化生产。负责双多边渔业谈判和履约工作。负责远洋渔业管理和渔政渔港监督管理。（七）负责农产品质量安全监督管理。组织开展农产品质量安全监测、追溯、风险评估。提出技术性贸易措施建议。参与制定农产品质量安全国家标准并会同有关部门组织实施。指导农业检验检测体系建设。（八）负责耕地、永久基本农田质量保护和高标准农田建设工作。组织农业资源区划工作。指导农用地、渔业水域以及农业生物物种资源的保护与管理，负责水生野生动植物保护工作。指导农产品产地环境管理和农业清洁生产。指导设施农业、生态循环农业、节水农业发展以及农村可再生能源综合开发利用、农业生物质产业发展。牵头管理外来物种。（九）负责有关农业生产资料和农业投入品的监督管理。组织农业生产资料市场体系建设，拟订有关农业生产资料国家标准并监督实施。拟订种业振兴政策并组织实施。制定兽药质量、兽药残留限量和残留检测方法国家标准并按规定发布。组织兽医医政、兽药药政药检工作，负责执业兽医和畜禽屠宰行业管理。（十）负责农业防灾减灾、农作物重大病虫害防治工作。指导动植物防疫检疫体系建设，组织、监督国内动植物防疫检疫工作，发布疫情并组织扑灭。（十一）负责农业投资管理。提出农业投融资体制机制改革建议。编制中央投资安排的农业投资项目建设规划，提出农业投资规模和方向、扶持农业农村发展财政项目的建议，按国务院规定权限审批农业投资项目，负责农业投资项目资金安排和监督管理。（十二）负责组织拟订农业农村科技发展规划和政策。指导农业农村科技进步，推动农业农村科技体制改革和科技创新体系建设，指导农业产业技术体系和农技推广体系建设，组织开展农业应用基础及前沿技术研究、关键核心技术攻关、成果转化和技术推广。负责农业转基因生物安全监督管理和农业植物新品种保护。（十三）指导农业农村人才工作。拟订农业农村人才队伍建设规划并组织实施，指导农业教育和农业职业技能开发，指导高素质农民培育、农业科技人才培养和农村实用人才培训工作。（十四）牵头开展农业对外合作工作。承办政府间农业涉外事务，组织开展农业贸易促进和有关国际交流合作，参与对外援助政策、农业贸易规则拟订及谈判，具体执行有关农业援外项目，组织有关国际公约履约和协定执行。（十五）完成党中央、国务院交办的其他任务。"},{"type":"国家文物局","description":"（一）拟订文物事业发展规划，起草文物法律法规草案并负责督促检查实施。（二）协调和指导全国文物保护利用工作，组织开展文物资源调查和文物保护宣传工作。（三）根据中央授权，对地方政府履行文物保护责任情况进行督察。履行文物行政执法督察职责，指导文物和博物馆安全监督管理工作，依法组织查处和督办文物违法重大案件，协同有关部门查处重大文物犯罪案件和安全事故。（四）指导全国不可移动文物保护和考古工作。组织、协调重大不可移动文物保护项目、考古项目和中华文明研究课题的实施。承担确定全国重点文物保护单位的有关工作。（五）负责世界文化遗产保护和管理的监督工作，组织申报世界文化遗产。（六）负责推动完善文物和博物馆公共服务体系建设，指导全国博物馆及馆藏文物工作，协调博物馆间的交流与协作；指导民间收藏文物的管理服务；负责文物进出境审核管理。（七）指导革命文物保护管理利用工作，组织开展革命文物研究、展示和传播。（八）协调和指导文物科技创新工作，促进文物保护科技成果的转化和推广；负责文物信息化、标准化工作；负责全国文物人才工作。（九）指导、管理文物对外和对港澳台交流、合作和传播、展示工作，负责流失文物追索返还工作。（十）负责文物和博物馆有关审核、审批事务及资质、资格认定的管理工作。（十一）承办党中央、国务院交办的其他事项。"},{"type":"国家邮政局","description":"（一）拟订邮政行业的发展战略、规划、政策和标准，提出深化邮政体制改革和促进邮政与交通运输统筹发展的政策建议，起草邮政行业法律法规和部门规章草案。（二）承担邮政监管责任，推动建立覆盖城乡的邮政普遍服务体系，推进建立和完善普遍服务和特殊服务保障机制，提出邮政行业服务价格政策和基本邮政业务价格建议，并监督执行。（三）负责快递等邮政业务的市场准入，维护信件寄递业务专营权，依法监管邮政市场。（四）负责监督检查机要通信工作，保障机要通信安全。（五）负责邮政行业安全生产监管，负责邮政行业运行安全的监测、预警和应急管理，保障邮政通信与信息安全。（六）负责邮政行业统计、经济运行分析及信息服务，依法监督邮政行业服务质量。（七）负责纪念邮票的选题和图案审查，负责审定纪念邮票和特种邮票年度计划。（八）代表国家参加国际邮政组织，处理政府间邮政事务，拟订邮政对外合作与交流政策并组织实施，处理邮政外事工作，按照规定管理涉及港澳台工作。（九）垂直管理各省（自治区、直辖市）邮政管理局。（十）承办国务院及交通运输部交办的其他事项。2012年1月20日邮政管理体制由中央垂直管理调整为中央和地方双重管理、以中央为主，省（区、市）及市（地）邮政管理局由上级邮政管理部门与所在地人民政府双重管理。"},{"type":"国务院发展研究","description":"（一）组织开展经济社会发展和改革开放中的全局性、综合性、战略性、长期性问题及热点、难点问题研究，开展政策评估、政策解读、国际交流合作，提出相应咨询意见和建议。（二）研究经济发展动态和国民经济循环，分析宏观经济形势，研究宏观经济治理机制，研究财政、金融等宏观调控政策，提出相应咨询意见和建议。（三）研究国家中长期发展战略和生产力空间布局等问题，研究区域协调发展、城乡协同发展问题，研究国家中长期发展规划和区域发展政策，研究农村发展和乡村振兴，提出相应咨询意见和建议。（四）研究企业、产业发展问题和产业政策，对制造业、建筑业、房地产业和金融、商贸、流通等服务业开展研究，提出相应咨询意见和建议。（五）研究我国创新驱动发展和国际科技创新发展问题，研究科技创新战略和政策、体制机制等，提出相应咨询意见和建议。（六）研究我国对外开放和国际经贸关系，研究开放发展战略与政策、参与全球经济治理等问题，提出相应咨询意见和建议。（七）研究社会发展、文化发展问题，研究人口与社会发展、公共服务与社会保障、社会治理、公共文化建设、对外文化传播等，提出相应咨询意见和建议。（八）研究生态文明建设和绿色发展问题，研究资源开发利用、生态环境保护、应对气候变化、促进经济社会发展全面绿色转型等，提出相应咨询意见和建议。（九）研究全面深化改革问题，研究经济社会发展和改革开放中的体制机制、市场体系建设与改革等，提出相应咨询意见和建议。（十）完成党中央、国务院交办的其他任务。中心研究理念“唯实求真，守正出新”唯实：尊重事实，坚持理论联系实际，深入了解真实情况，反映真实问题。求真：认真思考，严谨细致，强调专业主义精神，找到事实的真相或真理，提出切实管用的建议。守正：坚持为中央决策服务的根本方向，客观理性开展研究，遵守职业道德和学术规范，做有良知、负责任的学者。出新：解放思想，勇于创新，不断出思想、出成果、出人才，为中央科学决策提供高质量的智力支持。学术委员会国务院发展研究中心学术委员会是参与国务院发展研究中心科研领导管理工作的学术管理机构。学术委员会委员均具有高级专业技术职称。有丰富的科研经历和相当的学术成就，在专业研究领域内有较大影响，并有一定的科研组织能力。学术委员会设主任委员一人，副主任委员若干人，秘书长一人。主任委员、副主任委员由学术委员会全体成员选举产生。秘书长由主任委员聘任。另设若干副秘书长以协助工作。主任委员负责学术委员会的全面工作。秘书长负责学术委员会具体工作的实施。中心科研处是学术委员会的工作机构。学术委员会负责中心科研工作的总体规划、研究选题、成果评审、推荐国家科技进步奖。学术委员会主要工作内容有：负责中心重点课题的立项；拟定招标课题，审议和确定中标课题；负责组织中心的学术交流和重点课题的中间评议活动；负责组织中心研究成果的评审和优秀研究成果的评选工作。负责评议、推荐中国发展研究奖、国家科学技术进步奖候选人等；定期召开全体会议，讨论中心的研究工作。专业技术职务资格评审委员会国务院发展研究中心专业技术职务资格评审委员会根据国家有关专业技术职务评审工作的条例，结合国务院发展研究中心的实际情况，进行年度专业技术职务评审工作并制定评审受理申报的条件。"},{"type":"中华人民共和国商务部","description":"（一）拟订国内外贸易和国际经济合作的发展战略、政策，起草国内外贸易、外商投资、对外援助、对外投资和对外经济合作的法律法规草案及制定部门规章，提出我国经济贸易法规之间及其与国际经贸条约、协定之间的衔接意见，研究经济全球化、区域经济合作、现代流通方式的发展趋势和流通体制改革并提出建议。（二）负责推进流通产业结构调整，指导流通企业改革、商贸服务业和社区商业发展，提出促进商贸中小企业发展的政策建议，推动流通标准化和连锁经营、商业特许经营、物流配送、电子商务等现代流通方式的发展。（三）拟订国内贸易发展规划，促进城乡市场发展，研究提出引导国内外资金投向市场体系建设的政策，指导大宗产品批发市场规划和城市商业网点规划、商业体系建设工作，推进农村市场体系建设，组织实施农村现代流通网络工程。（四）承担牵头协调整顿和规范市场经济秩序工作的责任，拟订规范市场运行、流通秩序的政策，推动商务领域信用建设，指导商业信用销售，建立市场诚信公共服务平台，按有关规定对特殊流通行业进行监督管理。（五）承担组织实施重要消费品市场调控和重要生产资料流通管理的责任，负责建立健全生活必需品市场供应应急管理机制，监测分析市场运行、商品供求状况，调查分析商品价格信息，进行预测预警和信息引导，按分工负责重要消费品储备管理和市场调控工作，按有关规定对成品油流通进行监督管理。（六）负责制定进出口商品、加工贸易管理办法和进出口管理商品、技术目录，拟订促进外贸增长方式转变的政策措施，组织实施重要工业品、原材料和重要农产品进出口总量计划，会同有关部门协调大宗进出口商品，指导贸易促进活动和外贸促进体系建设。（七）拟订并执行对外技术贸易、出口管制以及鼓励技术和成套设备进出口的贸易政策，推进进出口贸易标准化工作，依法监督技术引进、设备进口、国家限制出口技术的工作，依法颁发防扩散等与国家安全相关的进出口许可证件。（八）牵头拟订服务贸易发展规划并开展相关工作，会同有关部门制定促进服务出口和服务外包发展的规划、政策并组织实施，推动服务外包平台建设。（九）拟订我国多双边（含区域、自由贸易区）经贸合作战略和政策，牵头负责多双边经贸对外谈判，协调谈判意见并签署和监督执行有关文件，建立多双边政府间经济和贸易联系机制并组织相关工作，处理国别（地区）经贸关系中的重要事务，管理同未建交国家的经贸活动，根据授权代表我国政府处理与世界贸易组织的关系，牵头承担我国在世界贸易组织框架下的谈判和贸易政策审议、争端解决、通报咨询等工作，负责对外经济贸易协调工作。（十）承担组织协调反倾销、反补贴、保障措施及其他与进出口公平贸易相关工作的责任，建立进出口公平贸易预警机制，依法实施对外贸易调查和产业损害调查，指导协调产业安全应对工作及国外对我国出口商品的反倾销、反补贴、保障措施的应诉工作。（十一）宏观指导全国外商投资工作，拟订外商投资政策和改革方案并组织实施，依法核准外商投资企业的设立及变更事项，依法核准重大外商投资项目的合同章程及法律特别规定的重大变更事项，依法监督检查外商投资企业执行有关法律法规规章、合同章程的情况并协调解决有关问题，指导投资促进及外商投资企业审批工作，规范对外招商引资活动，指导国家级经济技术开发区、苏州工业园区、边境经济合作区的有关工作。（十二）负责对外经济合作工作，拟订并执行对外经济合作政策，依法管理和监督对外承包工程、对外劳务合作等，制定中国公民出境就业管理政策，负责牵头外派劳务和境外就业人员的权益保护工作，拟订境外投资的管理办法和具体政策，依法核准境内企业对外投资开办企业（金融企业除外）。（十三）负责对外援助工作，拟订并执行对外援助政策和方案，推进援外方式改革，编制对外援助计划、确定对外援助项目并组织实施，管理具有政府对外援助性质资金的使用，管理多双边对中国的无偿援助和赠款（不含财政合作项下外国政府及国际金融组织对中国赠款）等发展合作业务。（十四）牵头拟订并执行对香港、澳门特别行政区和台湾地区的经贸规划、政策，与香港、澳门特别行政区有关部门和台湾地区受权机构进行经贸磋商并签署有关文件，负责内地与香港、澳门特别行政区商贸联络机制工作，组织实施对台直接通商工作，处理多双边经贸领域的涉台问题。（十五）依法对经营者集中行为进行反垄断审查，指导企业在国外的反垄断应诉工作，开展多双边竞争政策交流与合作。（十六）指导我国驻世界贸易组织代表团、常驻联合国和有关国际组织经贸代表机构以及驻外经济商务机构的有关工作，负责经贸业务指导、队伍建设、人员选派；联系国际多边经贸组织驻中国机构和外国驻中国官方商务机构。（十七）承办国务院交办的其他事项。根据《中共中央办公厅国务院办公厅关于调整商务部职责机构编制的通知》（2018年9月13日），商务部职责调整如下：1.商务部经营者集中反垄断执法职责及国务院反垄断委员会办公室、全国打击侵犯知识产权和制售假冒伪劣商品工作领导小组办公室职责，划入国家市场监督管理总局。2.商务部拟订对外援助工作的政策和方案，推进援外方式改革，编制对外援助计划，确定对外援助项目，管理对外援助资金规模和使用方向等职责，划入国家国际发展合作署。3.商务部食糖储备轮换职责，划入国家粮食和物资储备局。4.商务部制定典当行、融资租赁公司、商业保理公司业务经营和监管规则职责，划入中国银行保险监督管理委员会。"},{"type":"中华人民共和国文化和旅游部","description":"（一）贯彻落实党的文化工作方针政策，研究拟订文化和旅游政策措施，起草文化和旅游法律法规草案。（二）统筹规划文化事业、文化产业和旅游业发展，拟订发展规划并组织实施，推进文化和旅游融合发展，推进文化和旅游体制机制改革。（三）管理全国性重大文化活动，指导国家重点文化设施建设，组织国家旅游整体形象推广，促进文化产业和旅游产业对外合作和国际市场推广，制定旅游市场开发战略并组织实施，指导、推进全域旅游。（四）指导、管理文艺事业，指导艺术创作生产，扶持体现社会主义核心价值观、具有导向性代表性示范性的文艺作品，推动各门类艺术、各艺术品种发展。（五）负责公共文化事业发展，推进国家公共文化服务体系建设和旅游公共服务建设，深入实施文化惠民工程，统筹推进基本公共文化服务标准化、均等化。（六）指导、推进文化和旅游科技创新发展，推进文化和旅游行业信息化、标准化建设。（七）负责非物质文化遗产保护，推动非物质文化遗产的保护、传承、普及、弘扬和振兴。（八）统筹规划文化产业和旅游产业，组织实施文化和旅游资源普查、挖掘、保护和利用工作，促进文化产业和旅游产业发展。（九）指导文化和旅游市场发展，对文化和旅游市场经营进行行业监管，推进文化和旅游行业信用体系建设，依法规范文化和旅游市场。（十）指导全国文化市场综合执法，组织查处全国性、跨区域文化、文物、出版、广播电视、电影、旅游等市场的违法行为，督查督办大案要案，维护市场秩序。（十一）指导、管理文化和旅游对外及对港澳台交流、合作和宣传、推广工作，指导驻外及驻港澳台文化和旅游机构工作，代表国家签订中外文化和旅游合作协定，组织大型文化和旅游对外及对港澳台交流活动，推动中华文化走出去。（十二）管理国家文物局。（十三）完成党中央、国务院交办的其他任务。"},{"type":"国家铁路局","description":"一、起草铁路监督管理的法律法规、规章草案，参与研究铁路发展规划、政策和体制改革工作，组织拟订铁路技术标准并监督实施。二、负责铁路安全生产监督管理，制定铁路运输安全、工程质量安全和设备质量安全监督管理办法并组织实施，组织实施依法设定的行政许可。组织或参与铁路生产安全事故调查处理。三、负责拟订规范铁路运输和工程建设市场秩序政策措施并组织实施，监督铁路运输服务质量和铁路企业承担国家规定的公益性运输任务情况。四、负责组织监测分析铁路运行情况，开展铁路行业统计工作。五、负责开展铁路的政府间有关国际交流与合作。六、承办国务院及交通运输部交办的其他事项。"},{"type":"中华人民共和国退役军人事务部","description":"（一）拟订退役军人思想政治、管理保障和安置优抚等工作政策法规并组织实施，褒扬彰显退役军人为党、国家和人民牺牲奉献的精神风范和价值导向。（二）负责军队转业干部、复员干部、离休退休干部、退役士兵和无军籍退休退职职工的移交安置工作和自主择业、就业退役军人服务管理工作。（三）组织指导退役军人教育培训工作，协调扶持退役军人和随军随调家属就业创业。（四）会同有关部门制定退役军人特殊保障政策并组织落实。（五）组织协调落实移交地方的离休退休军人、符合条件的其他退役军人和无军籍退休退职职工的住房保障工作，以及退役军人医疗保障、社会保险等待遇保障工作。（六）组织指导伤病残退役军人服务管理和抚恤工作，制定有关退役军人医疗、疗养、养老等机构的规划政策并指导实施。承担不适宜继续服役的伤病残军人相关工作。组织指导军供服务保障工作。（七）组织指导全国拥军优属工作。负责现役军人、退役军人、军队文职人员和军属优待、抚恤等工作。（八）负责烈士及退役军人荣誉奖励、军人公墓管理维护、纪念活动等工作，依法承担英雄烈士保护相关工作，审核拟列入全国重点保护单位的烈士纪念建筑物名录，承办境外我国烈士和外国在华烈士纪念设施保护事宜，总结表彰和宣扬退役军人、退役军人工作单位和个人先进典型事迹。（九）指导并监督检查退役军人相关法律法规和政策措施的落实，组织开展退役军人权益维护和有关人员的帮扶援助工作。（十）完成党中央、国务院和中央军委交办的其他任务。（十一）职能转变。退役军人事务部应加强退役军人思想政治工作和服务保障体系建设，建立健全集中统一、职责清晰的退役军人管理保障体制，协调各方力量更好为军人军属服务，维护军人军属合法权益，让军人成为全社会尊崇的职业，褒扬彰显退役军人为党、国家和人民牺牲奉献的精神风范和价值导向，更好地为增强部队战斗力和凝聚力做好组织保障。　　第四条退役军人事务部设下列内设机构：（一）办公厅。负责机关日常运转，承担信息、安全、保密、政务公开等工作。（二）政策法规司。组织起草相关法律法规草案和规章，承担重大政策研究工作，承担规范性文件的合法性审查和行政复议、行政应诉等工作。（三）思想政治和权益维护司。承担退役军人思想政治、舆论宣传、总结表彰、荣誉奖励和信访工作，配合做好指导退役军人党建工作，监督检查退役军人相关法律法规和政策措施的落实情况，承担退役军人权益维护和有关人员的帮扶援助工作。（四）规划财务司。拟订退役军人事业发展规划、年度计划和退役军人管理保障基础设施建设标准，指导和监督退役军人事业资金管理，承担机关财务、资产管理、内部审计和退役军人事务系统信息化建设、统计等工作。（五）移交安置司。拟订计划分配的军队转业干部、符合条件的退役士兵年度安置计划并组织实施，承担中央单位计划安置和计划外选调工作。（六）就业创业司。拟订自主择业军队转业干部、复员干部、自主就业退役士兵就业创业年度计划并组织实施，组织开展就业创业促进和教育培训等工作，指导开展有关中介服务工作，组织协调落实退役军人社会保险等待遇保障工作。（七）军休服务管理司。负责移交地方的军队离休退休干部、无军籍退休退职职工的移交安置和服务管理工作，组织协调落实移交地方的离休退休军人、符合条件的其他退役军人和无军籍退休退职职工的住房保障工作，管理军休保障单位。（八）拥军优抚司。承担协调指导全国拥军优属工作，指导做好地方支持军队相关工作，承担现役军人、退役军人、军队文职人员和军属优待、抚恤等工作。承担不适宜继续服役的伤病残军人相关工作，组织协调落实退役军人医疗保障工作，拟订有关退役军人医疗、疗养、养老等优抚保障机构以及军供保障机构的规划政策并指导实施。协调指导随军随调家属就业创业。（九）褒扬纪念司（国际合作司）。承担烈士褒扬、纪念设施管理保护工作，依法承担英雄烈士保护相关工作，拟订军人公墓建设规划、管理维护等政策并指导实施，承担中央和国家机关负责的烈士评定和全国烈士备案事项，指导开展英雄烈士纪念活动，负责退役军人事务的国际交流与合作，承担境外我国烈士和外国在华烈士纪念设施保护及活动的组织管理工作。机关党委（人事司）。负责机关和在京直属单位的党群工作，以及机关和直属单位的干部人事、机构编制等工作。"},{"type":"国家机关事务管理局","description":"　一、负责中央国家机关事务的管理、保障、服务工作。拟订中央国家机关事务工作的政策、规划和规章制度并组织实施。二、组织拟订中央国家机关后勤体制改革政策、制度并监督实施，指导后勤服务单位业务工作。会同有关部门拟订中央国家机关有关社会保障工作制度并组织实施。三、按规定负责中央行政事业单位国有资产管理工作，制订相关具体制度和办法，承担产权界定、清查登记、资产处置工作。负责中央国家机关公务用车的编制、配备、更新、处置工作。四、按规定制定中央国家机关财务管理有关规章制度并组织实施；提出加强行政运行经费、机关服务经费、住房改革支出经费管理的建议；负责中央国家机关行政办公用房建设与维修项目经费、离退休经费、公务用车经费等专项经费的管理。按规定指导中央国家机关会计事务工作。五、负责中央国家机关房地产管理工作，制定规章制度并组织实施；按规定负责行政办公用房建设项目审核、计划编制、建设监管；负责办公用房和办公区建设的规划编制、权属登记、使用调配。负责中央国家机关及所属单位用地管理工作。六、负责中央国家机关及所属在京单位住房制度改革工作，拟订住房制度改革实施方案、住房保障和管理的规章制度并组织实施。指导中央国家机关公务员集中住宅区建设和物业管理工作。按规定负责住房资金和住房公积金的管理工作。七、承担全国公共机构节能推进、指导、协调、监督的具体工作；监督管理中央本级公共机构节能工作；承办指导教育、科技、文化、卫生等主管部门开展本级系统内公共机构节能的有关工作；会同有关部门开展公共机构节能宣传、教育和培训等工作。八、按规定承担中央国家机关政府集中采购管理工作。受委托承办集中采购目录外的项目采购。九、负责中央国家机关及所属在京单位人民防空工作。十、指导和协调中央国家机关社会治安综合治理等社会事务管理工作。按规定指导并组织实施中央国家机关后勤员工培训工作。十一、负责各省、自治区、直辖市及副省级市人民政府驻京办事处的管理和协调工作。制订政府机关国内公务接待的相关制度和标准。承办国家有关重大活动和国务院重要会议的总务和经费管理工作。十二、承办国务院交办的其他事项。"},{"type":"国家金融监督管理总局","description":"一、依法对除证券业之外的金融业实行统一监督管理，强化机构监管、行为监管、功能监管、穿透式监管、持续监管，维护金融业合法、稳健运行。二、对金融业改革开放和监管有效性相关问题开展系统性研究，参与拟订金融业改革发展战略规划。拟订银行业、保险业、金融控股公司等有关法律法规草案，提出制定和修改建议。制定银行业机构、保险业机构、金融控股公司等有关监管制度。三、统筹金融消费者权益保护工作。制定金融消费者权益保护发展规划，建立健全金融消费者权益保护制度，研究金融消费者权益保护重大问题，开展金融消费者教育工作，构建金融消费者投诉处理机制和金融消费纠纷多元化解机制。四、依法对银行业机构、保险业机构、金融控股公司等实行准入管理，对其公司治理、风险管理、内部控制、资本充足状况、偿付能力、经营行为、信息披露等实施监管。五、依法对银行业机构、保险业机构、金融控股公司等实行现场检查与非现场监管，开展风险与合规评估，查处违法违规行为。六、统一编制银行业机构、保险业机构、金融控股公司等的监管数据报表，按照国家有关规定予以发布，履行金融业综合统计相关工作职责。七、负责银行业机构、保险业机构、金融控股公司等的科技监管，建立科技监管体系，制定科技监管政策，构建监管大数据平台，开展风险监测、分析、评价、预警，充分利用科技手段加强监管、防范风险。八、对银行业机构、保险业机构、金融控股公司等实行穿透式监管，制定股权监管制度，依法审查批准股东、实际控制人及股权变更，依法对股东、实际控制人以及一致行动人、最终受益人等开展调查，对违法违规行为采取相关措施或进行处罚。九、建立除货币、支付、征信、反洗钱、外汇和证券期货等领域之外的金融稽查体系，建立行政执法与刑事司法衔接机制，依法对违法违规金融活动相关主体进行调查、取证、处理，涉嫌犯罪的，移送司法机关。十、建立银行业机构、保险业机构、金融控股公司等的恢复和处置制度，会同相关部门研究提出有关金融机构恢复和处置意见建议并组织实施。十一、牵头打击非法金融活动，组织建立非法金融活动监测预警体系，组织协调、指导督促有关部门和地方政府依法开展非法金融活动防范和处置工作。对涉及跨部门跨地区和新业态新产品等非法金融活动，研究提出相关工作建议，按要求组织实施。十二、按照建立以中央金融管理部门地方派出机构为主的地方金融监管体制要求，指导和监督地方金融监管相关业务工作，指导协调地方政府履行相关金融风险处置属地责任。十三、负责对银行业机构、保险业机构、金融控股公司等与信息技术服务机构等中介机构的信息科技外包等合作行为进行监管，依法对违法违规行为开展调查，并对金融机构采取相关措施。十四、参加金融业相关国际组织与国际监管规则制定，开展对外交流与国际合作。十五、完成党中央、国务院交办的其他任务。"},{"type":"国家民族事务委员会","description":"（一）研究提出铸牢中华民族共同体意识、加强中华民族共同体建设的政策建议。（二）承担国家民委委员制的组织实施工作，负责民族工作有关协调机制的具体事务，协调推动有关部门履行民族工作相关职责，对各地区各部门贯彻落实党中央关于民族工作的决策部署、民族法律法规开展指导和督促检查。（三）组织开展以铸牢中华民族共同体意识为主线的民族理论、民族政策和民族工作重大问题的调查研究。（四）研究提出推进民族事务治理体系和治理能力现代化的政策建议；起草民族法律法规草案和政策规定；联系民族自治地方，协调、指导民族区域自治法的贯彻落实，指导民族自治地方法治建设，依法保障各族群众的合法权益。（五）研究提出推进中华民族共有精神家园建设的政策建议，参与中华文化符号和中华民族形象建设；协调推动少数民族优秀文化传承保护和创新融合；指导少数民族语言文字的翻译、出版和民族古籍的搜集、整理、出版工作。（六）研究提出促进各民族交往交流交融的政策建议，组织开展民族领域示范创建工作，协调推动民族地区互嵌式社会结构和社区环境建设工作。（七）研究提出推动各民族共同走向社会主义现代化的政策建议，促进党的民族政策在经济、文化、社会、生态、安全领域的实施、衔接。参与拟订和实施民族地区和少数民族经济社会发展相关规划，推进民族事务公共服务体系建设，开展民族地区经济社会发展综合评估工作。（八）研究提出协调民族关系的政策建议，协调处理民族关系中的重大事项，参与民族领域重大风险隐患防范化解工作，维护国家统一、民族团结、社会稳定。（九）统筹协调铸牢中华民族共同体意识和民族政策、民族法律法规宣传教育工作；组织协调民族自治地方重大庆典活动和全国性民族文化体育活动。（十）组织协调民族领域有关对外和对港澳台的交流与合作，参与涉及民族事务的对外宣传工作。（十一）参与拟订少数民族人才队伍建设规划，联系少数民族干部和代表人士，协助有关部门做好少数民族干部的培养、教育、使用工作。负责提出加强基层民族工作机构和队伍建设的政策建议。（十二）承办党中央、国务院交办的其他事项。"},{"type":"国务院国有资产监督管理委员会","description":"（一）根据国务院授权，依照《中华人民共和国公司法》等法律和行政法规履行出资人职责，监管中央所属企业（不含金融类企业）的国有资产，加强国有资产的管理工作。（二）承担监督所监管企业国有资产保值增值的责任。建立和完善国有资产保值增值指标体系，制订考核标准，通过统计、稽核对所监管企业国有资产的保值增值情况进行监管，负责所监管企业工资分配管理工作，制定所监管企业负责人收入分配政策并组织实施。（三）指导推进国有企业改革和重组，推进国有企业的现代企业制度建设，完善公司治理结构，推动国有经济布局和结构的战略性调整。（四）通过法定程序对所监管企业负责人进行任免、考核并根据其经营业绩进行奖惩，建立符合社会主义市场经济体制和现代企业制度要求的选人、用人机制，完善经营者激励和约束制度。（五）负责组织所监管企业上交国有资本收益，参与制定国有资本经营预算有关管理制度和办法，按照有关规定负责国有资本经营预决算编制和执行等工作。（六）按照出资人职责，负责督促检查所监管企业贯彻落实国家安全生产方针政策及有关法律法规、标准等工作。（七）负责企业国有资产基础管理，起草国有资产管理的法律法规草案，制定有关规章、制度，依法对地方国有资产管理工作进行指导和监督。（八）承办国务院交办的其他事项。"},{"type":"中国证券监督管理委员会","description":"（一）依法对证券业实行统一监督管理，强化资本市场监管职责。（二）研究拟订证券期货基金市场的方针政策、发展规划。起草证券期货基金市场有关法律法规草案，提出制定和修改建议。制定证券期货基金市场有关监管规章、规则。（三）监管股票、可转换债券、存托凭证和国务院确定由中国证券监督管理委员会负责的其他权益类证券的发行、上市、交易、托管和结算，监管证券、股权、私募及基础设施领域不动产投资信托等投资基金活动。（四）监管公司（企业）债券、资产支持证券和国务院确定由中国证券监督管理委员会负责的其他固定收益类证券在交易所市场的发行、上市、挂牌、交易、托管和结算等工作，监管政府债券在交易所市场的上市交易活动，负责债券市场统一执法工作。（五）监管上市公司、非上市公众公司、债券发行人及其按法律法规必须履行有关义务的股东、实际控制人、一致行动人等的证券市场行为。（六）按分工监管境内期货合约和标准化期权合约的上市、交易、结算和交割，依法对证券期货基金经营机构开展的衍生品业务实施监督管理。（七）监管证券期货交易所和国务院确定由中国证券监督管理委员会负责的其他全国性证券交易场所，按规定管理证券期货交易所和有关全国性证券交易场所的高级管理人员。（八）监管证券期货基金经营机构、证券登记结算公司、期货结算机构、证券金融公司、证券期货投资咨询机构、证券资信评级机构、基金托管机构、基金服务机构，制定有关机构董事、监事、高级管理人员及从业人员任职、执业的管理办法并组织实施。（九）监管境内企业到境外发行股票、存托凭证、可转换债券等证券及上市活动，监管在境外上市的公司到境外发行可转换债券和境内证券期货基金经营机构到境外设立分支机构。监管境外机构到境内设立证券期货基金机构及从事相关业务，境外企业到境内交易所市场发行证券上市，合格境外投资者的境内证券期货投资行为。（十）监管证券期货基金市场信息传播活动，负责证券期货基金市场的统计与信息资源管理。（十一）与有关部门共同依法对会计师事务所、律师事务所以及从事资产评估、资信评级、财务顾问、信息技术系统服务等机构从事证券服务业务实施备案管理和持续监管。（十二）负责证券期货基金业的科技监管，建立科技监管体系，制定科技监管政策，构建监管大数据平台，开展科技应用和安全等风险监测、分析、评价、预警、检查、处置。（十三）依法对证券期货基金市场违法违规行为进行调查，采取相关措施或进行处罚。依法打击非法证券期货基金金融活动，组织风险监测分析，依法处置或协调推动处置证券期货基金市场风险。组织协调清理整顿各类交易场所，指导开展风险处置相关工作。（十四）按照建立以中央金融管理部门地方派出机构为主的地方金融监管体制要求，指导和监督与证券期货基金相关的地方金融监管工作，指导协调地方政府履行相关金融风险处置属地责任。（十五）开展证券期货基金业的对外交流和国际合作。（十六）完成党中央、国务院交办的其他任务。"},{"type":"国家消防救援局","description":"（一）起草消防法律、行政法规、规章草案，指导编制消防规划并监督实施。（二）负责职责范围内的国家综合性消防救援队伍建设、管理工作。组织构建国家综合性消防救援队伍教育训练体系，负责消防救援院校建设有关工作。（三）组织指导地方专兼职消防队伍规划建设与指挥调度，与防汛抗旱、森林防火等专业应急救援队伍、志愿者队伍建立共训共练、救援合作机制。（四）组织指导城乡和森林草原火灾扑救、航空救援、特种灾害救援、重大活动消防安全保卫等任务，协同组织其他自然灾害和事故灾难抢险救援等工作，指挥调度相关灾害事故救援行动。（五）依法行使消防安全综合监管职能，组织指导火灾预防、消防监督执法以及火灾事故调查处理有关工作，组织指导消防宣传教育工作。（六）完成党中央、国务院及应急管理部交办的其他任务。"},{"type":"中华人民共和国自然资源部","description":"（一）履行全民所有土地、矿产、森林、草原、湿地、水、海洋等自然资源资产所有者职责和所有国土空间用途管制职责。拟订自然资源和国土空间规划及测绘、极地、深海等法律法规草案，制定部门规章并监督检查执行情况。（二）负责自然资源调查监测评价。制定自然资源调查监测评价的指标体系和统计标准，建立统一规范的自然资源调查监测评价制度。实施自然资源基础调查、专项调查和监测。负责自然资源调查监测评价成果的监督管理和信息发布。指导地方自然资源调查监测评价工作。（三）负责自然资源统一确权登记工作。制定各类自然资源和不动产统一确权登记、权籍调查、不动产测绘、争议调处、成果应用的制度、标准、规范。建立健全全国自然资源和不动产登记信息管理基础平台。负责自然资源和不动产登记资料收集、整理、共享、汇交管理等。指导监督全国自然资源和不动产确权登记工作。（四）负责自然资源资产有偿使用工作。建立全民所有自然资源资产统计制度，负责全民所有自然资源资产核算。编制全民所有自然资源资产负债表，拟订考核标准。制定全民所有自然资源资产划拨、出让、租赁、作价出资和土地储备政策，合理配置全民所有自然资源资产。负责自然资源资产价值评估管理，依法收缴相关资产收益。（五）负责自然资源的合理开发利用。组织拟订自然资源发展规划和战略，制定自然资源开发利用标准并组织实施，建立政府公示自然资源价格体系，组织开展自然资源分等定级价格评估，开展自然资源利用评价考核，指导节约集约利用。负责自然资源市场监管。组织研究自然资源管理涉及宏观调控、区域协调和城乡统筹的政策措施。（六）负责建立空间规划体系并监督实施。推进主体功能区战略和制度，组织编制并监督实施国土空间规划和相关专项规划。开展国土空间开发适宜性评价，建立国土空间规划实施监测、评估和预警体系。组织划定生态保护红线、永久基本农田、城镇开发边界等控制线，构建节约资源和保护环境的生产、生活、生态空间布局。建立健全国土空间用途管制制度，研究拟订城乡规划政策并监督实施。组织拟订并实施土地、海洋等自然资源年度利用计划。负责土地、海域、海岛等国土空间用途转用工作。负责土地征收征用管理。（七）负责统筹国土空间生态修复。牵头组织编制国土空间生态修复规划并实施有关生态修复重大工程。负责国土空间综合整治、土地整理复垦、矿山地质环境恢复治理、海洋生态、海域海岸线和海岛修复等工作。牵头建立和实施生态保护补偿制度，制定合理利用社会资金进行生态修复的政策措施，提出重大备选项目。（八）负责组织实施最严格的耕地保护制度。牵头拟订并实施耕地保护政策，负责耕地数量、质量、生态保护。组织实施耕地保护责任目标考核和永久基本农田特殊保护。完善耕地占补平衡制度，监督占用耕地补偿制度执行情况。（九）负责管理地质勘查行业和全国地质工作。编制地质勘查规划并监督检查执行情况。管理中央级地质勘查项目。组织实施国家重大地质矿产勘查专项。负责地质灾害预防和治理，监督管理地下水过量开采及引发的地面沉降等地质问题。负责古生物化石的监督管理。（十）负责落实综合防灾减灾规划相关要求，组织编制地质灾害防治规划和防护标准并指导实施。组织指导协调和监督地质灾害调查评价及隐患的普查、详查、排查。指导开展群测群防、专业监测和预报预警等工作，指导开展地质灾害工程治理工作。承担地质灾害应急救援的技术支撑工作。（十一）负责矿产资源管理工作。负责矿产资源储量管理及压覆矿产资源审批。负责矿业权管理。会同有关部门承担保护性开采的特定矿种、优势矿产的调控及相关管理工作。监督指导矿产资源合理利用和保护。（十二）负责监督实施海洋战略规划和发展海洋经济。研究提出海洋强国建设重大战略建议。组织制定海洋发展、深海、极地等战略并监督实施。会同有关部门拟订海洋经济发展、海岸带综合保护利用等规划和政策并监督实施。负责海洋经济运行监测评估工作。（十三）负责海洋开发利用和保护的监督管理工作。负责海域使用和海岛保护利用管理。制定海域海岛保护利用规划并监督实施。负责无居民海岛、海域、海底地形地名管理工作，制定领海基点等特殊用途海岛保护管理办法并监督实施。负责海洋观测预报、预警监测和减灾工作，参与重大海洋灾害应急处置。（十四）负责测绘地理信息管理工作。负责基础测绘和测绘行业管理。负责测绘资质资格与信用管理，监督管理国家地理信息安全和市场秩序。负责地理信息公共服务管理。负责测量标志保护。（十五）推动自然资源领域科技发展。制定并实施自然资源领域科技创新发展和人才培养战略、规划和计划。组织制定技术标准、规程规范并监督实施。组织实施重大科技工程及创新能力建设，推进自然资源信息化和信息资料的公共服务。（十六）开展自然资源国际合作。组织开展自然资源领域对外交流合作，组织履行有关国际公约、条约和协定。配合开展维护国家海洋权益工作，参与相关谈判与磋商。负责极地、公海和国际海底相关事务。（十七）根据中央授权，对地方政府落实党中央、国务院关于自然资源和国土空间规划的重大方针政策、决策部署及法律法规执行情况进行督察。查处自然资源开发利用和国土空间规划及测绘重大违法案件。指导地方有关行政执法工作。（十八）管理国家林业和草原局。（十九）管理中国地质调查局。（二十）完成党中央、国务院交办的其他任务。（二十一）职能转变。自然资源部要落实中央关于统一行使全民所有自然资源资产所有者职责，统一行使所有国土空间用途管制和生态保护修复职责的要求，强化顶层设计，发挥国土空间规划的管控作用，为保护和合理开发利用自然资源提供科学指引。进一步加强自然资源的保护和合理开发利用，建立健全源头保护和全过程修复治理相结合的工作机制，实现整体保护、系统修复、综合治理。创新激励约束并举的制度措施，推进自然资源节约集约利用。进一步精简下放有关行政审批事项、强化监管力度，充分发挥市场对资源配置的决定性作用，更好发挥政府作用，强化自然资源管理规则、标准、制度的约束性作用，推进自然资源确权登记和评估的便民高效。"},{"type":"国家市场监督管理总局","description":"（一）负责市场综合监督管理。起草市场监督管理有关法律法规草案，制定有关规章、政策、标准，组织实施质量强国战略、食品安全战略和标准化战略，拟订并组织实施有关规划，规范和维护市场秩序，营造诚实守信、公平竞争的市场环境。（二）负责市场主体统一登记注册。指导各类企业、农民专业合作社和从事经营活动的单位、个体工商户以及外国（地区）企业常驻代表机构等市场主体的登记注册工作。建立市场主体信息公示和共享机制，依法公示和共享有关信息，加强信用监管，推动市场主体信用体系建设。（三）负责组织和指导市场监管综合执法工作。指导地方市场监管综合执法队伍整合和建设，推动实行统一的市场监管。组织查处重大违法案件。规范市场监管行政执法行为。（四）负责反垄断统一执法。统筹推进竞争政策实施，指导实施公平竞争审查制度。依法对经营者集中行为进行反垄断审查，负责垄断协议、滥用市场支配地位和滥用行政权力排除、限制竞争等反垄断执法工作。指导企业在国外的反垄断应诉工作。承担国务院反垄断委员会日常工作。（五）负责监督管理市场秩序。依法监督管理市场交易、网络商品交易及有关服务的行为。组织指导查处价格收费违法违规、不正当竞争、违法直销、传销、侵犯商标专利知识产权和制售假冒伪劣行为。指导广告业发展，监督管理广告活动。指导查处无照生产经营和相关无证生产经营行为。指导中国消费者协会开展消费维权工作。（六）负责宏观质量管理。拟订并实施质量发展的制度措施。统筹国家质量基础设施建设与应用，会同有关部门组织实施重大工程设备质量监理制度，组织重大质量事故调查，建立并统一实施缺陷产品召回制度，监督管理产品防伪工作。（七）负责产品质量安全监督管理。管理产品质量安全风险监控、国家监督抽查工作。建立并组织实施质量分级制度、质量安全追溯制度。指导工业产品生产许可管理。负责纤维质量监督工作。（八）负责特种设备安全监督管理。综合管理特种设备安全监察、监督工作，监督检查高耗能特种设备节能标准和锅炉环境保护标准的执行情况。（九）负责食品安全监督管理综合协调。组织制定食品安全重大政策并组织实施。负责食品安全应急体系建设，组织指导重大食品安全事件应急处置和调查处理工作。建立健全食品安全重要信息直报制度。承担国务院食品安全委员会日常工作。（十）负责食品安全监督管理。建立覆盖食品生产、流通、消费全过程的监督检查制度和隐患排查治理机制并组织实施，防范区域性、系统性食品安全风险。推动建立食品生产经营者落实主体责任的机制，健全食品安全追溯体系。组织开展食品安全监督抽检、风险监测、核查处置和风险预警、风险交流工作。组织实施特殊食品注册、备案和监督管理。（十一）负责统一管理计量工作。推行法定计量单位和国家计量制度，管理计量器具及量值传递和比对工作。规范、监督商品量和市场计量行为。（十二）负责统一管理标准化工作。依法承担强制性国家标准的立项、编号、对外通报和授权批准发布工作。制定推荐性国家标准。依法协调指导和监督行业标准、地方标准、团体标准制定工作。组织开展标准化国际合作和参与制定、采用国际标准工作。（十三）负责统一管理检验检测工作。推进检验检测机构改革，规范检验检测市场，完善检验检测体系，指导协调检验检测行业发展。（十四）负责统一管理、监督和综合协调全国认证认可工作。建立并组织实施国家统一的认证认可和合格评定监督管理制度。（十五）负责市场监督管理科技和信息化建设、新闻宣传、国际交流与合作。按规定承担技术性贸易措施有关工作。（十六）管理国家药品监督管理局、国家知识产权局。（十七）完成党中央、国务院交办的其他任务。根据2023年《党和国家机构改革方案》，国家知识产权局由国家市场监督管理总局管理的国家局调整为国务院直属机构。商标、专利等领域执法职责由市场监管综合执法队伍承担，相关执法工作接受国家知识产权局专业指导。"},{"type":"国务院新闻办公室","description":"推动中国媒体对外说明中国、指导和协调对外新闻报道制定对外新闻事业的发展规划，并负责组织实施组织对外介绍中国政府的方针政策和中国经济社会发展情况推动中国媒体对国际问题的报道，包括政治、经济、科技等方面新闻信息举办新闻发布会，向中外记者介绍中国情况和方针政策组织编写并发表中国政府白皮书，阐明中国政府对重大问题的原则立场和基本政策指导中国各省(区、市)政府新闻办公室的工作，并为港澳台记者来内地采访提供服务开展与国外新闻机构的交流合作，并为国外记者来中国采访提供服务接待要求访问本办的重要代表团及重要人士负责对外介绍中国人权事业发展情况，组织开展人权领域的对外交流与合作负责对外介绍西藏的发展建设情况，组织有关西藏方面的对外报道和交流活动研究世界主要媒体及香港、澳门、台湾舆情组织综合性、跨部门、跨地区大型文化交流活动，组织制作对外介绍中国情况的图书、音像、影视出版物"},{"type":"国家语言文字工作委员会","description":"拟定国家语言文字工作的方针、政策，制订语言文字工作中长期规划，制订汉语和少数民族语言文字规范和标准并组织协调监督检查，指导推广普通话工作和普通话师资培训工作。"},{"type":"国家疾病预防控制局","description":"（一）组织拟订传染病预防控制及公共卫生监督的法律法规草案、政策、规划、标准，负责疾病预防控制网络和工作体系建设。（二）领导地方各级疾病预防控制机构业务工作，制定监督检查和考核评价办法并组织实施。审核省级疾病预防控制局的监测预警等规划计划和应急预案，指导开展监测预警、免疫规划和隔离防控等相关工作，建立上下联动的分工协作机制。（三）制定并组织落实国家免疫规划以及严重危害人民健康公共卫生问题的干预措施，负责预防接种监督管理工作，组织制定检疫、监测传染病目录，提出法定传染病病种调整建议。（四）统筹规划并监督管理传染病医疗机构及其他医疗机构疾病预防控制工作，指导建立疾病预防控制监督员制度，制定疾病预防控制系统队伍建设的方针政策并组织实施。（五）规划指导传染病疫情监测预警体系建设，组织开展疫情监测、风险评估工作并发布疫情信息，建立健全跨部门、跨区域的疫情信息通报和共享机制。（六）负责传染病疫情应对相关工作，组织开展流行病学调查、检验检测、应急处置等工作，拟订应急预案并组织开展演练，指导疾病预防控制系统应急体系和能力建设，负责应急队伍、志愿者队伍建设，提出传染病疫情应对应急物资需求及分配意见。（七）协同指导疾病预防控制科研体系建设，拟订疾病预防控制科技发展规划及相关政策并组织实施。开展疾病预防控制领域的国际交流与合作，参与制定相关国际标准、规范、指南。（八）负责传染病防治、环境卫生、学校卫生、公共场所卫生、饮用水卫生监督管理和职业卫生、放射卫生监督工作，依法组织查处重大违法行为，健全卫生健康综合监督体系。（九）完成党中央、国务院交办的其他任务。（十）职能转变。国家疾病预防控制局应当强化对各级疾病预防控制机构的业务领导和工作协同，建立健全疾病预防控制工作体系和网络，为维护人民健康提供有力保障。坚持将预防关口前移，健全多渠道监测预警机制，建立智慧化预警多点触发机制，推动公共卫生服务与医疗服务高效协同、无缝衔接，完善公共卫生重大风险评估、研判、决策机制，提高评估监测敏感性和准确性。优化资源配置，完善运行机制，坚持依法防控，落实早发现、早报告、早隔离、早治疗要求，推动构建常态化管理和应急管理动态衔接的基层治理机制，强化科研支撑体系，健全决策咨询体系，实现动态防控、科学防控、精准防控。"},{"type":"中华人民共和国外交部","description":"（一）贯彻执行国家外交方针政策和有关法律法规，代表国家维护国家主权、安全和利益，代表国家和政府办理外交事务，承办党和国家领导人与外国领导人的外交往来事务。（二）调查研究国际形势和国际关系中全局性、战略性问题，研究分析政治、经济、文化、安全等领域外交工作的重大问题，为党中央、国务院制定外交战略和方针政策提出建议。（三）按照外交总体布局，就对外贸易、经济合作、经援、文化、军援、军贸、侨务、教育、科技、外宣等重大问题，负责与有关单位协调，向党中央、国务院报告情况、提出建议。（四）起草外交工作领域相关法律法规草案和政策规划。（五）负责处理联合国等多边领域中有关全球和地区安全以及政治、经济、人权、社会、难民等外交事务。（六）负责国际军控、裁军、防扩散等领域工作，研究有关国际安全问题，组织军控方面有关条约、协定的谈判。（七）负责办理国家对外缔结双边、多边条约事务，负责国际司法合作有关事项，负责或参与处理涉及国家和政府的重大涉外法律案件，协助审核涉外法律法规草案，组织协调有关我国履行国际公约、协定工作。（八）牵头或参与拟订陆地、海洋边界相关政策，指导协调海洋对外工作，组织有关边界划界、勘界和联合检查等管理工作并处理有关涉外案件，承担海洋划界、共同开发等相关外交谈判工作。（九）发布重要外交活动信息，阐述对外政策，负责国家重要外事活动新闻工作，组织公共外交活动，主管在华外国记者和外国常驻新闻机构事务。（十）负责国家对外礼仪和典礼事务，负责国家重要外事活动礼宾事宜，负责驻华外交机构在华礼遇、外交特权和豁免事宜。（十一）负责领事工作。管理外国驻华外交、领事机构；负责海外侨务工作；办理和参与境内涉外案件的对外交涉工作；负责领事保护和协助工作，协调有关部门、地方政府并指导驻外外交机构处理领事保护和协助案件，发布领事保护和协助的预警信息。（十二）负责协调处置境外涉我突发事件，保护境外中国公民和机构的合法权益，参与处置境内涉外突发事件。（十三）依法管理香港、澳门特别行政区外交、领事事务，处理涉台外交事务。（十四）指导、协调地方和国务院各部门外事工作，审核地方和国务院各单位的重要外事规定和上报国务院的外事请示，会同有关部门研究提出对重大外事违规违纪事件的处理意见。（十五）处理和协调关系国家安全问题的有关涉外事宜。（十六）负责国家重要外事活动、外交文件和文书翻译工作。（十七）领导驻外外交机构及驻香港、澳门特派员公署工作，负责驻外外交机构干部队伍建设，指导、监督驻外外交机构及驻香港、澳门特派员公署信息化、财务和馆舍建设工作，负责驻华外交机构房地产使用管理工作。（十八）代管中国人民对外友好协会，归口管理中国红十字会总会、中国宋庆龄基金会的外事工作。（十九）承办党中央、国务院交办的其他事项。"},{"type":"中国人民银行","description":"（一）拟订金融业改革、开放和发展规划，承担综合研究并协调解决金融运行中的重大问题、促进金融业协调健康发展的责任。牵头国家金融安全工作协调机制，维护国家金融安全。（二）牵头建立宏观审慎管理框架，拟订金融业重大法律法规和其他有关法律法规草案，制定审慎监管基本制度，建立健全金融消费者保护基本制度。（三）制定和执行货币政策、信贷政策，完善货币政策调控体系，负责宏观审慎管理。（四）牵头负责系统性金融风险防范和应急处置，负责金融控股公司等金融集团和系统重要性金融机构基本规则制定、监测分析和并表监管，视情责成有关监管部门采取相应监管措施，并在必要时经国务院批准对金融机构进行检查监督，牵头组织制定实施系统重要性金融机构恢复和处置计划。（五）承担最后贷款人责任，负责对因化解金融风险而使用中央银行资金机构的行为进行检查监督。（六）监督管理银行间债券市场、货币市场、外汇市场、票据市场、黄金市场及上述市场有关场外衍生产品；牵头负责跨市场跨业态跨区域金融风险识别、预警和处置，负责交叉性金融业务的监测评估，会同有关部门制定统一的资产管理产品和公司信用类债券市场及其衍生产品市场基本规则。（七）负责制定和实施人民币汇率政策，推动人民币跨境使用和国际使用，维护国际收支平衡，实施外汇管理，负责国际国内金融市场跟踪监测和风险预警，监测和管理跨境资本流动，持有、管理和经营国家外汇储备和黄金储备。（八）牵头负责重要金融基础设施建设规划并统筹实施监管，推进金融基础设施改革与互联互通，统筹互联网金融监管工作。（九）统筹金融业综合统计，牵头制定统一的金融业综合统计基础标准和工作机制，建设国家金融基础数据库，履行金融统计调查相关工作职责。（十）组织制定金融业信息化发展规划，负责金融标准化组织管理协调和金融科技相关工作，指导金融业网络安全和信息化工作。（十一）发行人民币，管理人民币流通。（十二）统筹国家支付体系建设并实施监督管理。会同有关部门制定支付结算业务规则，负责全国支付、清算系统的安全稳定高效运行。（十三）经理国库。（十四）承担全国反洗钱和反恐怖融资工作的组织协调和监督管理责任，负责涉嫌洗钱及恐怖活动的资金监测。（十五）管理征信业，推动建立社会信用体系。（十六）参与和中国人民银行业务有关的全球经济金融治理，开展国际金融合作。（十七）按照有关规定从事金融业务活动。（十八）管理国家外汇管理局。（十九）完成党中央、国务院交办的其他任务。（二十）职能转变。完善宏观调控体系，创新调控方式，构建发展规划、财政、金融等政策协调和工作协同机制，强化经济监测预测预警能力，建立健全重大问题研究和政策储备工作机制，增强宏观调控的前瞻性、针对性、协同性。围绕党和国家金融工作的指导方针和任务，加强和优化金融管理职能，增强货币政策、宏观审慎政策、金融监管政策的协调性，强化宏观审慎管理和系统性金融风险防范职责，守住不发生系统性金融风险的底线。按照简政放权、放管结合、优化服务、职能转变的工作要求，进一步深化行政审批制度改革和金融市场改革，着力规范和改进行政审批行为，提高行政审批效率。加快推进“互联网+政务服务”，加强事中事后监管，切实提高政府服务质量和效果。继续完善金融法律制度体系，做好“放管服”改革的制度保障，为稳增长、促改革、调结构、惠民生提供有力支撑，促进经济社会持续平稳健康发展。"},{"type":"中华人民共和国审计署","description":"（一）主管全国审计工作。负责对国家财政收支和法律法规规定属于审计监督范围的财务收支的真实、合法和效益进行审计监督，对公共资金、国有资产、国有资源和领导干部履行经济责任情况实行审计全覆盖，对领导干部实行自然资源资产离任审计，对国家有关重大政策措施贯彻落实情况进行跟踪审计。对审计、专项审计调查和核查社会审计机构相关审计报告的结果承担责任，并负有督促被审计单位整改的责任。（二）起草审计法律法规草案，拟订审计政策，制定审计规章、国家审计准则和指南并监督执行。制定并组织实施专业领域审计工作规划。参与起草财政经济及其相关法律法规草案。对直接审计、调查和核查的事项依法进行审计评价，作出审计决定或提出审计建议。（三）向中央审计委员会提出年度中央预算执行和其他财政支出情况审计报告。向国务院总理提出年度中央预算执行和其他财政收支情况的审计结果报告。受国务院委托向全国人大常委会提出中央预算执行和其他财政收支情况的审计工作报告、审计查出问题整改情况报告。向党中央、国务院报告对其他事项的审计和专项审计调查情况及结果。依法向社会公布审计结果。向中央和国家机关有关部门、省级党委和政府通报审计情况和审计结果。（四）直接审计下列事项，出具审计报告，在法定职权范围内作出审计决定，包括国家有关重大政策措施贯彻落实情况；中央预算执行情况和其他财政收支，中央和国家机关各部门（含直属单位）预算执行情况、决算草案和其他财政收支；省级政府预算执行情况、决算草案和其他财政收支，中央财政转移支付资金；使用中央财政资金的事业单位和社会团体的财务收支；中央投资和以中央投资为主的建设项目的预算执行情况和决算，国家重大公共工程项目的资金管理使用和建设运营情况；自然资源管理、污染防治和生态保护与修复情况；中国人民银行、国家外汇局的财务收支，中央国有企业和金融机构、国务院规定的中央国有资本占控股或主导地位的企业和金融机构境内外资产、负债和损益，国家驻外非经营性机构的财务收支；有关社会保障基金、社会捐赠资金和其他基金、资金的财务收支；国际组织和外国政府援助、贷款项目；法律法规规定的其他事项。（五）按规定对省部级党政主要领导干部及其他单位主要负责人实施经济责任审计和自然资源资产离任审计。（六）组织实施对国家财经法律法规、规章、政策和宏观调控措施执行情况、财政预算管理及国有资产管理使用等与国家财政收支有关的特定事项进行专项审计调查。（七）依法检查审计决定执行情况，督促整改审计查出的问题，依法办理被审计单位对审计决定提请行政复议、行政诉讼或国务院裁决中的有关事项，协助配合有关部门查处相关重大案件。（八）指导和监督内部审计工作，核查社会审计机构对依法属于审计监督对象的单位出具的相关审计报告。（九）与省级党委和政府共同领导省级审计机关。依法领导和监督地方审计机关的业务，组织地方审计机关实施特定项目的专项审计或审计调查，纠正或责成纠正地方审计机关违反国家规定作出的审计决定。按照干部管理权限协管省级审计机关负责人。（十）组织开展审计领域的国际交流与合作，指导和推广信息技术在审计领域的应用。（十一）完成党中央、国务院交办的其他任务。（十二）职能转变。进一步完善审计管理体制，加强全国审计工作统筹，明晰各级审计机关职能定位，理顺内部职责关系，优化审计资源配置，充实加强一线审计力量，构建集中统一、全面覆盖、权威高效的审计监督体系。优化审计工作机制，坚持科技强审，完善业务流程，改进工作方式，加强与相关部门的沟通协调，充分调动内部审计和社会审计力量，增强监督合力。"},{"type":"人力资源和社会保障部","description":"（一）拟订人力资源和社会保障事业发展政策、规划，起草相关法律法规草案，制定部门规章并组织实施。（二）拟订人力资源市场发展规划和人力资源服务业发展、人力资源流动政策，促进人力资源合理流动、有效配置。（三）负责促进就业工作，拟订统筹城乡的就业发展规划和政策，完善公共就业创业服务体系，统筹建立面向城乡劳动者的职业技能培训制度，拟订就业援助制度，牵头拟订高校毕业生就业政策。（四）统筹推进建立覆盖城乡的多层次社会保障体系。拟订养老、失业、工伤等社会保险及其补充保险政策和标准。拟订养老保险全国统筹办法和全国统一的养老、失业、工伤保险关系转续办法。组织拟订养老、失业、工伤等社会保险及其补充保险基金管理和监督制度，编制相关社会保险基金预决算草案，参与拟订相关社会保障基金投资政策。会同有关部门实施全民参保计划并建立全国统一的社会保险公共服务平台。（五）负责就业、失业和相关社会保险基金预测预警和信息引导，拟订应对预案，实施预防、调节和控制，保持就业形势稳定和相关社会保险基金总体收支平衡。（六）统筹拟订劳动人事争议调解仲裁制度和劳动关系政策，完善劳动关系协商协调机制，拟订职工工作时间、休息休假和假期制度，拟订消除非法使用童工政策和女工、未成年工特殊劳动保护政策。组织实施劳动保障监察，协调劳动者维权工作，依法查处重大案件。（七）牵头推进深化职称制度改革，拟订专业技术人员管理、继续教育和博士后管理等政策，负责高层次专业技术人才选拔和培养工作，拟订吸引留学人员来华（回国）工作或定居政策。组织拟订技能人才培养、评价、使用和激励制度。完善职业资格制度，健全职业技能多元化评价政策。（八）会同有关部门指导事业单位人事制度改革，按照管理权限负责规范事业单位岗位设置、公开招聘、聘用合同等人事综合管理工作，拟订事业单位工作人员和机关工勤人员管理政策。（九）会同有关部门拟订国家表彰奖励制度，综合管理国家表彰奖励工作，承担全国评比达标表彰和省部级表彰等工作，根据授权承办以党中央、国务院名义开展的国家级表彰奖励活动。（十）会同有关部门拟订事业单位人员工资收入分配政策，建立企事业单位人员工资决定、正常增长和支付保障机制。拟订企事业单位人员福利和离退休政策。（十一）会同有关部门拟订农民工工作的综合性政策和规划，推动相关政策落实，协调解决重点难点问题，维护农民工合法权益。（十二）负责人力资源和社会保障领域国际交流与合作工作，拟订派往国际组织职员管理制度。（十三）完成党中央、国务院交办的其他任务。（十四）职能转变。深入推进简政放权、放管结合、优化服务改革，进一步减少行政审批事项，规范和优化对外办理事项，减少职业资格许可和认定等审批事项，实行国家职业资格目录清单管理，加强事中事后监管，创新就业和社会保障等公共服务方式，加强信息共享，提高公共服务水平。（十五）有关职责分工。与教育部的有关职责分工。高校毕业生就业政策由人力资源和社会保障部牵头，会同教育部等部门拟订。高校毕业生离校前的就业指导和服务工作，由教育部负责；高校毕业生离校后的就业指导和服务工作，由人力资源和社会保障部负责。　　第四条　人力资源和社会保障部设下列内设机构:（一）办公厅。负责机关日常运转，承担信息、安全、机要、保密、信访、政务公开等工作。（二）政策研究司。组织开展人力资源和社会保障政策研究和改革推进工作，承担重要文稿起草、协调专家咨询、新闻发布等工作。（三）法规司。组织起草相关法律法规草案和规章，承担规范性文件的合法性审查工作，承担行政复议、行政应诉等工作。（四）规划财务司。拟订人力资源和社会保障事业发展规划和年度计划，编制相关社会保险基金预决算草案，参与拟订相关社会保障资金（基金）财务管理制度。承担统计、信息规划、国有资产管理、内部审计、有关国际援贷款项目等工作。（五）就业促进司。拟订就业规划、计划和劳动者公平就业、农村劳动力转移就业、跨地区有序流动等政策，健全公共就业创业服务体系。牵头拟订高校毕业生就业政策，拟订就业援助、特殊群体就业等政策，参与拟订就业补助资金管理办法。（六）人力资源流动管理司。拟订人力资源市场、人力资源服务业发展和人力资源流动的政策和规划，指导人力资源社会服务机构管理工作，拟订人员（不含公务员）调配政策并组织实施。（七）职业能力建设司。组织拟订技能人才培养、评价、使用和激励制度，拟订城乡劳动者职业培训政策、规划，指导开展技工学校教育和职业技能培训，指导师资队伍和教材建设，拟订职业分类、职业技能标准。（八）专业技术人员管理司。组织推进深化职称制度改革，拟订专业技术人员管理和继续教育政策，完善职业资格和博士后管理制度，承担高层次专业技术人才规划、培养和组织享受政府特殊津贴人员选拔工作。拟订吸引留学人员来华（回国）工作、定居和国（境）外机构在国内招聘专业技术骨干人才管理政策。（九）事业单位人事管理司。指导事业单位人事制度改革，拟订事业单位工作人员和机关工勤人员管理政策，按照管理权限承办事业单位岗位设置的备案事宜，拟订事业单位招聘国（境）外人员（不含专家）政策。（十）农民工工作司。拟订农民工工作综合性政策和规划，推动相关政策落实，维护农民工合法权益，协调处理涉及农民工的重点难点问题和重大事件。（十一）劳动关系司。拟订劳动关系政策和劳动合同、集体合同制度，拟订职工工作时间、休息休假和假期制度，拟订消除非法使用童工政策和女工、未成年工特殊劳动保护政策。拟订企业职工工资收入分配的宏观调控和支付保障政策，指导和监督国有企业工资总额管理和企业负责人工资收入分配。（十二）工资福利司。拟订事业单位工作人员和机关工勤人员工资收入分配、福利和离退休政策，组织拟订事业单位驻外非外交人员等工资政策，承担中央事业单位绩效工资总量管理工作。（十三）养老保险司。拟订机关企事业单位基本养老保险、企业（职业）年金、个人储蓄性养老保险政策和标准，拟订养老保险全国统筹和基金管理办法，完善基金预测预警制度，审核省级基本养老保险费率。（十四）失业保险司。拟订失业保险政策、标准和基金管理办法，建立失业监测和预警制度，拟订预防、调节、控制较大规模和经济结构调整中涉及职工安置权益保障的政策。（十五）工伤保险司。拟订工伤保险政策、规划和标准并组织实施，完善工伤预防、认定和康复政策，组织拟订工伤与职业病致残等级鉴定标准。（十六）农村社会保险司。拟订城乡居民基本养老保险和被征地农民社会保障的政策、规划、标准，拟订征地方案中有关被征地农民社会保障措施的审核办法并组织实施。（十七）社会保险基金监管局。拟订基本养老、失业、工伤等社会保险及企业（职业）年金、个人储蓄性养老保险基金监管制度和养老保险基金运营政策,依法监督基金的收支、管理和投资运营，组织查处重大案件，参与拟订相关社会保障基金投资政策。（十八）调解仲裁管理司。拟订劳动人事争议调解仲裁制度并指导实施，指导开展劳动人事争议预防工作，依法指导处理重大劳动人事争议。（十九）劳动保障监察局。拟订劳动保障监察工作制度，依法查处和督办重大案件，指导地方开展劳动保障监察工作，协调劳动者维权工作，组织处理有关突发事件。（二十）国家表彰奖励办公室。拟订国家表彰奖励制度，根据授权承办以党中央、国务院名义开展的表彰奖励活动，承担相关国家表彰奖励获得者、国务院荣誉称号获得者和省部级荣誉称号获得者的管理等工作，承担全国评比达标表彰和省部级表彰有关工作。（二十一）国际合作司（港澳台办公室）。承办国际交流合作、与港澳台交流合作和外事管理工作，拟订派往国际组织职员管理制度。（二十二）人事司。承担机关和直属单位的人事管理、机构编制和队伍建设等工作，承办中央管理的部分领导人员的行政任免手续。机关党委。负责机关和在京直属单位的党群工作。离退休干部局。负责机关离退休干部工作，指导直属单位的离退休干部工作。"},{"type":"国家税务总局","description":"（一）具体起草税收法律法规草案及实施细则并提出税收政策建议，与财政部共同上报和下发，制订贯彻落实的措施。负责对税收法律法规执行过程中的征管和一般性税政问题进行解释，事后向财政部备案。（二）承担组织实施税收及社会保险费、有关非税收入的征收管理责任，力争税费应收尽收。（三）参与研究宏观经济政策、中央与地方的税权划分并提出完善分税制的建议，研究税负总水平并提出运用税收手段进行宏观调控的建议。（四）负责组织实施税收征收管理体制改革，起草税收征收管理法律法规草案并制定实施细则，制定和监督执行税收业务、征收管理的规章制度，监督检查税收法律法规、政策的贯彻执行。（五）负责规划和组织实施纳税服务体系建设，制定纳税服务管理制度，规范纳税服务行为，制定和监督执行纳税人权益保障制度，保护纳税人合法权益，履行提供便捷、优质、高效纳税服务的义务，组织实施税收宣传，拟订税务师管理政策并监督实施。（六）组织实施对纳税人进行分类管理和专业化服务，组织实施对大型企业的纳税服务和税源管理。（七）负责编报税收收入中长期规划和年度计划，开展税源调查，加强税收收入的分析预测，组织办理税收减免等具体事项。（八）负责制定税收管理信息化制度，拟订税收管理信息化建设中长期规划，组织实施金税工程建设。（九）开展税收领域的国际交流与合作，参加国家（地区）间税收关系谈判，草签和执行有关的协议、协定。（十）办理进出口商品的税收及出口退税业务。（十一）以税务总局为主、与省区市党委和政府对全国税务系统实行双重领导。（十二）承办党中央、国务院交办的其他事项。"},{"type":"中华人民共和国国家发展和改革委员会","description":"（一）拟订并组织实施国民经济和社会发展战略、中长期规划和年度计划。牵头组织统一规划体系建设。负责国家级专项规划、区域规划、空间规划与国家发展规划的统筹衔接。起草国民经济和社会发展、经济体制改革和对外开放的有关法律法规草案，制定部门规章。（二）提出加快建设现代化经济体系、推动高质量发展的总体目标、重大任务以及相关政策。组织开展重大战略规划、重大政策、重大工程等评估督导，提出相关调整建议。（三）统筹提出国民经济和社会发展主要目标，监测预测预警宏观经济和社会发展态势趋势，提出宏观调控政策建议。综合协调宏观经济政策，牵头研究宏观经济应对措施。调节经济运行，协调解决经济运行中的重大问题。拟订并组织实施有关价格政策，组织制定少数由国家管理的重要商品、服务价格和重要收费标准。参与拟订财政政策、货币政策和土地政策。（四）指导推进和综合协调经济体制改革有关工作，提出相关改革建议。牵头推进供给侧结构性改革。协调推进产权制度和要素市场化配置改革。推动完善基本经济制度和现代市场体系建设，会同相关部门组织实施市场准入负面清单制度。牵头推进优化营商环境工作。（五）提出利用外资和境外投资的战略、规划、总量平衡和结构优化政策。牵头推进实施“一带一路”建设。承担统筹协调走出去有关工作。会同有关部门提出外商投资准入负面清单。负责全口径外债的总量控制、结构优化和监测工作。（六）负责投资综合管理，拟订全社会固定资产投资总规模、结构调控目标和政策，会同相关部门拟订政府投资项目审批权限和政府核准的固定资产投资项目目录。安排中央财政性建设资金，按国务院规定权限审批、核准、审核重大项目。规划重大建设项目和生产力布局。拟订并推动落实鼓励民间投资政策措施。（七）推进落实区域协调发展战略、新型城镇化战略和重大政策，组织拟订相关区域规划和政策。统筹推进实施国家重大区域发展战略。组织拟订和实施老少边贫及其他特殊困难地区发展规划和政策，组织实施易地扶贫搬迁等。统筹协调区域合作和对口支援工作。组织编制并推动实施新型城镇化规划。（八）组织拟订综合性产业政策。协调一二三产业发展重大问题并统筹衔接相关发展规划和重大政策。协调推进重大基础设施建设发展，组织拟订并推动实施服务业及现代物流业战略规划和重大政策。综合研判消费变动趋势，拟订实施促进消费的综合性政策措施。（九）推动实施创新驱动发展战略。会同相关部门拟订推进创新创业的规划和政策，提出创新发展和培育经济发展新动能的政策。会同相关部门规划布局国家重大科技基础设施。组织拟订并推动实施高技术产业和战略性新兴产业发展规划政策，协调产业升级、重大技术装备推广应用等方面的重大问题。（十）跟踪研判有关风险隐患，提出相关工作建议。负责重要商品总量平衡和宏观调控。会同有关部门拟订国家储备物资品种目录、总体发展规划。（十一）负责社会发展与国民经济发展的政策衔接，协调有关重大问题。组织拟订社会发展战略、总体规划，统筹推进基本公共服务体系建设和收入分配制度改革，提出促进就业、完善社会保障与经济协调发展的政策建议。牵头开展社会信用体系建设。（十二）推进实施可持续发展战略，推动生态文明建设和改革，协调生态环境保护与修复、能源资源节约和综合利用等工作。提出健全生态保护补偿机制的政策措施，综合协调环保产业和清洁生产促进有关工作。提出能源消费控制目标、任务并组织实施。（十三）会同有关部门拟订推进经济建设与国防建设协调发展的战略和规划，协调有关重大问题。组织编制国民经济动员规划，协调和组织实施国民经济动员有关工作。（十四）承担国家国防动员委员会、国务院西部地区开发领导小组、国务院振兴东北地区等老工业基地领导小组、推进“一带一路”建设工作领导小组、京津冀协同发展领导小组、推动长江经济带发展领导小组、粤港澳大湾区建设领导小组、推进海南全面深化改革开放领导小组等有关具体工作。（十五）管理国家粮食和物资储备局、国家能源局。（十六）完成党中央、国务院交办的其他任务。（十七）职能转变。贯彻新发展理念，把主要精力转到管宏观、谋全局、抓大事上来，加强跨部门、跨地区、跨行业、跨领域的重大战略规划、重大改革、重大工程的综合协调，统筹全面创新改革，提高经济发展质量和效益。进一步减少微观管理事务和具体审批事项，最大限度减少政府对市场资源的直接配置，最大限度减少政府对市场活动的直接干预，提高资源配置效率和公平性，激发各类市场主体活力。1．强化制定国家发展战略、统一规划体系的职能，完善国家规划制度，做好规划统筹，精简规划数量，提高规划质量，更好发挥国家发展战略、规划的导向作用。2．完善宏观调控体系，创新调控方式，构建发展规划、财政、金融等政策协调和工作协同机制，强化经济监测预测预警能力，建立健全重大问题研究和政策储备工作机制，增强宏观调控的前瞻性、针对性、协同性。　　3.深入推进简政放权，全面实施市场准入负面清单制度。深化投融资体制改革，最大限度减少项目审批、核准范围。深化价格改革，及时修订调减政府定价目录，健全反映市场供求的定价机制。加快推进政府监管和公共信用信息共享。（十八）有关职责分工。1．与商务部有关职责分工。国家发展和改革委员会会同商务部等部门负责拟订全国和自贸试验区外商投资准入负面清单、外商投资产业指导目录、中西部地区外商投资优势产业目录，并由国家发展和改革委员会与商务部联合发布。2．与国家卫生健康委员会有关职责分工。国家发展和改革委员会负责组织监测和评估人口变动情况及趋势影响，建立人口预测预报制度，开展重大决策人口影响评估，完善重大人口政策咨询机制，研究提出国家人口发展战略，拟订人口发展规划和人口政策，研究提出人口与经济、社会、资源、环境协调可持续发展，以及统筹促进人口长期均衡发展的政策建议。国家卫生健康委员会负责开展人口监测预警工作，拟订生育政策，研究提出与生育相关的人口数量、素质、结构、分布方面的政策建议，促进生育政策和相关经济社会政策配套衔接，参与制定人口发展规划和政策，落实国家人口发展规划中的有关任务。3．与国家粮食和物资储备局有关职责分工。国家发展和改革委员会拟订中央储备粮棉糖等战略物资储备的规划和总量计划。国家粮食和物资储备局负责收储、轮换，按照国家发展和改革委员会的动用指令，按程序组织实施。4．与国家能源局有关职责分工。（1）国家能源局负责拟订能源发展战略、规划和政策，提出能源体制改革建议，由国家发展和改革委员会审定或审核后报国务院。国家发展和改革委员会负责能源规划与国家发展规划的衔接平衡。（2）国家能源局按规定权限核准、审核能源投资项目，其中重大项目报国家发展和改革委员会核准，或经国家发展和改革委员会审核后报国务院核准。能源的中央财政性建设资金投资，由国家能源局汇总提出安排建议，报国家发展和改革委员会审定后下达。（3）国家能源局拟订石油、天然气战略储备规划，提出国家石油、天然气战略储备收储、动用建议，经国家发展和改革委员会审核后，报国务院审批。国家发展和改革委员会设下列内设机构：（一）办公厅。负责机关日常运转工作。承担信息、安全保密、信访、政务公开、机关财务、资产管理等工作。组织建议提案办理、电子政务、内部审计等工作。（二）政策研究室。起草重要文件。组织研究经济社会发展、改革开放和国际经济的重大问题。组织开展新闻宣传、舆情监测及预期管理相关工作。（三）发展战略和规划司。提出国家重大发展战略、经济结构调整政策和重大生产力布局建议，组织拟订并推动实施国家发展规划。承担统一规划体系建设工作，统筹衔接国家级专项规划、区域规划、空间规划与国家发展规划。统筹规划编制立项。提出新型城镇化战略、规划和城乡融合发展政策建议，编制实施跨省区城市群和都市圈规划。（四）国民经济综合司。组织拟订和实施国民经济和社会发展年度计划。监测分析、预测预警宏观经济形势。研究总量平衡，提出宏观调控目标和政策取向及调控建议，开展重大政策预研和预评估。提出建设现代化经济体系和推动高质量发展的政策建议。提出重要商品总量平衡相关政策建议。组织拟订国家储备物资品种目录、总体发展规划。（五）经济运行调节局。监测研判经济运行态势并提出相关政策建议，协调经济运行中的重大问题。承担供给侧结构性改革相关工作。统筹协调煤电油气运保障工作并组织应对有关重大突发性事件，提出安排相关物资储备和动用的建议。（六）体制改革综合司。指导推进和综合协调经济体制改革。研究经济体制改革和对外开放重大问题，拟订并组织实施综合性经济体制改革方案及有关专项改革方案。推进国有企业混合所有制和垄断行业改革，提出完善产权制度、促进非公有制经济发展的政策建议。推进要素市场化配置改革，组织实施市场准入负面清单制度。（七）固定资产投资司。提出深化投融资体制改革建议。起草固定资产投资管理有关法律法规草案。提出政府投资项目审批权限和政府核准的固定资产投资项目目录建议。安排中央财政性建设资金，按权限审核重大项目。协调推进投资项目审批制度改革。拟订促进民间投资发展政策。按分工组织推广政府和社会资本合作。指导工程咨询业发展。（八）利用外资和境外投资司（港澳台办公室）。提出利用外资和境外投资的战略、规划及有关政策建议，按权限审核重大项目。承担全口径外债管理有关工作。组织拟订国际金融组织贷款、外国政府贷款、本外币国际商业贷款（含境外发债）规划。组织拟订外商投资产业指导目录、中西部地区外商投资优势产业目录、外商投资准入负面清单。指导协调基础设施互联互通、产能和装备制造、能源资源等领域重大项目的国际合作。（九）地区经济司（京津冀协同发展领导小组办公室）。推进落实区域协调发展战略，组织拟订区域规划和政策。推进实施西部开发、东北振兴、中部崛起、东部率先发展和京津冀协同发展、粤港澳大湾区建设、海南全面深化改革开放的战略、规划及重大政策，指导推进雄安新区建设，承担相关领导小组日常工作。承担国家级新区规划布局工作。协调国土整治、开发利用和保护政策。推进重点流域综合治理和流域经济发展。承担实施海洋强国战略有关工作。（十）地区振兴司。组织拟订老少边贫及其他特殊困难地区发展规划和政策，编制易地扶贫搬迁、以工代赈规划。提出涉疆涉藏经济社会发展重大政策建议，统筹推进对口支援工作。提出健全生态保护补偿机制政策措施。统筹推进老工业城市及城区老工业区调整改造、资源型地区经济转型和采煤沉陷区及独立工矿区综合治理。组织编制重特大自然灾害灾后恢复重建规划，协调有关重大问题。（十一）区域开放司（推进“一带一路”建设工作领导小组办公室）。推进实施“一带一路”建设，承担推进“一带一路”建设工作领导小组日常工作。按分工指导区域开放合作，提出相关政策建议，承担国际区域合作相关工作。提出并推进实施沿边地区开发开放规划和政策措施。（十二）农村经济司。提出农村经济和生态保护与建设发展战略、体制改革及有关政策建议，协调有关重大问题；衔接平衡农业、林业、草原、水利、气象、生态及有关农村基础设施等发展规划、计划和政策，提出重大项目布局建议并协调实施。按分工提出大中型水利水电工程移民政策建议。（十三）基础设施发展司（推动长江经济带发展领导小组办公室）。统筹能源、交通运输发展规划与国家发展规划的衔接平衡。提出能源发展战略、重大规划、重大产业政策、重大改革方案和重大投资项目的审核意见。综合分析交通运输运行状况，协调有关重大问题，提出统筹综合交通发展有关政策建议。提出重大基础设施布局建议并协调实施。推动实施长江经济带发展战略，承担推动长江经济带发展领导小组日常工作。（十四）产业发展司。组织拟订综合性产业政策。统筹衔接工业发展规划。拟订支持实体经济发展、加快发展先进制造业的政策措施，会同有关部门提出工业重大项目布局建议和相关产业重大工程并协调实施。协调重大技术装备推广应用和产业基地建设。拟订并协调实施服务业发展战略、规划和政策。（十五）创新和高技术发展司。组织拟订推进创新创业和高技术产业发展的规划和政策，推进创新能力建设和新兴产业创业投资。会同有关方面提出国家重大科技基础设施规划布局建议。提出国家技术经济安全和培育经济发展新动能政策建议，推动技术创新和相关高新技术产业化，组织重大示范工程。统筹推进战略性新兴产业和数字经济发展，组织实施国家大数据战略，衔接平衡信息化发展规划与国家发展规划。（十六）资源节约和环境保护司。拟订和组织实施绿色发展相关战略、规划和政策，推进实施可持续发展战略，承担生态文明建设和改革相关工作。拟订并协调实施能源资源节约和综合利用、循环经济政策规划，提出能源消费控制目标并组织实施。协调环保产业和清洁生产促进有关工作。组织协调重大节能示范工程和新产品、新技术、新设备的推广应用。承担国家应对气候变化及节能减排工作领导小组有关节能方面具体工作。（十七）社会发展司。综合提出并协调实施社会发展战略、规划和政策。协调社会事业和产业发展政策及改革重大问题。统筹推进基本公共服务体系建设。拟订人口发展和应对老龄化战略、规划及政策。（十八）就业收入分配和消费司。提出促进就业、调整收入分配、完善社会保障与经济协调发展的战略、规划和政策建议，统筹推进收入分配制度改革及相关体制改革。提出并协调实施促进消费体制机制及扩大居民消费的相关政策措施。（十九）经济贸易司。监测研判国内外市场及外贸形势并提出政策建议。承担重要商品总量平衡和宏观调控相关工作。拟订粮食、棉花、食糖、化肥等中央储备的规划和总量计划。拟订现代物流业发展战略、规划和政策，协调流通体制改革有关重大问题。（二十）财政金融和信用建设司。研究分析全社会资金平衡和财政、金融体制改革等问题。研究财政、货币政策与发展规划、产业和区域政策协调发展并提出相关建议。提出直接融资的发展战略和政策建议，按分工审核非上市公司发行企业（公司）债券。组织拟订促进私募股权投资基金发展的政策措施，推进创业投资和产业投资基金发展与制度建设。推进社会信用体系建设。（二十一）价格司。监测预测预警价格变动，提出价格调控目标和政策建议。推进重要商品、服务和要素价格改革。组织起草有关价格和收费法规草案和政策。组织拟订少数由国家管理的重要商品和服务价格、重要收费政策，调整中央政府管理的商品和服务价格、收费标准。组织重点行业、重要农产品、重要商品和服务的成本调查，按规定承担政府定价项目成本监审。（二十二）法规司。起草有关法律法规草案和规章。承担机关有关规范性文件合法性审查工作。承担相关行政复议、行政应诉工作。按规定指导协调招投标工作。承担整合建立统一规范的公共资源交易平台相关工作。推进优化营商环境工作。（二十三）国际合作司。承担与相关外国政府部门及机构、国际组织合作有关事宜。组织开展重要经济对话相关工作，参与重大经济外交活动和推进“一带一路”国际合作、成果落实相关工作，协助推进重大涉外项目。开展国际经济调研。（二十四）人事司。承担机关和直属单位的人事管理、机构编制、教育培训、人才发展、劳动工资和绩效管理等工作。（二十五）经济与国防协调发展司。组织拟订推进经济建设与国防建设协调发展的战略和规划，协调有关重大问题。协调和组织实施国民经济动员有关工作。（二十六）评估督导司。拟订相关重大战略规划、重大政策、重大工程等评估督导的制度并组织实施，提出相关评估评价意见和改进措施建议。机关党委。负责机关和直属单位的党群、纪检和巡视工作。　　离退休干部局。负责离退休干部工作。"},{"type":"国家信访局","description":"（一）负责处理国内群众、境外人士、法人及其他组织通过信访渠道给党中央、国务院及领导同志的来信来电，接待来访。（二）负责向党中央、国务院及中共中央办公厅、国务院办公厅反映来信来电来访中提出的重要建议、意见和问题，综合研判信访信息，开展调查研究，提出制定修改完善有关方针、政策和法律法规的建议。（三）承担督促检查领导同志有关批示件落实情况的责任，拟订信访督查制度并组织实施，承办中央领导同志交办信访事项的落实，向地方和部门转办、交办信访事项，督促检查重要信访事项的处理和落实。（四）综合协调处理跨地区、跨部门的重要信访问题。（五）综合协调指导全国信访工作，起草有关信访工作的方针、政策和法律、法规草案，推动中央关于信访工作决策部署的贯彻落实，总结推广各地区、各部门信访工作经验，提出改进和加强信访工作的意见和建议，检查、指导中央党、政、军各部门的信访工作和地方党、政机关的信访工作。（六）制定信访问题排查化解制度并组织实施，建立和完善信访信息汇集分析机制，指导信访信息系统建设和应用。（七）承担中央信访工作联席会议的日常工作，督促落实联席会议决定的事项。（八）协调信访工作的宣传和信息发布，协调信访工作外事活动和对外交流。（九）承担党中央、国务院及中共中央办公厅、国务院办公厅交办的其他事项。"},{"type":"国家知识产权局","description":"（一）负责拟订和组织实施国家知识产权战略。拟订加强知识产权强国建设的重大方针政策和发展规划。拟订和实施强化知识产权创造、保护和运用的管理政策和制度。（二）负责保护知识产权。拟订严格保护商标、专利、原产地地理标志、集成电路布图设计等知识产权制度并组织实施。组织起草相关法律法规草案，拟订部门规章，并监督实施。研究鼓励新领域、新业态、新模式创新的知识产权保护、管理和服务政策。研究提出知识产权保护体系建设方案并组织实施，推动建设知识产权保护体系。负责指导商标、专利执法工作，指导地方知识产权争议处理、维权援助和纠纷调处。（三）负责促进知识产权运用。拟订知识产权运用和规范交易的政策，促进知识产权转移转化。规范知识产权无形资产评估工作。负责专利强制许可相关工作。制定知识产权中介服务发展与监管的政策措施。（四）负责知识产权的审查注册登记和行政裁决。实施商标注册、专利审查、集成电路布图设计登记。负责商标、专利、集成电路布图设计复审和无效等行政裁决。拟订原产地地理标志统一认定制度并组织实施。（五）负责建立知识产权公共服务体系。建设便企利民、互联互通的全国知识产权信息公共服务平台，推动商标、专利等知识产权信息的传播利用。（六）负责统筹协调涉外知识产权事宜。拟订知识产权涉外工作的政策，按分工开展对外知识产权谈判。开展知识产权工作的国际联络、合作与交流活动。（七）完成党中央、国务院交办的其他任务。"},{"type":"国家移民管理局","description":"负责全国移民管理工作；负责协调拟订移民和出入境管理政策与规划并协调组织实施，起草相关法律法规草案；负责建立健全签证管理协调机制，组织实施外国人来华口岸签证、入境许可签发管理和签证延期换发；负责外国人来华留学管理、工作有关管理、停留居留和永久居留管理、国籍管理、难民管理；负责出入境边防检查、边民往来管理、边境地区边防管理；负责中国公民因私出入境管理、港澳台居民回内地（大陆）定居审批管理；牵头协调非法入境、非法居留、非法就业外国人治理和非法移民遣返，查处妨害国（边）境管理等违法犯罪行为；承担移民领域国际合作等。国家移民管理局领导管理全国出入境边防检查机构、边境管理机构各项工作，指导管理各省、自治区、直辖市公安机关出入境管理机构业务工作。国家移民管理局内设机构共设8司1委：综合司、政策法规司、外国人管理司、公民出入境管理司、边防检查管理司、信息科技司、干部人事司、后勤保障司以及机关党委。国家移民管理局所属事业单位分别为：出入境管理信息技术研究所、移民事务服务中心、警务保障中心。出入境边防检查机构。在对外开放口岸设立出入境边防检查机构，实施出入境人员和交通运输工具的查验管理、口岸限定区域管理，防范查处非法入出境活动等。边境管理机构。在沿边地区设立边境管理机构，实施进出边境管理区人员和交通运输工具检查管理、辖区治安管理、边民往来管理，防范查处非法入出境活动，侦办妨害国（边）境管理犯罪案件等。公安机关出入境管理机构。在省、市、县公安机关设立出入境管理机构，根据国家移民管理局的授权和委托，承担公民因私出国（境）管理、受理签发公民因私事出入境证件，实施外国人来华停留居留和永久居留的日常管理，签发口岸签证及其他相应的证件，查处出入境违法犯罪活动等"},{"type":"中华人民共和国公安部","description":"公安部是国务院组成部门，是全国公安工作的最高领导机关和指挥机关。公安部设有办公厅、情报指挥、研究室、督察审计、人事训练、新闻宣传、经济犯罪侦查、治安管理、刑事侦查、反恐怖、食品药品犯罪侦查、特勤、铁路公安、网络安全保卫、监所管理、警务保障、交通管理、法制、国际合作、装备财务、禁毒、科技信息化等局级机构，分别承担有关业务工作。海关总署缉私局、中国民用航空局公安局列入公安部序列，分别接受公安部和海关总署、公安部和中国民用航空局双重领导，以公安部领导为主。"},{"type":"国家林业和草原局","description":"（一）负责林业和草原及其生态保护修复的监督管理。拟订林业和草原及其生态保护修复的政策、规划、标准并组织实施，起草相关法律法规、部门规章草案。组织开展森林、草原、湿地、荒漠和陆生野生动植物资源动态监测与评价。（二）组织林业和草原生态保护修复和造林绿化工作。组织实施林业和草原重点生态保护修复工程，指导公益林和商品林的培育，指导、监督全民义务植树、城乡绿化工作。指导林业和草原有害生物防治、检疫工作。承担林业和草原应对气候变化的相关工作。（三）负责森林、草原、湿地资源的监督管理。组织编制并监督执行全国森林采伐限额。负责林地管理，拟订林地保护利用规划并组织实施，指导国家级公益林划定和管理工作，管理重点国有林区的国有森林资源。负责草原禁牧、草畜平衡和草原生态修复治理工作，监督管理草原的开发利用。负责湿地生态保护修复工作，拟订湿地保护规划和相关国家标准，监督管理湿地的开发利用。（四）负责监督管理荒漠化防治工作。组织开展荒漠调查，组织拟订防沙治沙、石漠化防治及沙化土地封禁保护区建设规划，拟订相关国家标准，监督管理沙化土地的开发利用，组织沙尘暴灾害预测预报和应急处置。（五）负责陆生野生动植物资源监督管理。组织开展陆生野生动植物资源调查，拟订及调整国家重点保护的陆生野生动物、植物名录，指导陆生野生动植物的救护繁育、栖息地恢复发展、疫源疫病监测，监督管理陆生野生动植物猎捕或采集、驯养繁殖或培植、经营利用，按分工监督管理野生动植物进出口。（六）负责监督管理各类自然保护地。拟订各类自然保护地规划和相关国家标准。负责国家公园设立、规划、建设和特许经营等工作，负责中央政府直接行使所有权的国家公园等自然保护地的自然资源资产管理和国土空间用途管制。提出新建、调整各类国家级自然保护地的审核建议并按程序报批，组织审核世界自然遗产的申报，会同有关部门审核世界自然与文化双重遗产的申报。负责生物多样性保护相关工作。（七）负责推进林业和草原改革相关工作。拟订集体林权制度、重点国有林区、国有林场、草原等重大改革意见并监督实施。拟订农村林业发展、维护林业经营者合法权益的政策措施，指导农村林地承包经营工作。开展退耕（牧）还林还草，负责天然林保护工作。（八）拟订林业和草原资源优化配置及木材利用政策，拟订相关林业产业国家标准并监督实施，组织、指导林产品质量监督，指导生态扶贫相关工作。（九）指导国有林场基本建设和发展，组织林木种子、草种种质资源普查，组织建立种质资源库，负责良种选育推广，管理林木种苗、草种生产经营行为，监管林木种苗、草种质量。监督管理林业和草原生物种质资源、转基因生物安全、植物新品种保护。（十）指导全国森林公安工作，监督管理森林公安队伍，指导全国林业重大违法案件的查处，负责相关行政执法监管工作，指导林区社会治安治理工作。（十一）负责落实综合防灾减灾规划相关要求，组织编制森林和草原火灾防治规划和防护标准并指导实施，指导开展防火巡护、火源管理、防火设施建设等工作。组织指导国有林场林区和草原开展宣传教育、监测预警、督促检查等防火工作。必要时，可以提请应急管理部，以国家应急指挥机构名义，部署相关防治工作。（十二）监督管理林业和草原中央级资金和国有资产，提出林业和草原预算内投资、国家财政性资金安排建议，按国务院规定权限，审核国家规划内和年度计划内投资项目。参与拟订林业和草原经济调节政策，组织实施林业和草原生态补偿工作。（十三）负责林业和草原科技、教育和外事工作，指导全国林业和草原人才队伍建设，组织实施林业和草原国际交流与合作事务，承担湿地、防治荒漠化、濒危野生动植物等国际公约履约工作。（十四）完成党中央、国务院交办的其他任务。（十五）职能转变。国家林业和草原局要切实加大生态系统保护力度，实施重要生态系统保护和修复工程，加强森林、草原、湿地监督管理的统筹协调，大力推进国土绿化，保障国家生态安全。加快建立以国家公园为主体的自然保护地体系，统一推进各类自然保护地的清理规范和归并整合，构建统一规范高效的中国特色国家公园体制"},{"type":"中华人民共和国财政部","description":"（一）拟订财税发展战略、规划、政策和改革方案并组织实施。分析预测宏观经济形势，参与制定宏观经济政策，提出运用财税政策实施宏观调控和综合平衡社会财力的建议。拟订中央与地方、国家与企业的分配政策，完善鼓励公益事业发展的财税政策。（二）起草财政、财务、会计管理的法律、行政法规草案，制定部门规章，并监督执行。组织涉外财政、债务等国际谈判并草签有关协议、协定。（三）负责管理中央各项财政收支。编制年度中央预决算草案并组织执行。组织制定经费开支标准、定额，审核批复部门（单位）年度预决算。受国务院委托，向全国人民代表大会及其常委会报告财政预算、执行和决算等情况。负责政府投资基金中央财政出资的资产管理。负责中央预决算公开。（四）负责组织起草税收法律、行政法规草案及实施细则和税收政策调整方案。参加涉外税收谈判，签订涉外税收协议、协定草案。提出关税和进口税收政策，组织制定免税行业政策和有关管理制度。拟订关税谈判方案，参加有关关税谈判，提出征收特别关税的建议。承担国务院关税税则委员会具体工作。（五）按分工负责政府非税收入管理。负责政府性基金管理，按规定管理行政事业性收费。管理财政票据。制定彩票管理政策和有关办法，监管彩票市场，按规定管理彩票资金。（六）组织制定国库管理制度、国库集中收付制度，指导和监督中央国库业务，开展国库现金管理工作。制定政府财务报告编制办法并组织实施。负责制定政府采购制度并监督管理。负责政府采购市场开放谈判工作。（七）拟订和执行政府国内债务管理制度和政策。依法制定中央和地方政府债务管理制度和办法。编制国债和地方政府债余额限额计划。统一管理政府外债，制定基本管理制度。（八）牵头编制国有资产管理情况报告。根据国务院授权，集中统一履行中央国有金融资本出资人职责。制定全国统一的国有金融资本管理规章制度。拟订行政事业单位国有资产管理规章制度并组织实施，制定需要全国统一规定的开支标准和支出政策。（九）负责审核并汇总编制全国国有资本经营预决算草案，制定国有资本经营预算制度和办法，收取中央本级企业国有资本收益。负责制定并组织实施企业财务制度。负责财政预算内行政事业单位和社会团体的非贸易外汇和财政预算内的国际收支管理。（十）负责审核并汇总编制全国社会保险基金预决算草案，会同有关部门拟订有关资金（基金）财务管理制度，承担社会保险基金财政监管工作。（十一）负责办理和监督中央财政的经济发展支出、中央政府性投资项目的财政拨款，参与拟订中央基建投资有关政策，制定基建财务管理制度。（十二）承担国务院交办的与有关国家和地区多双边财经对话，开展财经领域的国际交流与合作。按规定管理多边开发机构和外国政府的贷（赠）款。代表我国政府参加有关国际财经组织。（十三）负责管理全国会计工作，监督和规范会计行为，制定并组织实施国家统一的会计制度，指导和监督注册会计师和会计师事务所的业务，指导和管理社会审计。依法管理资产评估有关工作。（十四）管理全国社会保障基金理事会。（十五）完成党中央、国务院交办的其他任务。（十六）职能转变。1.完善宏观调控体系，创新调控方式，构建发展规划、财政、金融等政策协调和工作协同机制，强化经济监测预测预警能力，建立健全重大问题研究和政策储备工作机制，增强宏观调控前瞻性、针对性、协同性。2.深化财税体制改革。加快建立现代财政制度，推进财政事权和支出责任划分改革，理顺中央和地方收入划分，建立权责清晰、财力协调、区域均衡的中央和地方财政关系。完善转移支付制度，优化转移支付分类，规范转移支付项目，增强地方统筹能力。逐步统一预算分配，全面实施绩效管理，建立全面规范透明、标准科学、约束有力的预算制度。全面推行政府性基金和行政事业性收费清单管理，完善监督制度。深化税收制度改革，健全地方税体系，逐步提高直接税比重，形成税法统一、税负公平、调节有度的税收制度体系。3.防范化解地方政府债务风险。规范举债融资机制，构建“闭环”管理体系，严控法定限额内债务风险，着力防控隐性债务风险，牢牢守住不发生系统性风险的底线。（十七）有关职责分工。1.税政管理职责分工。（1）财政部负责提出税收立法建议，与国家税务总局等部门提出税种增减、税目税率调整、减免税等建议。财政部负责组织起草税收法律、行政法规草案及实施细则和税收政策调整方案，国家税务总局具体起草税收法律、行政法规草案及实施细则并提出税收政策建议，由财政部组织审议后与国家税务总局共同上报和下发。国家税务总局负责对税收法律、行政法规执行过程中的征管和一般性税政问题进行解释，事后向财政部备案。（2）财政部负责组织起草关税法律、行政法规草案及实施细则，海关总署等部门参与起草，由财政部组织审议后与海关总署共同上报。关税税目税率调整由国务院关税税则委员会负责。关税税收政策调整方案，由财政部会同有关部门研究提出。2.非税收入管理职责分工。财政部负责制定和组织实施非税收入国库集中收缴制度，负责非税收入账户、收缴方式、退付退库等管理。国家税务总局等部门按照非税收入国库集中收缴等有关规定，负责做好非税收入申报征收、会统核算、缴费检查、欠费追缴和违法处罚等工作，有关非税收入项目收缴信息与财政部及时共享。3.中央行政事业单位国有资产管理职责分工。财政部负责制定行政事业单位国有资产管理规章制度，并负责组织实施和监督检查。国家机关事务管理局负责中央行政事业单位（即国务院各部门、各直属事业单位，最高人民法院，最高人民检察院，有关人民团体等）机关和机关服务中心等的国有资产管理，承担产权界定、清查登记、资产处置工作，制定中央行政事业单位国有资产管理具体制度和办法并组织实施，接受财政部的指导和监督检查。中央行政事业单位按规定负责所属事业单位（机关服务中心等除外）及派出机构的国有资产管理。"},{"type":"中国气象局","description":"（一）拟定气象工作的方针政策、法律法规、发展战略和长远规划；制定、发布气象工作的规章制度、技术标准和规范并监督实施；承担气象行政执法和行政复议工作。（二）组织拟订和实施气象灾害防御规划，参与政府气象防灾减灾决策，组织指导气象防灾减灾工作；组织编制国家气象灾害应急预案，组织气象灾害防御应急管理工作；组织气象灾害监测预警及信息发布系统建设，负责气象灾害监测预警和信息发布；承担国家重大突发公共事件预警信息发布工作；负责重大活动、突发公共事件气象保障工作；组织对重大灾害性天气跨地区、跨部门的气象联防和重大气象保障；组织气象灾害风险普查、风险区划和风险评估工作；组织对国家重点工程、重大区域性经济开发项目、城乡建设的气象服务；管理人工影响天气工作。（三）对国务院其他部门设有的气象工作机构实施行业管理，统一规划全国陆地、江河湖泊及海上气象观测、气象台站网、气象基础设施和大型气象技术装备的发展和布局，审订气象信息采集、传输、加工的质量评价方法并监督实施；组织气象技术装备保障和质量监督、气象计量监督，审核全国大中型气象项目的立项和方案。（四）管理全国陆地、江河湖泊及海上气象情报预报警报、短期气候预测、空间天气灾害监测预报预警、城市环境气象预报、火险气象等级预报和气候影响评价的发布；组织论证并审查大气环境影响评价。（五）组织气候变化科学相关工作；组织气候资源的综合调查、区划，指导气候资源的开发利用和保护；组织并审查国家重点建设工程、重大区域性经济开发项目和城乡建设规划的气象条件论证。（六）组织指导气象部门的科技体制改革、组织气象领域重大科研攻关和成果的推广应用，协调气象科技开发、技术合作和技术推广；组织宣传、普及气象科学知识，提高全民气象防灾减灾和气候资源意识。（七）管理气象外事工作，代表我国政府参与世界气象组织及其他国际气象机构的活动，开展与外国政府(地区)气象机构间的合作与交流。（八）统一领导全国气象部门的工作；以中国气象局为主管理省级气象部门的计划财务、机构编制、人事劳动、队伍建设、教育培训和业务建设；指导地方气象事业的发展。（九）协助地方人民政府指导地方气象职工队伍的思想政治工作和精神文明建设。（十）承办国务院交办的其他事项。"},{"type":"中华人民共和国住房和城乡建设部","description":"（一）承担保障城镇低收入家庭住房的责任。拟订住房保障相关政策并指导实施。拟订廉租住房规划及政策，会同有关部门做好中央有关廉租住房资金安排，监督地方组织实施。编制住房保障发展规划和年度计划并监督实施。（二）承担推进住房制度改革的责任。拟订适合国情的住房政策，指导住房建设和住房制度改革，拟订全国住房建设规划并指导实施，研究提出住房和城乡建设重大问题的政策建议。（三）承担规范住房和城乡建设管理秩序的责任。起草住房和城乡建设的法律法规草案，制定部门规章。依法组织编制和实施城乡规划，拟订城乡规划的政策和规章制度，会同有关部门组织编制全国城镇体系规划，负责国务院交办的城市总体规划、省域城镇体系规划的审查报批和监督实施，参与土地利用总体规划纲要的审查，拟订住房和城乡建设的科技发展规划和经济政策。（四）承担建立科学规范的工程建设标准体系的责任。组织制定工程建设实施阶段的国家标准，制定和发布工程建设全国统一定额和行业标准，拟订建设项目可行性研究评价方法、经济参数、建设标准和工程造价的管理制度，拟订公共服务设施（不含通信设施）建设标准并监督执行，指导监督各类工程建设标准定额的实施和工程造价计价，组织发布工程造价信息。（五）承担规范房地产市场秩序、监督管理房地产市场的责任。会同或配合有关部门组织拟订房地产市场监管政策并监督执行，指导城镇土地使用权有偿转让和开发利用工作，提出房地产业的行业发展规划和产业政策，制定房地产开发、房屋权属管理、房屋租赁、房屋面积管理、房地产估价与经纪管理、物业管理、房屋征收拆迁的规章制度并监督执行。（六）监督管理建筑市场、规范市场各方主体行为。指导全国建筑活动，组织实施房屋和市政工程项目招投标活动的监督执法，拟订勘察设计、施工、建设监理的法规和规章并监督和指导实施，拟订工程建设、建筑业、勘察设计的行业发展战略、中长期规划、改革方案、产业政策、规章制度并监督执行，拟订规范建筑市场各方主体行为的规章制度并监督执行，组织协调建筑企业参与国际工程承包、建筑劳务合作。（七）研究拟订城市建设的政策、规划并指导实施，指导城市市政公用设施建设、安全和应急管理，拟订全国风景名胜区的发展规划、政策并指导实施，负责国家级风景名胜区的审查报批和监督管理，组织审核世界自然遗产的申报，会同文物等有关主管部门审核世界自然与文化双重遗产的申报，会同文物主管部门负责历史文化名城（镇、村）的保护和监督管理工作。（八）承担规范村镇建设、指导全国村镇建设的责任。拟订村庄和小城镇建设政策并指导实施，指导村镇规划编制、农村住房建设和安全及危房改造，指导小城镇和村庄人居生态环境的改善工作，指导全国重点镇的建设。（九）承担建筑工程质量安全监管的责任。拟订建筑工程质量、建筑安全生产和竣工验收备案的政策、规章制度并监督执行，组织或参与工程重大质量、安全事故的调查处理，拟订建筑业、工程勘察设计咨询业的技术政策并指导实施。（十）承担推进建筑节能、城镇减排的责任。会同有关部门拟订建筑节能的政策、规划并监督实施，组织实施重大建筑节能项目，推进城镇减排。（十一）负责住房公积金监督管理，确保公积金的有效使用和安全。会同有关部门拟订住房公积金政策、发展规划并组织实施，制定住房公积金缴存、使用、管理和监督制度，监督全国住房公积金和其他住房资金的管理、使用和安全，管理住房公积金信息系统。（十二）开展住房和城乡建设方面的国际交流与合作。（十三）承办国务院交办的其他事项。2013年，《中央编办关于整合不动产登记职责的通知》规定，“住房和城乡建设部：负责制定房屋交易政策、规章制度并监督执行，指导监督房屋产权管理等工作；协同国土资源部指导房屋登记工作，负责建设个人住房信息系统。不再承担城镇土地使用权有偿转让和开发利用等职责。”2019年，《中央编办关于修订整合不动产登记职责文件的通知》对有关单位不动产登记职责进行修改。修改后，“住房和城乡建设部：负责制定房屋交易政策、规章制度并监督执行，指导监督房屋产权管理等工作；负责建设全国房地产市场监测系统。不再承担城镇土地使用权有偿转让和开发利用等职责。”2016年，《中央编办关于住房城乡建设部设立城市管理监督局有关问题的批复》同意住房和城乡建设部“设立城市管理监督局，负责拟订城管执法的政策法规，指导全国城管执法工作，开展城管执法行为监督，组织查处住房城乡建设领域重大案件等职责。”2018年，《中共中央办公厅国务院办公厅关于调整住房和城乡建设部职责机构编制的通知》规定，“住房和城乡建设部城乡规划管理职责，划入自然资源部”，“住房和城乡建设部风景名胜区、自然遗产管理职责，划入国家林业和草原局”，“将公安部指导建设工程消防设计审查职责划入住房和城乡建设部”。"},{"type":"国务院台湾事务办公室","description":"1、研究、拟订对台工作方针政策；贯彻执行党中央、国务院确定的对台工作的方针政策。2、组织、指导、管理、协调党中央、国务院各部门和各省、自治区、直辖市的对台工作；检查了解各地区、各部门贯彻执行党中央、国务院对台方针政策情况。3、研究台湾形势和两岸关系发展动向；协调有关部门研究、草拟涉台的法律、法规,统筹协调涉台法律事务。4、按照党中央、国务院的部署和授权,负责同台湾当局及其授权社会团体谈判及签署协议文件的有关准备工作。5、管理协调两岸通邮、通航、通商事务；负责对台宣传、教育工作和有关台湾工作的新闻发布；处理涉台的重大事件。6、会同有关部门统筹协调和指导对台经贸工作和两岸金融、文化、学术、体育、科技、卫生等各个领域的交流与合作,以及两岸人员往来、考察、研讨等工作,国际会议的涉台工作。7、完成党中央、国务院交办的其他任务。"},{"type":"国家外汇管理局","description":"（一）研究提出外汇管理体制改革和防范国际收支风险、促进国际收支平衡的政策建议；研究逐步推进人民币资本项目可兑换、培育和发展外汇市场的政策措施，向中国人民银行提供制订人民币汇率政策的建议和依据。（二）参与起草外汇管理有关法律法规和部门规章草案，发布与履行职责有关的规范性文件。（三）负责国际收支、对外债权债务的统计和监测，按规定发布相关信息，承担跨境资金流动监测的有关工作。（四）负责全国外汇市场的监督管理工作；承担结售汇业务监督管理的责任；培育和发展外汇市场。（五）负责依法监督检查经常项目外汇收支的真实性、合法性；负责依法实施资本项目外汇管理，并根据人民币资本项目可兑换进程不断完善管理工作；规范境内外外汇账户管理。（六）负责依法实施外汇监督检查，对违反外汇管理的行为进行处罚。（七）承担国家外汇储备、黄金储备和其他外汇资产经营管理的责任。（八）拟订外汇管理信息化发展规划和标准、规范并组织实施，依法与相关管理部门实施监管信息共享。（九）参与有关国际金融活动。（十）承办国务院及中国人民银行交办的其他事宜。"},{"type":"中华人民共和国司法部","description":"一、司法部是国务院组成部门，为正部级。二、中央全面依法治国委员会办公室设在司法部。三、司法部负责贯彻落实党中央关于全面依法治国的方针政策和决策部署，在履行职责过程中坚持和加强党对全面依法治国的集中统一领导。主要职责是：（一）承担全面依法治国重大问题的政策研究，协调有关方面提出全面依法治国中长期规划建议，负责有关重大决策部署督察工作。（二）承担统筹规划立法工作的责任。负责面向社会征集法律法规制定项目建议。（三）负责起草或者组织起草有关法律、行政法规草案。负责立法协调。（四）承办行政法规的解释、立法后评估工作。负责地方性法规、规章的备案审查工作。组织开展规章清理工作。（五）承担统筹推进法治政府建设的责任。承办申请国务院裁决的行政复议案件工作。指导、监督全国行政复议和行政应诉工作，负责行政复议和应诉案件办理工作。（六）承担统筹规划法治社会建设的责任。负责拟订法治宣传教育规划，组织实施普法宣传工作，组织对外法治宣传。推动人民参与和促进法治建设。指导依法治理和法治创建工作。指导调解工作和人民陪审员、人民监督员选任管理工作，推进司法所建设。（七）负责全国监狱管理工作，监督管理刑罚执行、罪犯改造的工作。指导、管理社区矫正工作。指导刑满释放人员帮教安置工作。（八）负责司法行政戒毒场所管理工作。（九）负责拟订公共法律服务体系建设规划并指导实施，统筹和布局城乡、区域法律服务资源。指导、监督律师、法律援助、司法鉴定、公证、仲裁和基层法律服务管理工作。负责香港、澳门的律师担任委托公证人的委托和管理工作。（十）负责国家统一法律职业资格考试的组织实施工作。（十一）负责国家法治对外合作工作。履行国际司法协助条约确定的对外联系机关（中央机关）职责，参与有关国际司法协助条约谈判。承担报送国务院审核的我国缔结或者参加的国际条约法律审查工作。组织开展法治对外合作交流。承办涉港澳台的法律事务。（十二）负责本系统枪支、弹药、服装和警车管理工作，指导、监督本系统财务、装备、设施、场所等保障工作。（十三）规划、协调、指导法治人才队伍建设相关工作，指导、监督本系统队伍建设。负责本系统警务管理和警务督察工作。协助省、自治区、直辖市管理司法厅(局)领导干部。（十四）完成党中央、国务院交办的其他任务。"},{"type":"国家药品监督管理局","description":"（一）负责药品（含中药、民族药，下同）、医疗器械和化妆品安全监督管理。拟订监督管理政策规划，组织起草法律法规草案，拟订部门规章，并监督实施。研究拟订鼓励药品、医疗器械和化妆品新技术新产品的管理与服务政策。（二）负责药品、医疗器械和化妆品标准管理。组织制定、公布国家药典等药品、医疗器械标准，组织拟订化妆品标准，组织制定分类管理制度，并监督实施。参与制定国家基本药物目录，配合实施国家基本药物制度。（三）负责药品、医疗器械和化妆品注册管理。制定注册管理制度，严格上市审评审批，完善审评审批服务便利化措施，并组织实施。（四）负责药品、医疗器械和化妆品质量管理。制定研制质量管理规范并监督实施。制定生产质量管理规范并依职责监督实施。制定经营、使用质量管理规范并指导实施。（五）负责药品、医疗器械和化妆品上市后风险管理。组织开展药品不良反应、医疗器械不良事件和化妆品不良反应的监测、评价和处置工作。依法承担药品、医疗器械和化妆品安全应急管理工作。（六）负责执业药师资格准入管理。制定执业药师资格准入制度，指导监督执业药师注册工作。（七）负责组织指导药品、医疗器械和化妆品监督检查。制定检查制度，依法查处药品、医疗器械和化妆品注册环节的违法行为，依职责组织指导查处生产环节的违法行为。（八）负责药品、医疗器械和化妆品监督管理领域对外交流与合作，参与相关国际监管规则和标准的制定。（九）负责指导省、自治区、直辖市药品监督管理部门工作。（十）完成党中央、国务院交办的其他任务。"},{"type":"中华人民共和国财政部","description":"（一）拟订财税发展战略、规划、政策和改革方案并组织实施。分析预测宏观经济形势，参与制定宏观经济政策，提出运用财税政策实施宏观调控和综合平衡社会财力的建议。拟订中央与地方、国家与企业的分配政策，完善鼓励公益事业发展的财税政策。（二）起草财政、财务、会计管理的法律、行政法规草案，制定部门规章，并监督执行。组织涉外财政、债务等国际谈判并草签有关协议、协定。（三）负责管理中央各项财政收支。编制年度中央预决算草案并组织执行。组织制定经费开支标准、定额，审核批复部门（单位）年度预决算。受国务院委托，向全国人民代表大会及其常委会报告财政预算、执行和决算等情况。负责政府投资基金中央财政出资的资产管理。负责中央预决算公开。（四）负责组织起草税收法律、行政法规草案及实施细则和税收政策调整方案。参加涉外税收谈判，签订涉外税收协议、协定草案。提出关税和进口税收政策，组织制定免税行业政策和有关管理制度。拟订关税谈判方案，参加有关关税谈判，提出征收特别关税的建议。承担国务院关税税则委员会具体工作。（五）按分工负责政府非税收入管理。负责政府性基金管理，按规定管理行政事业性收费。管理财政票据。制定彩票管理政策和有关办法，监管彩票市场，按规定管理彩票资金。（六）组织制定国库管理制度、国库集中收付制度，指导和监督中央国库业务，开展国库现金管理工作。制定政府财务报告编制办法并组织实施。负责制定政府采购制度并监督管理。负责政府采购市场开放谈判工作。（七）拟订和执行政府国内债务管理制度和政策。依法制定中央和地方政府债务管理制度和办法。编制国债和地方政府债余额限额计划。统一管理政府外债，制定基本管理制度。（八）牵头编制国有资产管理情况报告。根据国务院授权，集中统一履行中央国有金融资本出资人职责。制定全国统一的国有金融资本管理规章制度。拟订行政事业单位国有资产管理规章制度并组织实施，制定需要全国统一规定的开支标准和支出政策。（九）负责审核并汇总编制全国国有资本经营预决算草案，制定国有资本经营预算制度和办法，收取中央本级企业国有资本收益。负责制定并组织实施企业财务制度。负责财政预算内行政事业单位和社会团体的非贸易外汇和财政预算内的国际收支管理。（十）负责审核并汇总编制全国社会保险基金预决算草案，会同有关部门拟订有关资金（基金）财务管理制度，承担社会保险基金财政监管工作。（十一）负责办理和监督中央财政的经济发展支出、中央政府性投资项目的财政拨款，参与拟订中央基建投资有关政策，制定基建财务管理制度。（十二）承担国务院交办的与有关国家和地区多双边财经对话，开展财经领域的国际交流与合作。按规定管理多边开发机构和外国政府的贷（赠）款。代表我国政府参加有关国际财经组织。（十三）负责管理全国会计工作，监督和规范会计行为，制定并组织实施国家统一的会计制度，指导和监督注册会计师和会计师事务所的业务，指导和管理社会审计。依法管理资产评估有关工作。（十四）管理全国社会保障基金理事会。（十五）完成党中央、国务院交办的其他任务。（十六）职能转变。1.完善宏观调控体系，创新调控方式，构建发展规划、财政、金融等政策协调和工作协同机制，强化经济监测预测预警能力，建立健全重大问题研究和政策储备工作机制，增强宏观调控前瞻性、针对性、协同性。2.深化财税体制改革。加快建立现代财政制度，推进财政事权和支出责任划分改革，理顺中央和地方收入划分，建立权责清晰、财力协调、区域均衡的中央和地方财政关系。完善转移支付制度，优化转移支付分类，规范转移支付项目，增强地方统筹能力。逐步统一预算分配，全面实施绩效管理，建立全面规范透明、标准科学、约束有力的预算制度。全面推行政府性基金和行政事业性收费清单管理，完善监督制度。深化税收制度改革，健全地方税体系，逐步提高直接税比重，形成税法统一、税负公平、调节有度的税收制度体系。3.防范化解地方政府债务风险。规范举债融资机制，构建“闭环”管理体系，严控法定限额内债务风险，着力防控隐性债务风险，牢牢守住不发生系统性风险的底线。（十七）有关职责分工。1.税政管理职责分工。（1）财政部负责提出税收立法建议，与国家税务总局等部门提出税种增减、税目税率调整、减免税等建议。财政部负责组织起草税收法律、行政法规草案及实施细则和税收政策调整方案，国家税务总局具体起草税收法律、行政法规草案及实施细则并提出税收政策建议，由财政部组织审议后与国家税务总局共同上报和下发。国家税务总局负责对税收法律、行政法规执行过程中的征管和一般性税政问题进行解释，事后向财政部备案。（2）财政部负责组织起草关税法律、行政法规草案及实施细则，海关总署等部门参与起草，由财政部组织审议后与海关总署共同上报。关税税目税率调整由国务院关税税则委员会负责。关税税收政策调整方案，由财政部会同有关部门研究提出。2.非税收入管理职责分工。财政部负责制定和组织实施非税收入国库集中收缴制度，负责非税收入账户、收缴方式、退付退库等管理。国家税务总局等部门按照非税收入国库集中收缴等有关规定，负责做好非税收入申报征收、会统核算、缴费检查、欠费追缴和违法处罚等工作，有关非税收入项目收缴信息与财政部及时共享。3.中央行政事业单位国有资产管理职责分工。财政部负责制定行政事业单位国有资产管理规章制度，并负责组织实施和监督检查。国家机关事务管理局负责中央行政事业单位（即国务院各部门、各直属事业单位，最高人民法院，最高人民检察院，有关人民团体等）机关和机关服务中心等的国有资产管理，承担产权界定、清查登记、资产处置工作，制定中央行政事业单位国有资产管理具体制度和办法并组织实施，接受财政部的指导和监督检查。中央行政事业单位按规定负责所属事业单位（机关服务中心等除外）及派出机构的国有资产管理。"},{"type":"中华人民共和国应急管理部","description":"组织编制国家应急总体预案和规划，指导各地区各部门应对突发事件工作，推动应急预案体系建设和预案演练。建立灾情报告系统并统一发布灾情，统筹应急力量建设和物资储备并在救灾时统一调度，组织灾害救助体系建设，指导安全生产类、自然灾害类应急救援，承担国家应对特别重大灾害指挥部工作。指导火灾、水旱灾害、地质灾害等防治。负责安全生产综合监督管理和工矿商贸行业安全生产监督管理等。公安消防部队、武警森林部队转制后，与安全生产等应急救援队伍一并作为综合性常备应急骨干力量，由应急管理部管理，实行专门管理和政策保障，采取符合其自身特点的职务职级序列和管理办法，提高职业荣誉感，保持有生力量和战斗力。应急管理部要处理好防灾和救灾的关系，明确与相关部门和地方各自职责分工，建立协调配合机制。"},{"type":"中华人民共和国教育部","description":"（一）拟订教育改革与发展的方针、政策和规划，起草有关法律法规草案并监督实施。（二）负责各级各类教育的统筹规划和协调管理，会同有关部门制订各级各类学校的设置标准，指导各级各类学校的教育教学改革，负责教育基本信息的统计、分析和发布。（三）负责推进义务教育均衡发展和促进教育公平，负责义务教育的宏观指导与协调，指导普通高中教育、幼儿教育和特殊教育工作。制定基础教育教学基本要求和教学基本文件，组织审定基础教育国家课程教材，全面实施素质教育。（四）指导全国的教育督导工作，负责组织和指导对中等及中等以下教育、扫除青壮年文盲工作的督导检查和评估验收工作，指导基础教育发展水平、质量的监测工作。（五）指导以就业为导向的职业教育的发展与改革，制订中等职业教育专业目录、教学指导文件和教学评估标准，指导中等职业教育教材建设和职业指导工作。（六）指导高等教育发展与改革，承担深化直属高校管理体制改革的责任。制定高等教育学科专业目录和教学指导文件，会同有关部门审核高等学校设置、更名、撤销与调整，负责“211工程”和“985工程”的实施和协调工作，统筹指导各类高等教育和继续教育，指导改进高等教育评估工作。（七）负责本部门教育经费的统筹管理，参与拟订教育经费筹措、教育拨款、教育基建投资的政策，负责统计全国教育经费投入情况。（八）统筹和指导少数民族教育工作，协调对少数民族和少数民族地区的教育援助。（九）指导各级各类学校的思想政治工作、德育工作、体育卫生与艺术教育工作及国防教育工作，指导高等学校的党建和稳定工作。（十）主管全国的教师工作，会同有关部门制订各级各类教师资格标准并指导实施，指导教育系统人才队伍建设。（十一）负责各类高等学历教育招生考试和学籍学历管理工作，会同有关部门制订高等教育招生计划，参与拟订普通高等学校毕业生就业政策，指导普通高等学校开展大学生就业创业工作。（十二）规划、指导高等学校的自然科学和哲学、社会科学研究，协调、指导高等学校参与国家创新体系建设和承担国家科技重大专项等各类科技计划的实施工作，指导高等学校科技创新平台的发展建设，指导教育信息化和产学研结合等工作。（十三）组织指导教育方面的国际交流与合作，制定出国留学、来华留学、中外合作办学和外籍人员子女学校管理工作的政策，规划、协调、指导汉语国际推广工作，开展与港澳台的教育合作与交流。（十四）拟订国家语言文字工作的方针、政策，制订语言文字工作中长期规划，制订汉语和少数民族语言文字规范和标准并组织协调监督检查，指导推广普通话工作和普通话师资培训工作。（十五）负责全国学位授予工作，实施国家的学位制度，负责国际间学位对等、学位互认等工作。（十六）负责协调我国有关部门开展与联合国教科文组织在教育、科技、文化等领域国际合作，负责与联合国教科文组织秘书处及相关机构、组织的联络工作。（十七）承办国务院交办的其他事项。"},{"type":"中华人民共和国国家卫生健康委员会","description":"（一）组织拟订国民健康政策，拟订卫生健康事业发展法律法规草案、政策、规划，制定部门规章和标准并组织实施。统筹规划卫生健康资源配置，指导区域卫生健康规划的编制和实施。制定并组织实施推进卫生健康基本公共服务均等化、普惠化、便捷化和公共资源向基层延伸等政策措施。 （二）协调推进深化医药卫生体制改革，研究提出深化医药卫生体制改革重大方针、政策、措施的建议。组织深化公立医院综合改革，推进管办分离，健全现代医院管理制度，制定并组织实施推动卫生健康公共服务提供主体多元化、提供方式多样化的政策措施，提出医疗服务和药品价格政策的建议。 （三）制定并组织落实疾病预防控制规划、国家免疫规划以及严重危害人民健康公共卫生问题的干预措施，制定检疫传染病和监测传染病目录。负责卫生应急工作，组织指导突发公共卫生事件的预防控制和各类突发公共事件的医疗卫生救援。（四）组织拟订并协调落实应对人口老龄化政策措施，负责推进老年健康服务体系建设和医养结合工作。 （五）组织制定国家药物政策和国家基本药物制度，开展药品使用监测、临床综合评价和短缺药品预警，提出国家基本药物价格政策的建议，参与制定国家药典。组织开展食品安全风险监测评估，依法制定并公布食品安全标准。 （六）负责职责范围内的职业卫生、放射卫生、环境卫生、学校卫生、公共场所卫生、饮用水卫生等公共卫生的监督管理，负责传染病防治监督，健全卫生健康综合监督体系。牵头《烟草控制框架公约》履约工作。 （七）制定医疗机构、医疗服务行业管理办法并监督实施，建立医疗服务评价和监督管理体系。会同有关部门制定并实施卫生健康专业技术人员资格标准。制定并组织实施医疗服务规范、标准和卫生健康专业技术人员执业规则、服务规范。（八）负责计划生育管理和服务工作，开展人口监测预警，研究提出人口与家庭发展相关政策建议，完善计划生育政策。 （九）指导地方卫生健康工作，指导基层医疗卫生、妇幼健康服务体系和全科医生队伍建设。推进卫生健康科技创新发展。 （十）负责中央保健对象的医疗保健工作，负责党和国家重要会议与重大活动的医疗卫生保障工作。（十一）管理国家中医药管理局，代管中国老龄协会，指导中国计划生育协会的业务工作。 （十二）完成党中央、国务院交办的其他任务。（十三）职能转变。国家卫生健康委员会应当牢固树立大卫生、大健康理念，推动实施健康中国战略，以改革创新为动力，以促健康、转模式、强基层、重保障为着力点，把以治病为中心转变到以人民健康为中心，为人民群众提供全方位全周期健康服务。一是更加注重预防为主和健康促进，加强预防控制重大疾病工作，积极应对人口老龄化，健全健康服务体系。二是更加注重工作重心下移和资源下沉，推进卫生健康公共资源向基层延伸、向农村覆盖、向边远地区和生活困难群众倾斜。三是更加注重提高服务质量和水平，推进卫生健康基本公共服务均等化、普惠化、便捷化。四是协调推进深化医药卫生体制改革，加大公立医院改革力度，推进管办分离，推动卫生健康公共服务提供主体多元化、提供方式多样化。 （十四）有关职责分工。 1.与国家发展和改革委员会的有关职责分工。国家卫生健康委员会负责开展人口监测预警工作，拟订生育政策，研究提出与生育相关的人口数量、素质、结构、分布方面的政策建议，促进生育政策和相关经济社会政策配套衔接，参与制定人口发展规划和政策，落实国家人口发展规划中的有关任务。国家发展和改革委员会负责组织监测和评估人口变动情况及趋势影响，建立人口预测预报制度，开展重大决策人口影响评估，完善重大人口政策咨询机制，研究提出国家人口发展战略，拟订人口发展规划和人口政策，研究提出人口与经济、社会、资源、环境协调可持续发展，以及统筹促进人口长期均衡发展的政策建议。 2.与民政部的有关职责分工。国家卫生健康委员会负责拟订应对人口老龄化、医养结合政策措施，综合协调、督促指导、组织推进老龄事业发展，承担老年疾病防治、老年人医疗照护、老年人心理健康与关怀服务等老年健康工作。民政部负责统筹推进、督促指导、监督管理养老服务工作，拟订养老服务体系建设规划、法规、政策、标准并组织实施，承担老年人福利和特殊困难老年人救助工作。 3.与海关总署的有关职责分工。国家卫生健康委员会负责传染病总体防治和突发公共卫生事件应急工作，编制国境卫生检疫监测传染病目录。国家卫生健康委员会与海关总署建立健全应对口岸传染病疫情和公共卫生事件合作机制、传染病疫情和公共卫生事件通报交流机制、口岸输入性疫情通报和协作处理机制。 4.与国家市场监督管理总局的有关职责分工。国家卫生健康委员会负责食品安全风险评估工作，会同国家市场监督管理总局等部门制定、实施食品安全风险监测计划。国家卫生健康委员会对通过食品安全风险监测或者接到举报发现食品可能存在安全隐患的，应当立即组织进行检验和食品安全风险评估，并及时向国家市场监督管理总局等部门通报食品安全风险评估结果，对得出不安全结论的食品，国家市场监督管理总局等部门应当立即采取措施。国家市场监督管理总局等部门在监督管理工作中发现需要进行食品安全风险评估的，应当及时向国家卫生健康委员会提出建议。 5.与国家医疗保障局的有关职责分工。国家卫生健康委员会、国家医疗保障局等部门在医疗、医保、医药等方面加强制度、政策衔接，建立沟通协商机制，协同推进改革，提高医疗资源使用效率和医疗保障水平。 6.与国家药品监督管理局的有关职责分工。国家药品监督管理局会同国家卫生健康委员会组织国家药典委员会并制定国家药典，建立重大药品不良反应和医疗器械不良事件相互通报机制和联合处置机制。"},{"type":"国务院侨务办公室","description":"（一）研究拟定侨务工作的方针、政策、法规并负责监督检查贯彻执行情况；调查研究国内外侨情和侨务工作情况，向党中央、国务院提供侨务信息；制订侨务工作的发展规划。（二）协助总理管理侨务工作；审核有关部门和地方制订的直接涉及华侨、华人和归侨、侨眷的有关政策，报国务院审定；承担副部（省）级以上领导干部以开展华侨、华人工作为主要任务的出访审核报批工作；承办需请国家领导人会见重要华侨、华人知名人士的审核报批工作；对有关部门和社会团体所开展的华侨和华人工作进行必要的统筹、协调。（三）研究提出华侨、华人工作的方针政策建议，保护华侨的正当权益；研究我驻外使、领馆和有关驻外机构开展华侨、华人及其社团工作；开展对华侨、华人及其社团的团结友好工作。（四）在中央对台工作的方针指导下，通过侨务渠道开展对台工作。（五）调查研究引进华侨和华人资金、技术、人才工作的情况并提出政策建议，推动引进华侨和华人资金、技术、人才工作的开展。组织拟定华侨捐赠、侨汇等方面的方针、政策。（六）在中央对外宣传方针指导下，制订对华侨和华人宣传工作的方针、政策；开展对华侨和华人的宣传、文化交流及华文教育工作，联系华侨和华人传播媒体、文化社团及华文学校并支持其工作。（七）依法保护归侨、侨眷的合法权益和华侨、华人在国内的合法权益；会同有关部门拟定有关归侨、侨眷工作的方针政策；开展归侨、侨眷工作；协助有关部门做好归侨、侨眷代表人士的人事安排工作。（八）负责华侨回国安置工作，负责香港特别行政区及澳门同胞回内地定居及其在内地眷属工作。（九）负责为开展国内外侨务工作而设立的直属单位的有关工作。（十）承办国务院交办的其他事项。"},{"type":"国务院研究室","description":"（一）负责起草《政府工作报告》；根据国务院领导同志指示，单独或组织、协同有关方面起草、修改国务院的有关重要文件；起草国务院领导同志部分重要讲话。（二）对改革开放和经济与社会发展中的重要课题进行调查研究，提出政策性建议。（三）参与党中央、国务院大型会议的文件起草。（四）对全国经济形势跟踪研究，收集、分析、整理和报送经济与社会生活中的重要综合信息、动态，为国务院决策提供建议和咨询。（五）承办国务院交办的其他事项。"}],"bureaus":[{"type":"节能与综合利用司","description":"拟订并组织实施工业、通信业的能源节约和资源综合利用、清洁生产促进政策，参与拟订能源节约和资源综合利用、清洁生产促进规划和污染控制政策，组织协调相关重大示范工程和新产品、新技术、新设备、新材料的推广应用"},{"type":"网络安全管理局","description":"组织拟订电信网、互联网及其相关网络与信息安全规划、政策和标准并组织实施；承担电信网、互联网网络与信息安全技术平台的建设和使用管理；承担电信和互联网行业网络安全审查相关工作，组织推动电信网、互联网安全自主可控工作；承担建立电信网、互联网新技术新业务安全评估制度并组织实施；指导督促电信企业和互联网企业落实网络与信息安全管理责任，组织开展网络环境和信息治理，配合处理网上有害信息，配合打击网络犯罪和防范网络失窃密；拟订电信网、互联网网络安全防护政策并组织实施；承担电信网、互联网网络与信息安全监测预警、威胁治理、信息通报和应急管理与处置；承担电信网、互联网网络数据和用户信息安全保护管理工作；承担特殊通信管理，拟订特殊通信、通信管制和网络管制的政策、标准；管理党政专用通信工作"},{"type":"原材料工业司","description":"承担钢铁、有色金属、稀土、石化（不含炼油）、化工（不含煤制燃料和燃料乙醇、农药）、建材等原材料工业的行业管理工作，统筹新材料产业发展，研究国内外原材料市场情况并提出建议"},{"type":"办公厅","description":"负责机关文电运转、信息简报、电子政务、安全保密、信访保卫、值班值守等工作；负责机关日常工作的组织协调和督查督办；承担政府信息公开、新闻发布等工作处"},{"type":"规划司","description":"组织拟定工业、通信业发展战略、规划；提出工业、通信业固定资产投资规模和方向（含利用外资和境外投资）、中央财政建设资金安排的建议；承担固定资产投资审核的相关工作；指导国家自主创新示范区、国家高新技术开发区等科技产业园区建设；承担援疆、援藏、援青、援赣等对口支援工作和定点帮扶工作"},{"type":"信息通信发展司","description":"协调电信网、互联网、专用通信网的建设，促进网络资源共建共享；拟订电信普遍服务政策并组织实施，推动宽带网络建设和应用水平提升；承担信息通信业经济运行分析、监测和预警，拟订信息通信业发展战略、规划和政策；牵头信息通信业标准化及相关国际标准制定和推广工作，拟订移动互联网、物联网、新一代移动通信等网络技术发展政策并组织实施；拟订信息通信业开放政策；拟订电信业务资费政策并监督实施；承担重要信息通信设施建设管理；监督管理通信建设市场；承担信息通信企业“走出去”和国际信息通道建设相关工作"},{"type":"信息通信管理局","description":"依法对电信和互联网等信息通信服务实行监管，承担互联网（含移动互联网）行业管理职能，推动工业互联网创新发展工作。具体职责主要包括：负责电信和互联网业务市场准入及设备进网管理，承担通信网码号、互联网域名和IP地址、互联网信息服务备案、接入服务等基础管理及试办新业务备案管理职能，推进三网融合，监督管理电信和互联网市场竞争秩序、服务质量、互联互通、用户权益和个人信息保护，负责信息通信网络运行的监督管理，组织协调应急通信及重要通信保障。统筹工业互联网创新发展工作，负责工业互联网网络体系相关工作，负责新一代移动通信技术商用及在工业等重点领域的融合应用"},{"type":"安全生产司","description":"机构职责：指导工业、信息通信业加强安全生产管理。拟订民爆行业的规划、政策、标准并组织实施；参与拟订民爆行业法律、法规和规章；负责民爆行业科技成果和专用设备管理；承担民爆物品行政许可审批工作；依法开展民爆物品生产销售安全的监管。统筹指导工业和信息化领域安全应急科技成果推广；指导重点行业排查治理隐患，参与重特大生产安全事故的调查处理。统筹协调安全应急产业发展，承担应急产业发展协调机制有关工作。综合协调部内安全生产工作；指导部属单位加强安全生产管理。负责国家履行《禁止化学武器公约》的组织协调工作；承担国家履行《禁止化学武器公约》工作办公室日常工作。承办部领导交办的其他事项"},{"type":"装备工业二司","description":"承担民用飞机、民用船舶制造业等的行业管理工作。提出重大技术装备发展和自主创新规划、政策建议并组织实施，依托国家重点工程建设协调有关重大专项的实施，推进重大技术装备国产化，指导引进重大技术装备的消化创新"},{"type":"运行监测协调局","description":"监测分析工业、通信业日常运行，分析国内外工业、通信业形势，统计并发布相关信息，进行预测预警和信息引导；协调解决行业运行发展中的有关问题；承担应急管理、产业安全和国防动员相关工作"},{"type":"信息技术发展司","description":"1.统筹推进工业领域信息化发展；研究拟订信息化和工业化融合发展战略、规划、政策和标准；指导推进工业数字化、智能化、网络化制造和应用，负责工业互联网平台体系相关工作；促进工业领域电子商务和现代流通体系建设。2.承担软件和信息服务业行业管理工作，指导推进软件和信息服务业发展；拟订行业发展战略、规划、政策、标准，协调发展中的重大问题和重大事项，承担行业基本情况、重要信息等调查研究工作；组织推进软件技术、产品和系统研发与产业化，促进产业链供应链能力提升；指导有关测评和质量工作；指导行业公共服务体系建设；推进软件知识产权保护和正版化。3.统筹推进数字经济和大数据产业发展，研究拟订并组织实施相关发展战略、规划、政策和标准。4.指导信息技术应用创新能力建设；组织实施信息技术推广应用；推进行业软件和系统解决方案推广应用。5.推动信息服务业创新发展；组织推进信息技术服务工具、平台研发和产业化；推动新技术、新产品、新业态发展和应用；依法管理电子认证服务业。6.审核信息化、软件和信息服务业固定资产投资项目（含利用外资、境外投资和技术改造投资），提出项目安排建议；提出行业投资指南；承担有关国家科技重大项目中软件项目的管理工作；参与相关战略性新兴产业专项的组织实施。7.承办部领导交办的其他事项"},{"type":"无线电管理局","description":"编制无线电频谱规划；负责无线电频率的划分、分配与指配；依法监督管理无线电台（站）；负责卫星轨道位置协调和管理；协调处理军地间无线电管理相关事宜；负责无线电监测、检测、干扰查处，协调处理电磁干扰事宜，维护空中电波秩序；依法组织实施无线电管制；负责涉外无线电管理工作"},{"type":"消费品工业司","description":"承担纺织、轻工、食品、医药、家电等的行业管理工作；拟订卷烟、食盐和糖精的生产计划；承担盐业和国家储备盐行政管理、中药材生产扶持项目管理、国家药品储备管理工作"},{"type":"高新技术司","description":"组织拟订相关领域高新技术发展及产业化规划和政策，组织相关领域技术发展需求分析，提出重大任务并监督实施，推动重大关键技术攻关"},{"type":"电子信息司","description":"承担电子信息产品制造的行业管理工作；组织协调重大系统装备、集成电路等基础产品的开发与生产，组织协调国家有关重大工程项目所需配套装备、元器件、仪器和材料的国产化；促进电子信息技术推广应用"},{"type":"产业政策与法规司","description":"组织拟订工业、通信业产业政策并监督执行，研究有关重大战略，提出推进产业结构调整、工业与相关产业融合发展及管理创新的政策建议，承担推进行业体制改革相关工作。组织起草相关法律法规草案及部门规章，承担规范性文件合法性审查和行政复议、行政应诉、执法监督工作"},{"type":"中小企业局","description":"参与拟订促进民营经济发展的政策措施并按职责分工组织落实。培育扶持“专精特新”中小企业，推动建立完善中小企业服务体系，协调开展中小企业纾困工作，促进中小企业发展和对外交流合作"},{"type":"财务司","description":"编报部门预决算和管理资金的使用；组织实施内部审计和绩效检查；提出行业财税、价格、金融等政策建议；负责机关财务、资产管理等工作"},{"type":"装备工业一司","description":"承担通用机械、汽车、轨道交通机械制造业等行业管理工作，提出行业发展规划、政策建议并组织实施。推动相关新兴产业和智能制造发展"},{"type":"科技司","description":"组织拟订工业和信息化领域科技发展战略、规划和政策；组织拟订行业技术规范和标准，指导行业质量管理工作；组织实施行业技术基础工作；组织重大产业化示范工程；组织实施有关国家科技重大专项，推动技术创新和产学研相结合；指导科技服务业、技术市场、科技中介组织发展"},{"type":"国际合作司","description":"承担对外和对港澳台合作与交流相关事务；负责外事工作"},{"type":"人事教育司","description":"负责机关和直属单位的人事管理、机构编制、队伍建设等工作；管理直属高校"},{"type":"机关党委","description":"负责机关和在京直属单位的党建工作。承担部党风廉政建设责任制领导小组办公室、党建工作领导小组办公室、巡视工作领导小组办公室的工作"},{"type":"离退休干部局","description":"1.贯彻党和国家有关离退休干部工作的方针政策，拟定工作方案并组织实施。2.负责离退休干部的日常服务与管理工作，协调落实相关政治、生活待遇。3.指导部直属单位离退休干部工作。4.负责离退休干部党组织建设工作，组织开展离退休干部政治理论学习活动，做好离退休干部思想政治工作。5.管理离退休干部活动场所，组织离退休干部开展有益于身心健康的文体活动。6.负责有关离退休人员的统计和信息上报工作。7.协助办理有关离退休干部的财务管理、医疗保健和后勤服务等工作。8.承办部领导交办的其他事项。"},{"type":"机关服务局","description":"1.拟订机关事务管理和服务保障工作规划、制度、规范并组织实施；拟订机关后勤经营发展规划，指导经营单位改革发展。2.承担机关物业、餐饮、交通、文印、会议、通信、安全、保卫、医疗保健等工作；承担机关基本建设、办公用房、职工住房、部属产权房房改等工作。3.承担机关消防和交通安全、计划生育、爱国卫生、绿化、双拥共建、人民防空、社会治安综合治理、无偿献血、公共机构节能等工作；指导在京部属单位相关工作。4.承担机关国有资产管理和年度统计报告等工作；指导、监督局属单位财务及国有资产管理等相关工作。5.承担机关在职职工及离退休人员医疗、保健等管理和服务工作。6.承担局属单位领导班子建设及有关人事管理工作。7.承担机关行政财务和外事经费会计核算工作。8.承担机关及部属单位外事服务、国际合作事务性工作。9.受部委托管理威海电子信息技术综合研究中心、白塔寺招待所、文印中心、房屋修缮队等部属事业单位。10.承办部领导交办的其他事项。"}]}'
