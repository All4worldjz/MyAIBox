encrypt:
  signature:
    useThirdSign: false
    jarAbsolutePath: /thirdjar
    thirdSignImpl: com.suwell.plss.plugin.sample.thirdparty.signature.impl.ThirdPartySignatureImpl
  common-encrypt:
    useThirdEncrypt: false
    jarAbsolutePath: /thirdjar
    thirdEncryptImpl: com.suwell.plss.plugin.sample.thirdparty.encrypt.impl.ThirdPartyEncryptSample

## 日志级别增量配置
app: 
  global: 
    log_level: INFO
