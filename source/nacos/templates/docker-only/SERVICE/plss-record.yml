        min-idle: 20
      datasource:
        master: # 主库数据源
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://postgres:5432/plss?currentSchema=plss-record&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&useSSL=true&serverTimezone=GMT%2B8
          username: suwell
          password: ${DB_PASSWORD}
          type: com.zaxxer.hikari.HikariDataSource
