        #   password: 
          hikari:
            connection-timeout: 10000
            idle-timeout: 600000
            max-lifetime: 1800000
            max-pool-size: 200
            min-idle: 20
            data-source-properties:
              cachePrepStmts: true
              prepStmtCacheSize: 250
              prepStmtCacheSqlLimit: 2048
              useServerPrepStmts: true
              rewriteBatchedStatements: true


  # 分库分表配置【增量配置】
  shardingsphere:
    datasource:
      names: logic-record
      logic-record:
        type: ${spring.datasource.dynamic.datasource.master.type}
        driver-class-name: ${spring.datasource.dynamic.datasource.master.driver-class-name}
        jdbc-url: ${spring.datasource.dynamic.datasource.master.url}
        username: ${spring.datasource.dynamic.datasource.master.username}
        password: ${spring.datasource.dynamic.datasource.master.password}
        connection-timeout: ${spring.datasource.dynamic.hikari.connection-timeout}
        idle-timeout: ${spring.datasource.dynamic.hikari.idle-timeout}
        max-lifetime: ${spring.datasource.dynamic.hikari.max-lifetime}
        max-pool-size: ${spring.datasource.dynamic.hikari.max-pool-size}
        min-idle: ${spring.datasource.dynamic.hikari.min-idle}
