## 文件加密存储相关的配置，不支持热更新，修改时需要重启record服务
crypto:
  ## 文件加密总开关，默认打开，如果为false，一下的配置均失效。且该开关不得轻易修改，后果很严重
  enabled: true
  ## 是否有三方加密实现
  use-third: false
  ## 三方加密所处的jar包目录，use-third为true时必填且有效，启动会校验
  jar-absolute-path: E:/
  ## 三方加密jar包中使用的实现，use-third为true时必填且有效，启动会校验
  impl: com.suwell.plss.plugin.sample.thirdparty.crypto.impl.ThirdPartyCryptoSample
  ## 每个项目必须要有的项目名，项目开始是会分配固定的
  project-name: project
  ## 每个项目必须要有的项目代码，本质是加密的版本号。项目开始时会分配固定范围的
  project-code: 1
  ## 对外暴露的url，用于外部访问地址使用，不配置会解析容器ip
  # export-url: http://plss-web/plss/prod-api

dromara:
  x-file-storage:
    ##默认使用的存储平台
    default-platform: suwell-minio-private
    minio:
       ## 私有桶
      - platform: suwell-minio-private
        auto-create-bucket: true
        enable-storage: true
        access-key: admin
        secret-key: G5pJ2kUq3L8M
        bucket-name: itsuwell
        end-point: http://minio:9000
        ## 公有桶
      - platform: suwell-minio-public
        enable-storage: true
        access-key: admin
        secret-key: G5pJ2kUq3L8M
        bucket-name: public
        end-point: http://minio:9000
        ## 公有桶需要配置此参数，用于访问永久的图片等

xxl:
  job:
    enable: true
    executor:
      appname: plss_record
      address: ""
      ip: ""
      port: 30000
      # 执行器运行日志文件存储磁盘路径 [选填] ：需要对该路径拥有读写权限；为空则使用默认路径；
      logpath: /tmp/xxljob/logs
      logretentiondays: 10
    admin:
      addresses: http://plss-gateway:8064/system/v1/xxlJob
    accessToken: suwell14176accessToken   

suwell: 
  temp-dir: /var/tmp/record


## 日志级别增量配置
app: 
  global: 
    log_level: INFO
