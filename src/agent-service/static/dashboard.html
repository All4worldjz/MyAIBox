<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>KSC AIBox | 全域布控台</title>
    <style>
        :root { --primary: #0062ff; --success: #00c853; --warning: #ffd600; --danger: #ff3d00; --bg: #0a0a0c; --card: #16161a; --text: #e0e0e6; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        nav { width: 220px; background: #111; height: 100vh; border-right: 1px solid #222; padding: 20px; box-sizing: border-box; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #2a2a30; }
        .card-id { font-size: 12px; color: #666; margin-bottom: 15px; text-transform: uppercase; }
        .card-val { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .progress { height: 6px; background: #222; border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: 1s ease-in-out; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        .status-up { color: var(--success); font-weight: 600; }
        .status-down { color: var(--danger); font-weight: 600; }
    </style>
</head>
<body>
    <nav>
        <h2 style="color:var(--primary); font-size: 20px; font-weight: 800;">AIBOX COMMAND</h2>
        <div style="margin-top:40px">
            <div style="padding:10px; background: #222; border-radius: 8px; color: #fff;">📊 系统大盘</div>
            <p style="color:#666; padding:10px;">🧠 算力拓扑</p>
            <p style="color:#666; padding:10px;">🛠️ 自愈日志</p>
        </div>
    </nav>
    <main>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="margin:0;">算力矩阵实时监控 (NPU 910B)</h1>
            <div id="last-update" style="color:#666; font-size: 12px;">正在连接 Agent...</div>
        </div>
        
        <div class="grid" id="npu-grid">
            <!-- 动态注入 NPU 卡片 -->
        </div>

        <h2>容器集群布控 (27 Services)</h2>
        <table id="container-table">
            <thead>
                <tr><th>服务标识</th><th>实时状态</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/api/v1/system/status');
                const data = await res.json();
                
                // 1. 动态生成 NPU 卡片
                const grid = document.getElementById('npu-grid');
                grid.innerHTML = data.npu.map(n => `
                    <div class="card">
                        <div class="card-id">NPU Chip ${n.id}</div>
                        <div class="card-val">${n.hbm_used}</div>
                        <div style="color:#888; font-size:12px;">HBM 占用率: ${n.hbm_percent}</div>
                        <div class="progress"><div class="progress-fill" style="width: ${n.hbm_percent}"></div></div>
                    </div>
                `).join('');

                // 2. 更新容器表格
                const tbody = document.querySelector('#container-table tbody');
                tbody.innerHTML = data.containers.map(c => {
                    const isUp = c[1].includes('Up') || c[1].includes('healthy');
                    return `
                        <tr>
                            <td><code style="background:#000; padding:4px 8px; border-radius:4px;">${c[0]}</code></td>
                            <td class="${isUp ? 'status-up' : 'status-down'}">${c[1]}</td>
                        </tr>
                    `;
                }).join('');

                document.getElementById('last-update').innerText = '最后同步: ' + new Date().toLocaleTimeString();
            } catch(e) {
                document.getElementById('last-update').innerText = '❌ 连接中枢失败: ' + e.message;
            }
        }
        setInterval(refresh, 2000);
        refresh();
    </script>
</body>
</html>
