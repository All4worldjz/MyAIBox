<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>KSC AIBox | 全域控制台</title>
    <style>
        :root { --primary: #0062ff; --success: #00c853; --bg: #0a0a0c; --card: #16161a; --text: #e0e0e6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        nav { width: 220px; background: #111; height: 100vh; border-right: 1px solid #222; padding: 20px; box-sizing: border-box; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .npu-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #2a2a30; }
        .npu-id { font-size: 12px; color: #666; margin-bottom: 15px; }
        .npu-val { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .progress { height: 6px; background: #222; border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 1s ease-in-out; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        .status-up { color: var(--success); }
    </style>
</head>
<body>
    <nav>
        <h2 style="color:var(--primary)">AIBOX ADMIN</h2>
        <div style="margin-top:40px">
            <p style="color:#fff">系统概览</p>
            <p style="color:#666">算力调度</p>
            <p style="color:#666">自愈日志</p>
        </div>
    </nav>
    <main>
        <h1>算力矩阵布控 (NPU 910B x4)</h1>
        
        <div class="grid" id="npu-grid">
            <!-- 动态生成 4 张 NPU 卡 -->
            <div class="npu-card" id="npu-0">
                <div class="npu-id">NPU 0</div>
                <div class="npu-val">-- GB</div>
                <div class="npu-label">HBM 占用率: --</div>
                <div class="progress"><div class="progress-fill"></div></div>
            </div>
            <div class="npu-card" id="npu-1">
                <div class="npu-id">NPU 1</div>
                <div class="npu-val">-- GB</div>
                <div class="npu-label">HBM 占用率: --</div>
                <div class="progress"><div class="progress-fill"></div></div>
            </div>
            <div class="npu-card" id="npu-2">
                <div class="npu-id">NPU 2</div>
                <div class="npu-val">-- GB</div>
                <div class="npu-label">HBM 占用率: --</div>
                <div class="progress"><div class="progress-fill"></div></div>
            </div>
            <div class="npu-card" id="npu-3">
                <div class="npu-id">NPU 3</div>
                <div class="npu-val">-- GB</div>
                <div class="npu-label">HBM 占用率: --</div>
                <div class="progress"><div class="progress-fill"></div></div>
            </div>
        </div>

        <h2>容器集群心跳</h2>
        <table id="container-table">
            <thead>
                <tr><th>容器名称</th><th>运行状态</th></tr>
            </thead>
            <tbody>
                <!-- 动态填充 -->
            </tbody>
        </table>
    </main>

    <script>
        async function refresh() {
            const res = await fetch('/api/v1/system/status');
            const data = await res.json();
            
            // 1. 更新 NPU 状态
            data.npu.forEach((n, i) => {
                const card = document.getElementById('npu-' + i);
                if(card) {
                    card.querySelector('.npu-val').innerText = n.hbm_used;
                    card.querySelector('.npu-label').innerText = 'HBM 占用率: ' + n.hbm_percent;
                    card.querySelector('.progress-fill').style.width = n.hbm_percent;
                }
            });

            // 2. 更新容器表格
            const tbody = document.querySelector('#container-table tbody');
            tbody.innerHTML = data.containers.map(c => `
                <tr>
                    <td>${c[0]}</td>
                    <td class="${c[1].includes('Up') ? 'status-up' : ''}">${c[1]}</td>
                </tr>
            `).join('');
        }
        setInterval(refresh, 3000);
        refresh();
    </script>
</body>
</html>
