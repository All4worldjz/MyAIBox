# Ansible Inventory for NPU Servers
# 
# 使用方法:
#   ansible-playbook -i inventory-npu.ini playbooks/01-install-npu-full-stack.yml

[npu_servers]
# 生产服务器
10.212.128.192 ansible_user=root ansible_password=your_password_here

# 可以添加更多服务器
# 10.212.128.193 ansible_user=root ansible_password=your_password_here
# 10.212.128.194 ansible_user=root ansible_password=your_password_here

[npu_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_connection=ssh
ansible_ssh_common_args='-o StrictHostKeyChecking=no'