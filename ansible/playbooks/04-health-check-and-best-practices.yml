---
# Playbook: HCI一体机深度健康检查与最佳实践优化
# 基于华为鲲鹏、openEuler、昇腾NPU最佳实践
# 目标：可用性、安全性、易维护性、稳定性

- name: HCI一体机深度健康检查与优化
  hosts: aibox
  become: yes
  gather_facts: yes
  vars_files:
    - ../group_vars/all.yml
  
  tasks:
    # ================================================
    # 第一部分：系统健康检查
    # ================================================
    - name: 检查NPU健康状态
      shell: |
        echo "=== NPU健康检查 ==="
        for i in 0 1 2 3; do
          health=$(npu-smi info -t health -i $i -c 0 2>/dev/null | grep "Health Status" | awk '{print $NF}')
          temp=$(npu-smi info -t temp -i $i -c 0 2>/dev/null | grep "Temperature" | awk '{print $NF}')
          power=$(npu-smi info -t power -i $i -c 0 2>/dev/null | grep "Power" | awk '{print $NF}')
          echo "NPU$i: Health=$health, Temp=$temp°C, Power=$power W"
        done
      register: npu_health
      changed_when: false
      tags: [health, npu]

    - name: 检查磁盘健康状态
      shell: |
        echo "=== NVMe健康检查 ==="
        smartctl -H /dev/nvme0n1 2>/dev/null | grep -E "SMART overall|PASSED|FAILED"
        echo ""
        echo "=== 磁盘关键指标 ==="
        smartctl -A /dev/nvme0n1 2>/dev/null | grep -E "Temperature|Percentage Used|Available Spare|Critical Warning"
      register: disk_health
      changed_when: false
      tags: [health, disk]

    - name: 检查内存健康
      shell: |
        echo "=== 内存状态 ==="
        free -h
        echo ""
        echo "=== 内存压力 ==="
        grep -E 'MemTotal|MemFree|MemAvailable|SwapTotal|SwapFree' /proc/meminfo
        echo ""
        echo "=== NUMA内存分布 ==="
        cat /sys/devices/system/node/node*/meminfo | grep MemTotal
      register: memory_health
      changed_when: false
      tags: [health, memory]

    - name: 检查系统服务状态
      shell: |
        echo "=== 失败的服务 ==="
        systemctl list-units --type=service --state=failed --no-pager
        echo ""
        echo "=== 关键服务状态 ==="
        for svc in sshd docker chronyd firewalld tuned rngd; do
          status=$(systemctl is-active $svc 2>/dev/null)
          enabled=$(systemctl is-enabled $svc 2>/dev/null)
          echo "$svc: Active=$status, Enabled=$enabled"
        done
      register: service_health
      changed_when: false
      tags: [health, services]

    # ================================================
    # 第二部分：鲲鹏服务器最佳实践优化
    # ================================================
    - name: 鲲鹏NUMA优化 - 网络缓冲区
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
        sysctl_file: /etc/sysctl.d/99-ksc-aibox-kunpeng.conf
      loop:
        # 网络缓冲区优化 (鲲鹏高性能网络)
        - { name: net.core.rmem_max, value: "134217728" }      # 128MB
        - { name: net.core.wmem_max, value: "134217728" }      # 128MB
        - { name: net.core.rmem_default, value: "16777216" }   # 16MB
        - { name: net.core.wmem_default, value: "16777216" }   # 16MB
        - { name: net.core.optmem_max, value: "16777216" }     # 16MB
        # TCP缓冲区优化
        - { name: net.ipv4.tcp_rmem, value: "4096 87380 134217728" }
        - { name: net.ipv4.tcp_wmem, value: "4096 65536 134217728" }
        # 网卡队列优化
        - { name: net.core.netdev_max_backlog, value: "30000" }
      tags: [kunpeng, network]

    - name: 鲲鹏内存优化 - PSI压力监控
      lineinfile:
        path: /etc/default/grub
        regexp: 'GRUB_CMDLINE_LINUX='
        line: 'GRUB_CMDLINE_LINUX="video=VGA-1:640x480-32@60me cgroup_disable=files apparmor=0 crashkernel=1024M,high smmu.bypassdev=0x1000:0x17 smmu.bypassdev=0x1000:0x15 arm64.nopauth rhgb quiet console=tty0 psi=1"'
        state: present
        backup: yes
      tags: [kunpeng, psi]

    - name: 更新GRUB配置
      command: grub2-mkconfig -o /boot/grub2/grub.cfg
      tags: [kunpeng, psi]

    # ================================================
    # 第三部分：昇腾NPU最佳实践优化
    # ================================================
    - name: 昇腾NPU - 创建NUMA亲和性配置
      copy:
        dest: /ksc_aibox/config/npu-numa-config.yaml
        content: |
          # 昇腾NPU NUMA亲和性配置
          # 基于NPU拓扑优化，确保最佳性能
          #
          # NPU拓扑分析:
          # - NPU0/1 在 NUMA节点0 (CPU 0-31)
          # - NPU2/3 在 NUMA节点1 (CPU 32-63)
          # - 跨NUMA通过SYS连接，性能较低
          #
          # 最佳实践:
          # 1. 同NUMA节点的NPU配对使用
          # 2. vLLM推理时绑定到对应NUMA节点
          # 3. 多NPU并行时优先使用同NUMA配对
          
          npu_numa_mapping:
            npu0:
              numa_node: 0
              cpu_range: "0-31"
              paired_with: npu1
              pci_address: "0000:01:00.0"
            npu1:
              numa_node: 0
              cpu_range: "0-31"
              paired_with: npu0
              pci_address: "0000:02:00.0"
            npu2:
              numa_node: 1
              cpu_range: "32-63"
              paired_with: npu3
              pci_address: "0000:81:00.0"
            npu3:
              numa_node: 1
              cpu_range: "32-63"
              paired_with: npu2
              pci_address: "0000:82:00.0"
          
          # 推理配置建议
          inference_recommendations:
            single_npu:
              # 单NPU推理：绑定到对应NUMA节点
              command: "numactl --cpunodebind=N --membind=N"
            dual_npu:
              # 双NPU推理：使用同NUMA配对 (0+1 或 2+3)
              preferred_pairs: ["0,1", "2,3"]
            quad_npu:
              # 四NPU推理：需要跨NUMA，注意性能影响
              note: "跨NUMA通信通过SYS，延迟较高"
        mode: '0644'
        owner: root
        group: root
      tags: [ascend, numa]

    - name: 昇腾NPU - 创建设备隔离脚本
      copy:
        dest: /ksc_aibox/scripts/maintenance/npu-device-isolate.sh
        content: |
          #!/bin/bash
          # 昇腾NPU设备隔离脚本
          # 用于多租户场景下的NPU资源分配
          
          set -e
          
          NPU_ID=$1
          ACTION=$2
          
          if [ -z "$NPU_ID" ] || [ -z "$ACTION" ]; then
            echo "Usage: $0 <npu_id> <isolate|release>"
            echo "Example: $0 0 isolate"
            exit 1
          fi
          
          case $ACTION in
            isolate)
              # 隐藏指定NPU设备
              echo "Isolating NPU $NPU_ID..."
              # 创建cgroup限制
              mkdir -p /sys/fs/cgroup/npu_$NPU_ID
              # 设置设备访问限制
              echo "c 235:$NPU_ID rwm" > /sys/fs/cgroup/npu_$NPU_ID/devices.allow
              echo "NPU $NPU_ID isolated successfully"
              ;;
            release)
              # 释放NPU设备
              echo "Releasing NPU $NPU_ID..."
              rm -rf /sys/fs/cgroup/npu_$NPU_ID 2>/dev/null || true
              echo "NPU $NPU_ID released successfully"
              ;;
            *)
              echo "Unknown action: $ACTION"
              exit 1
              ;;
          esac
        mode: '0755'
        owner: root
        group: root
      tags: [ascend, isolate]

    - name: 昇腾NPU - 配置ECC监控
      copy:
        dest: /ksc_aibox/scripts/monitor/npu-ecc-monitor.sh
        content: |
          #!/bin/bash
          # 昇腾NPU ECC错误监控脚本
          # 定期检查ECC错误，发现异常时告警
          
          LOG_FILE="/ksc_aibox/logs/npu-ecc-monitor.log"
          ALERT_THRESHOLD=10
          
          check_ecc() {
            for i in 0 1 2 3; do
              single_bit=$(npu-smi info -t ecc -i $i -c 0 2>/dev/null | grep "HBM Single Bit Error Count" | awk '{print $NF}')
              double_bit=$(npu-smi info -t ecc -i $i -c 0 2>/dev/null | grep "HBM Double Bit Error Count" | awk '{print $NF}')
              
              if [ "$single_bit" -gt 0 ] || [ "$double_bit" -gt 0 ]; then
                echo "[WARN] NPU$i ECC errors: Single=$single_bit, Double=$double_bit" >> $LOG_FILE
              fi
              
              if [ "$double_bit" -gt $ALERT_THRESHOLD ]; then
                echo "[ALERT] NPU$i has critical ECC errors: $double_bit double-bit errors" >> $LOG_FILE
                # 可在此添加告警通知逻辑
              fi
            done
          }
          
          echo "=== ECC Check at $(date) ===" >> $LOG_FILE
          check_ecc
        mode: '0755'
        owner: root
        group: root
      tags: [ascend, ecc]

    # ================================================
    # 第四部分：openEuler系统最佳实践
    # ================================================
    - name: openEuler - 安装性能监控工具
      dnf:
        name:
          - numactl
          - sysstat
          - perf
          - nvme-cli
          - smartmontools
        state: present
      tags: [openeuler, tools]

    - name: openEuler - 配置系统日志轮转
      copy:
        dest: /etc/logrotate.d/ksc-aibox
        content: |
          # KSC AIBox 日志轮转配置
          /ksc_aibox/logs/*.log {
              daily
              rotate 30
              compress
              delaycompress
              missingok
              notifempty
              create 0644 root root
              postrotate
                  # 可在此添加日志处理后的操作
              endscript
          }
        mode: '0644'
        owner: root
        group: root
      tags: [openeuler, logs]

    - name: openEuler - 配置journald持久化
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?Storage=', line: 'Storage=persistent' }
        - { regexp: '^#?Compress=', line: 'Compress=yes' }
        - { regexp: '^#?SystemMaxUse=', line: 'SystemMaxUse=1G' }
        - { regexp: '^#?SystemMaxFileSize=', line: 'SystemMaxFileSize=100M' }
        - { regexp: '^#?MaxRetentionSec=', line: 'MaxRetentionSec=30day' }
      tags: [openeuler, journald]

    - name: 重载journald配置
      systemd:
        name: systemd-journald
        state: restarted
      tags: [openeuler, journald]

    # ================================================
    # 第五部分：HCI一体机架构优化
    # ================================================
    - name: HCI - 创建健康检查服务
      copy:
        dest: /etc/systemd/system/ksc-aibox-health-check.service
        content: |
          [Unit]
          Description=KSC AIBox Health Check Service
          After=network.target
          
          [Service]
          Type=oneshot
          ExecStart=/ksc_aibox/scripts/monitor/system-health-check.sh
          StandardOutput=journal
          StandardError=journal
          
          [Install]
          WantedBy=multi-user.target
        mode: '0644'
        owner: root
        group: root
      tags: [hci, health]

    - name: HCI - 创建健康检查定时器
      copy:
        dest: /etc/systemd/system/ksc-aibox-health-check.timer
        content: |
          [Unit]
          Description=KSC AIBox Health Check Timer
          
          [Timer]
          OnCalendar=*:0/5
          Persistent=true
          
          [Install]
          WantedBy=timers.target
        mode: '0644'
        owner: root
        group: root
      tags: [hci, health]

    - name: HCI - 创建系统健康检查脚本
      copy:
        dest: /ksc_aibox/scripts/monitor/system-health-check.sh
        content: |
          #!/bin/bash
          # KSC AIBox 系统健康检查脚本
          # HCI一体机核心监控组件
          
          set -e
          
          LOG_FILE="/ksc_aibox/logs/health-check.log"
          STATUS_FILE="/ksc_aibox/config/system-status.json"
          
          echo "=== Health Check at $(date) ===" >> $LOG_FILE
          
          # 1. NPU健康检查
          npu_status="OK"
          for i in 0 1 2 3; do
            health=$(npu-smi info -t health -i $i -c 0 2>/dev/null | grep "Health Status" | awk '{print $NF}')
            if [ "$health" != "OK" ]; then
              npu_status="WARNING"
              echo "[WARN] NPU$i health: $health" >> $LOG_FILE
            fi
          done
          
          # 2. 磁盘健康检查
          disk_status=$(smartctl -H /dev/nvme0n1 2>/dev/null | grep "SMART overall" | awk '{print $NF}')
          if [ "$disk_status" != "PASSED" ]; then
            echo "[WARN] Disk health: $disk_status" >> $LOG_FILE
          fi
          
          # 3. 内存检查
          mem_available=$(grep MemAvailable /proc/meminfo | awk '{print $2}')
          mem_total=$(grep MemTotal /proc/meminfo | awk '{print $2}')
          mem_percent=$((mem_available * 100 / mem_total))
          if [ $mem_percent -lt 10 ]; then
            echo "[WARN] Memory available: ${mem_percent}%" >> $LOG_FILE
          fi
          
          # 4. Docker服务检查
          docker_status=$(systemctl is-active docker)
          if [ "$docker_status" != "active" ]; then
            echo "[WARN] Docker service: $docker_status" >> $LOG_FILE
          fi
          
          # 5. 生成状态JSON
          cat > $STATUS_FILE << EOF
          {
            "timestamp": "$(date -Iseconds)",
            "hostname": "$(hostname)",
            "npu_status": "$npu_status",
            "disk_status": "$disk_status",
            "memory_percent": $mem_percent,
            "docker_status": "$docker_status",
            "system_load": "$(cat /proc/loadavg | awk '{print $1}')"
          }
          EOF
          
          echo "Health check completed" >> $LOG_FILE
        mode: '0755'
        owner: root
        group: root
      tags: [hci, health]

    - name: HCI - 启用健康检查定时器
      systemd:
        name: ksc-aibox-health-check.timer
        state: started
        enabled: yes
        daemon_reload: yes
      tags: [hci, health]

    - name: HCI - 创建自愈脚本
      copy:
        dest: /ksc_aibox/scripts/maintenance/self-healing.sh
        content: |
          #!/bin/bash
          # KSC AIBox 自愈脚本
          # HCI一体机核心特性：自动故障恢复
          
          LOG_FILE="/ksc_aibox/logs/self-healing.log"
          
          log() {
            echo "[HEALING] $(date): $1" >> $LOG_FILE
          }
          
          # 1. Docker服务自愈
          heal_docker() {
            if [ "$(systemctl is-active docker)" != "active" ]; then
              log "Docker service not active, attempting restart..."
              systemctl restart docker
              sleep 5
              if [ "$(systemctl is-active docker)" == "active" ]; then
                log "Docker service restored successfully"
              else
                log "Docker service restore failed, manual intervention required"
              fi
            fi
          }
          
          # 2. 网络服务自愈
          heal_network() {
            # 检查主要网卡状态
            if ! ip link show enp125s0f1 | grep -q "state UP"; then
              log "Network interface down, attempting recovery..."
              nmcli connection up enp125s0f1
            fi
          }
          
          # 3. 时间同步自愈
          heal_time() {
            if [ "$(chronyc tracking | grep 'System time' | grep -c 'slow')" -gt 0 ]; then
              log "Time sync issue detected, forcing sync..."
              chronyc makestep
            fi
          }
          
          # 执行自愈检查
          log "Starting self-healing check..."
          heal_docker
          heal_network
          heal_time
          log "Self-healing check completed"
        mode: '0755'
        owner: root
        group: root
      tags: [hci, healing]

    - name: HCI - 创建自愈服务
      copy:
        dest: /etc/systemd/system/ksc-aibox-self-healing.service
        content: |
          [Unit]
          Description=KSC AIBox Self-Healing Service
          After=network.target docker.service
          
          [Service]
          Type=oneshot
          ExecStart=/ksc_aibox/scripts/maintenance/self-healing.sh
          StandardOutput=journal
          StandardError=journal
          
          [Install]
          WantedBy=multi-user.target
        mode: '0644'
        owner: root
        group: root
      tags: [hci, healing]

    - name: HCI - 创建自愈定时器
      copy:
        dest: /etc/systemd/system/ksc-aibox-self-healing.timer
        content: |
          [Unit]
          Description=KSC AIBox Self-Healing Timer
          
          [Timer]
          OnCalendar=*:0/10
          Persistent=true
          
          [Install]
          WantedBy=timers.target
        mode: '0644'
        owner: root
        group: root
      tags: [hci, healing]

    - name: HCI - 启用自愈定时器
      systemd:
        name: ksc-aibox-self-healing.timer
        state: started
        enabled: yes
        daemon_reload: yes
      tags: [hci, healing]

    # ================================================
    # 第六部分：安全性加固
    # ================================================
    - name: 安全 - 配置文件完整性监控
      copy:
        dest: /ksc_aibox/scripts/monitor/file-integrity-check.sh
        content: |
          #!/bin/bash
          # 关键配置文件完整性检查
          # HCI一体机安全特性
          
          LOG_FILE="/ksc_aibox/logs/integrity-check.log"
          BASELINE_DIR="/ksc_aibox/config/baseline"
          
          CRITICAL_FILES=(
            "/etc/ssh/sshd_config"
            "/etc/docker/daemon.json"
            "/etc/sysctl.d/99-ksc-aibox-optimization.conf"
            "/etc/security/limits.d/99-ksc-aibox.conf"
            "/etc/firewalld/zones/public.xml"
            "/etc/systemd/journald.conf"
          )
          
          echo "=== Integrity Check at $(date) ===" >> $LOG_FILE
          
          for file in "${CRITICAL_FILES[@]}"; do
            if [ -f "$file" ]; then
              current_hash=$(sha256sum "$file" | awk '{print $1}')
              baseline_file="$BASELINE_DIR/$(basename $file).sha256"
              
              if [ -f "$baseline_file" ]; then
                baseline_hash=$(cat "$baseline_file")
                if [ "$current_hash" != "$baseline_hash" ]; then
                  echo "[ALERT] $file has been modified!" >> $LOG_FILE
                  echo "  Baseline: $baseline_hash" >> $LOG_FILE
                  echo "  Current:  $current_hash" >> $LOG_FILE
                fi
              else
                # 创建基线
                echo "$current_hash" > "$baseline_file"
                echo "[INFO] Baseline created for $file" >> $LOG_FILE
              fi
            fi
          done
        mode: '0755'
        owner: root
        group: root
      tags: [security, integrity]

    - name: 安全 - 创建基线目录
      file:
        path: /ksc_aibox/config/baseline
        state: directory
        mode: '0700'
        owner: root
        group: root
      tags: [security, integrity]

    - name: 安全 - 配置审计规则
      copy:
        dest: /etc/audit/rules.d/ksc-aibox.rules
        content: |
          # KSC AIBox 审计规则
          # 监控关键系统操作
          
          # 监控NPU设备访问
          -w /dev/davinci0 -p rw -k npu_access
          -w /dev/davinci1 -p rw -k npu_access
          -w /dev/davinci2 -p rw -k npu_access
          -w /dev/davinci3 -p rw -k npu_access
          -w /dev/davinci_manager -p rw -k npu_access
          
          # 监控配置文件修改
          -w /etc/ssh/sshd_config -p wa -k config_modify
          -w /etc/docker/daemon.json -p wa -k config_modify
          -w /etc/sysctl.d/ -p wa -k config_modify
          -w /etc/firewalld/ -p wa -k config_modify
          
          # 监控关键目录
          -w /ksc_aibox/config/ -p wa -k aibox_config
          -w /ksc_aibox/scripts/ -p wa -k aibox_scripts
          
          # 监控用户切换
          -w /usr/bin/su -p x -k user_switch
          -w /usr/bin/sudo -p x -k user_switch
          
          # 监控时间修改
          -w /etc/localtime -p wa -k time_change
        mode: '0600'
        owner: root
        group: root
      tags: [security, audit]

    - name: 安全 - 重载审计规则
      command: augenrules --load
      tags: [security, audit]

    # ================================================
    # 第七部分：易维护性优化
    # ================================================
    - name: 维护 - 创建系统信息收集脚本
      copy:
        dest: /ksc_aibox/scripts/maintenance/collect-system-info.sh
        content: |
          #!/bin/bash
          # KSC AIBox 系统信息收集脚本
          # 用于故障诊断和运维支持
          
          OUTPUT_DIR="/ksc_aibox/logs/diagnostics"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT_FILE="$OUTPUT_DIR/system-info_$TIMESTAMP.tar.gz"
          
          mkdir -p $OUTPUT_DIR
          
          echo "Collecting system information..."
          
          # 创建临时目录
          TEMP_DIR=$(mktemp -d)
          
          # 1. 系统基本信息
          echo "=== System Info ===" > $TEMP_DIR/system.txt
          hostnamectl >> $TEMP_DIR/system.txt
          uname -a >> $TEMP_DIR/system.txt
          cat /etc/os-release >> $TEMP_DIR/system.txt
          
          # 2. CPU和内存
          echo "=== CPU Info ===" > $TEMP_DIR/cpu.txt
          lscpu >> $TEMP_DIR/cpu.txt
          cat /proc/cpuinfo >> $TEMP_DIR/cpu.txt
          
          echo "=== Memory Info ===" > $TEMP_DIR/memory.txt
          free -h >> $TEMP_DIR/memory.txt
          cat /proc/meminfo >> $TEMP_DIR/memory.txt
          
          # 3. NPU信息
          echo "=== NPU Info ===" > $TEMP_DIR/npu.txt
          npu-smi info -l >> $TEMP_DIR/npu.txt
          for i in 0 1 2 3; do
            npu-smi info -t board -i $i >> $TEMP_DIR/npu.txt
            npu-smi info -t health -i $i -c 0 >> $TEMP_DIR/npu.txt
          done
          
          # 4. 磁盘信息
          echo "=== Disk Info ===" > $TEMP_DIR/disk.txt
          lsblk >> $TEMP_DIR/disk.txt
          smartctl -a /dev/nvme0n1 >> $TEMP_DIR/disk.txt
          
          # 5. 网络信息
          echo "=== Network Info ===" > $TEMP_DIR/network.txt
          ip addr show >> $TEMP_DIR/network.txt
          ip route show >> $TEMP_DIR/network.txt
          nmcli device show >> $TEMP_DIR/network.txt
          
          # 6. Docker信息
          echo "=== Docker Info ===" > $TEMP_DIR/docker.txt
          docker info >> $TEMP_DIR/docker.txt
          docker ps -a >> $TEMP_DIR/docker.txt
          docker images >> $TEMP_DIR/docker.txt
          
          # 7. 服务状态
          echo "=== Service Status ===" > $TEMP_DIR/services.txt
          systemctl list-units --type=service --state=failed >> $TEMP_DIR/services.txt
          systemctl list-units --type=service --state=running >> $TEMP_DIR/services.txt
          
          # 8. 系统日志
          journalctl -n 100 --no-pager > $TEMP_DIR/journal.log
          dmesg | tail -100 > $TEMP_DIR/dmesg.log
          
          # 9. 配置文件
          mkdir -p $TEMP_DIR/config
          cp /etc/ssh/sshd_config $TEMP_DIR/config/
          cp /etc/docker/daemon.json $TEMP_DIR/config/
          cp /etc/sysctl.d/99-ksc-aibox*.conf $TEMP_DIR/config/
          
          # 打包
          tar -czf $OUTPUT_FILE -C $TEMP_DIR .
          rm -rf $TEMP_DIR
          
          echo "System information collected: $OUTPUT_FILE"
          echo "Size: $(du -h $OUTPUT_FILE | cut -f1)"
        mode: '0755'
        owner: root
        group: root
      tags: [maintenance, diagnostics]

    - name: 维护 - 创建一键恢复脚本
      copy:
        dest: /ksc_aibox/scripts/maintenance/quick-recovery.sh
        content: |
          #!/bin/bash
          # KSC AIBox 一键恢复脚本
          # HCI一体机核心特性：快速故障恢复
          
          set -e
          
          LOG_FILE="/ksc_aibox/logs/recovery.log"
          
          log() {
            echo "[RECOVERY] $(date): $1" >> $LOG_FILE
            echo "$1"
          }
          
          log "Starting quick recovery process..."
          
          # 1. 重启关键服务
          log "Restarting critical services..."
          systemctl restart docker
          systemctl restart sshd
          systemctl restart firewalld
          systemctl restart chronyd
          
          # 2. 清理Docker资源
          log "Cleaning Docker resources..."
          docker system prune -f >> $LOG_FILE
          
          # 3. 重置网络
          log "Resetting network..."
          nmcli connection reload
          nmcli connection up enp125s0f1
          
          # 4. 同步时间
          log "Syncing time..."
          chronyc makestep >> $LOG_FILE
          
          # 5. 检查NPU
          log "Checking NPU status..."
          for i in 0 1 2 3; do
            health=$(npu-smi info -t health -i $i -c 0 2>/dev/null | grep "Health Status" | awk '{print $NF}')
            log "NPU$i health: $health"
          done
          
          # 6. 验证服务状态
          log "Verifying service status..."
          for svc in docker sshd firewalld chronyd; do
            status=$(systemctl is-active $svc)
            log "$svc: $status"
          done
          
          log "Quick recovery completed!"
          log "Please verify system functionality manually."
        mode: '0755'
        owner: root
        group: root
      tags: [maintenance, recovery]

    # ================================================
    # 第八部分：验证和报告
    # ================================================
    - name: 验证所有优化配置
      shell: |
        echo "=== 系统优化验证报告 ==="
        echo ""
        echo "1. 内核参数验证:"
        sysctl net.core.rmem_max net.core.wmem_max vm.max_map_count
        echo ""
        echo "2. NPU健康状态:"
        for i in 0 1 2 3; do
          npu-smi info -t health -i $i -c 0 2>/dev/null | grep "Health Status"
        done
        echo ""
        echo "3. 服务状态:"
        systemctl is-active docker sshd firewalld tuned chronyd rngd
        echo ""
        echo "4. 定时器状态:"
        systemctl list-timers --no-pager | grep ksc-aibox
        echo ""
        echo "5. 审计状态:"
        auditctl -s | head -5
      register: verification_report
      changed_when: false
      tags: [verify]

    - name: 显示验证报告
      debug:
        msg: "{{ verification_report.stdout_lines }}"
      tags: [verify]

