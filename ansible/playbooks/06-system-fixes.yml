---
# ============================================================================
# 系统优化与健康修复 Playbook
#
# 用途: 执行系统全面检查与修复，包括 Python 环境、系统性能调优、安全配置
#
# 使用方法:
#   ansible-playbook -i inventory/hosts playbooks/06-system-fixes.yml
#   ansible-playbook -i inventory/hosts playbooks/06-system-fixes.yml --tags "python"
#   ansible-playbook -i inventory/hosts playbooks/06-system-fixes.yml --check
#
# Tags:
#   python      - 安装 Python 依赖 (numpy + CANN 依赖)
#   cann        - 修复 CANN Python 环境
#   thp         - 调整 Transparent HugePages
#   ssh         - SSH 安全加固 (默认跳过，需手动确认)
#   tuned       - 安装 tuned 性能配置
#   selinux     - SELinux 调整
#   memory      - 内存分析与清理
#   firmware    - NPU 固件升级 (需冷启动生效)
#   all         - 执行所有修复
#
# 执行记录:
#   日期: 2026-04-09
#   状态: 已完成 8/9 项 (SSH 加固跳过，固件升级待冷启动)
#   详情: docs/SYSTEM-HEALTH-REPORT.md
# ============================================================================

- name: 系统优化与健康修复
  hosts: aibox
  become: true
  gather_facts: true

  vars:
    # Python 依赖 (含 CANN 完整依赖链)
    python_deps:
      - numpy
      - decorator
      - attrs
      - psutil
      - tornado
      - grpcio
      - protobuf
      - sympy
      - scipy

    # SELinux 模式 (permissive 或 enforcing)
    selinux_mode: "permissive"

    # SSH 配置
    ssh_permit_root_login: "prohibit-password"
    ssh_password_auth: "no"

    # Transparent HugePages (always, madvise, never)
    thp_mode: "madvise"

  tasks:
    # ========================================================================
    # Phase 1: 紧急修复
    # ========================================================================

    - name: "[Phase 1] 分析内存占用 Top 10 进程"
      ansible.builtin.shell: |
        ps aux --sort=-%mem | head -11
      register: mem_top10
      tags: [python, cann, memory]
      changed_when: false

    - name: "[Phase 1] 显示内存占用 Top 10"
      ansible.builtin.debug:
        var: mem_top10.stdout_lines
      tags: [python, cann, memory]

    - name: "[Phase 1] 检查内存中 OOM 记录"
      ansible.builtin.shell: |
        dmesg 2>/dev/null | grep -i 'oom\|out of memory' | tail -5 || echo "无 OOM 记录"
      register: oom_records
      tags: [python, cann, memory]
      changed_when: false

    - name: "[Phase 1] 显示 OOM 记录"
      ansible.builtin.debug:
        var: oom_records.stdout_lines
      tags: [python, cann, memory]

    # --- Python 依赖安装 ---

    - name: "[Phase 1] 安装 Python numpy"
      ansible.builtin.pip:
        name: numpy
        executable: pip3
        state: present
      tags: [python, cann]

    - name: "[Phase 1] 安装 CANN Python 依赖 (decorator, attrs, psutil)"
      ansible.builtin.pip:
        name: "{{ item }}"
        executable: pip3
        state: present
      loop:
        - decorator
        - attrs
        - psutil
      tags: [python, cann]

    - name: "[Phase 1] 安装其他 CANN 依赖 (tornado, grpcio, protobuf, scipy)"
      ansible.builtin.pip:
        name: "{{ item }}"
        executable: pip3
        state: present
      loop:
        - tornado
        - grpcio
        - protobuf
        - scipy
      tags: [python, cann]

    - name: "[Phase 1] 验证 Python 环境"
      ansible.builtin.shell: |
        source /usr/local/Ascend/ascend-toolkit/set_env.sh
        python3 -c "
        import sys
        sys.path.insert(0, '/usr/local/Ascend/cann-9.0.0-beta.2/python/site-packages')
        import numpy; print(f'numpy: {numpy.__version__} OK')
        import decorator; print(f'decorator OK')
        import attr; print(f'attrs OK')
        import psutil; print(f'psutil OK')
        import scipy; print(f'scipy OK')
        import tornado; print(f'tornado OK')
        import grpc; print(f'grpcio OK')
        import google.protobuf; print(f'protobuf OK')
        try:
            import te
            print('CANN te: OK')
        except ImportError as e:
            print(f'CANN te: FAILED - {e}')
        try:
            from tbe import topi
            print('CANN topi: OK')
        except ImportError as e:
            print(f'CANN topi: N/A (版本特性) - {e}')
        "
      register: python_verify
      tags: [python, cann]
      changed_when: false

    - name: "[Phase 1] 显示 Python 环境验证结果"
      ansible.builtin.debug:
        var: python_verify.stdout_lines
      tags: [python, cann]

    # --- 内存清理 ---

    - name: "[Phase 1] 清理系统缓存"
      ansible.builtin.shell: |
        sync
        echo 3 > /proc/sys/vm/drop_caches
      tags: [memory]
      changed_when: true

    - name: "[Phase 1] 验证内存释放效果"
      ansible.builtin.shell: free -h
      register: mem_after_clean
      tags: [memory]
      changed_when: false

    - name: "[Phase 1] 显示清理后内存状态"
      ansible.builtin.debug:
        var: mem_after_clean.stdout_lines
      tags: [memory]

    # ========================================================================
    # Phase 4: 系统优化
    # ========================================================================

    # --- Transparent HugePages ---

    - name: "[Phase 4] 调整 Transparent HugePages"
      ansible.builtin.shell: |
        echo "{{ thp_mode }}" > /sys/kernel/mm/transparent_hugepage/enabled
      tags: [thp]
      changed_when: true

    - name: "[Phase 4] 验证 THP 配置"
      ansible.builtin.shell: cat /sys/kernel/mm/transparent_hugepage/enabled
      register: thp_verify
      tags: [thp]
      changed_when: false

    - name: "[Phase 4] 显示 THP 配置结果"
      ansible.builtin.debug:
        var: thp_verify.stdout
      tags: [thp]

    - name: "[Phase 4] 持久化 THP 配置 (rc.local)"
      ansible.builtin.lineinfile:
        path: /etc/rc.d/rc.local
        line: "echo {{ thp_mode }} > /sys/kernel/mm/transparent_hugepage/enabled"
        state: present
        create: true
        mode: "0755"
      tags: [thp]

    # --- tuned 安装 ---

    - name: "[Phase 4] 安装 tuned"
      ansible.builtin.dnf:
        name: tuned
        state: present
      tags: [tuned]

    - name: "[Phase 4] 启动 tuned 服务"
      ansible.builtin.service:
        name: tuned
        state: started
        enabled: true
      tags: [tuned]

    - name: "[Phase 4] 应用 throughput-performance 配置"
      ansible.builtin.shell: |
        tuned-adm profile throughput-performance
      tags: [tuned]
      changed_when: true

    - name: "[Phase 4] 验证 tuned 配置"
      ansible.builtin.shell: tuned-adm active
      register: tuned_active
      tags: [tuned]
      changed_when: false

    - name: "[Phase 4] 显示 tuned 配置"
      ansible.builtin.debug:
        var: tuned_active.stdout
      tags: [tuned]

    # --- SELinux 调整 ---

    - name: "[Phase 4] 检查当前 SELinux 状态"
      ansible.builtin.command: getenforce
      register: selinux_current
      tags: [selinux]
      changed_when: false

    - name: "[Phase 4] 显示当前 SELinux 状态"
      ansible.builtin.debug:
        var: selinux_current.stdout
      tags: [selinux]

    - name: "[Phase 4] 设置 SELinux 为 Permissive"
      ansible.builtin.command: setenforce 0
      when: selinux_mode == "permissive"
      tags: [selinux]
      changed_when: true

    - name: "[Phase 4] 持久化 SELinux 配置"
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: "^SELINUX="
        line: "SELINUX={{ selinux_mode }}"
      tags: [selinux]

    # --- SSH 安全加固 ---

    - name: "[Phase 4] 检查当前 SSH 配置"
      ansible.builtin.command: cat /etc/ssh/sshd_config
      register: ssh_current
      tags: [ssh]
      changed_when: false

    - name: "[Phase 4] 配置 SSH Root 登录"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin {{ ssh_permit_root_login }}"
      tags: [ssh]
      notify: restart sshd

    - name: "[Phase 4] 禁用 SSH 密码认证"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication {{ ssh_password_auth }}"
      tags: [ssh]
      notify: restart sshd

    - name: "[Phase 4] 验证 SSH 配置"
      ansible.builtin.shell: |
        grep -E "PermitRootLogin|PasswordAuthentication" /etc/ssh/sshd_config | grep -v "^#"
      register: ssh_verify
      tags: [ssh]
      changed_when: false

    - name: "[Phase 4] 显示 SSH 配置验证结果"
      ansible.builtin.debug:
        var: ssh_verify.stdout_lines
      tags: [ssh]

  handlers:
    - name: restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
